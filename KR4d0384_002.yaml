body:
  text: 閬風集卷二宋舒嶽祥撰七言古詩梅花石吟梅花樹下梅花石花作玉痕石鐵色黃筌粉本花光枝風吹數片尤竒特何年處士橫斜句影落寒溪印苔磧又疑飛自羅浮來花仙謫墮投蒼璧或是天星下隕時打著梅梢滅不得若非曾支織女機機上花紋相照射定是荆和泣玉時淚入璞間餘㸃滴不然越女昔浣紗指痕印粉難揩拭荒唐詭幻不可窮我自稽經探根極傅巖人去實和羮花落空巖餘此迹花開花落幾春風棄捐墻角真堪惜携向簷前洗濯看相對無言三太息蠟梅詠已卯正月蜜蜂數日不出衙將謂凍蟄無生涯今朝起看後園樹總將蜜蠟銜為花香作蜜香色蠟色花瓣分眀是蜂翼不是案頭乾死螢不是營營蠅止棘朝陽熠熠泛崇光黃露溶溶蜜滿房柔梢不入嬋娟鬢道韻偏宜冷淡裝與梅同時喚作梅風味甚似枝葩非若將形色定品格何得江珧比荔枝自夀閬風老人五十九白頭饑凍荒山走偶然脫命得生還閭里相看驚老醜今朝初度最可憐五子三孫在眼前老妻欲作無麵餅問訊雞娘渠未肻海水潮小未登魚霜後黃柑亦自踈窮人作事天不與只有紅梅相媚嫵為渠一笑買村酤老夫自歌稚子舞眀年六十更可歌大亂不死奈我何十二月十七日歸故園酌紅梅花下十六日立春今年剩有冬一月今冬先得半月春留春借冬皆樂事但苦世上無閒人平臯梅花如雪浪夜色晨光迷滉漾就中紅香清且妍風流故在海棠上昨夜月眀天不寒夢中走馬來花前舊時都下千金買翻棄草莽不值錢性情貴逺每厭近久不見之端可憐今朝起揀白髭鬚未能免俗為花娛小車駊騀溪石滑一竿掛酒懸長魚無人對飲花為伴小奴亦解吹長管花應憐我老而狂起舞踏影月凌亂老人更醉三十年不為酒仙即花仙平臯木芙蓉千株爛然雲錦醉行其中如逰芙蓉城也作歌紀之牡丹一名木芍藥拒霜也號木芙蓉好花名盡多重疊不取枝同取貌同悲鴻一聲天雨血落霞萬頃江飲虹水花已盡岸花出千朵萬朵能白紅曽共鴛鴦登繡縟也隨鸂鶒上屏風金叉欲插嫌花重玉手髙攀與面重弄色合歡無限思九心千葉為誰容朝看花開紅偏淡暮見花斂紅轉濃朝開夕斂如趨市眀日風光移別花平生愛花入骨髓白頭出沒與花似老我逢花六十秋花開花落水悠悠未喫太平一杯酒嵗嵗花開伴白頭老融墨戲詞寒木蕭蕭寒汀渺渺船尾插竿童子閒船頭推篷天欲曉鴈鴈斜飛起衰草頗記江湖獨宿時一夢十年看未了贈楊佳孫作詩意得在句先下筆直寫意所到世間惟俗最難醫剖石得玉加精巧初如面壁無所睹一㸃圓眀通萬竅楊生楊生聽我言老語諄諄毋乃耄生平十九未可量淘洗晶熒方入妙一再三見志愈堅嘉子至意為傾倒七月十一日曉聞鶯有感秋曉秋鶯鳴緑樹我自徘徊不能去年年鳴值晚春時曉窗共聽人何處鶯鶯少駐聽我吟我吟未成淚雙注來年啼上繭頭山為說老人題此句題潘少白詩海颶既過天泬寥瓦檠弄焰靜自搖特山吟槀適在案讀罷不知山月髙早從唐體入圓妥更向𣲖家事掀簸盡囊六卷要我刪子自得之何必我燕騎紛紛塵暗天少陵詩史在眼前我才衰退空茫然君能于此更著力唐體𣲖家俱可捐牡丹有序三月二十一日歸故園看牡丹草莽中才作數花似訴主人不顧省渠也余亦對之惻然東風常帶三分冷春日自有一種香百花合和不可揀中人如酒令人狂馬塍賣花只貪早野翁自愛開遲好看花不可見花心爛熳開時春已老梢頭繭栗幻柈杅有許包藏費天巧自携尊酒醉花陰偃仰鹿皮聽語少余家舊藏畫作長松臨水波浪渺然淵眀曵杖遊其下四子從之各奉杯盤壺觴以進其一子敷鹿皮於地上以待公卧也近作對江牡丹吟七章呈正仲正仲於拙吟無不亟和者獨此七章未和携而歸茭湖半月矣遞筒未至歌以趣之邵子花開二十四吟詩驚動洛諸公我家兩株三十枝歡喜亦與邵子同作詩七絶惱正仲過旬不見回郵筒正仲材髙氣浩博鄙我瑣細無豪雄文叔今見小敵怯八駿豈肯盤蟻封再三思索得其意笑我不知時節異洛陽城中天地中春色花光好天氣此時髙韻一兩篇流出胸中真樂事我生初見錢塘春歌舞西湖早已顰如今不見湖山面鳥歌似哭花為塵作詩告人誰為聽當哀而樂非天真我謝正仲此意厚請不吟詩但飲酒次韻和正仲碧蓮花此以形色指名耳訪之花工謂此即蘘荷未審其的好翁和了碧桃詠并欲盡賦園中花思遲才退句未吐髙篇已捷老柏塗此花蔓生枝自徑天水碧染雪藕紗振鷺蟬聯蒼玉佩不比掘閲紛衣麻山阿幽人貞且吉城隅靜女淡以華偶然種之近蒼柏君比兔絲疑未嘉兔絲無根空托附結子濫充方藥家小兒欲以凌霄擬一種粗俗堪歎嗟碧蓮比擬最清切好向天苑凌青霞分龍吟五月二十分龍雨今日霏微如下土前日何日何䨬霪正是分龍乃如許有餘不足相乘除天道人事元非踈何龍分得此鄉雨問龍先日何處居我昔逰三江五湖江湖處處皆龍瀦我老歸農卧海曲與龍為鄰無猜虞一盂飽飯龍所與一片閒雲龍所噓百年地主屬老夫龍來龍去識我無神龍飲食與人異布席欲薦寒泉蔬我知雨從龍身落有時雨過墮蝦魚昔年海上親眼見龍出滄溟騰碧虛蜿蜒百丈露爪尾黑水精靈光徹軀龍兮只在人頭上人不語龍誰語乎我有一寸愚願龍聽區區一村南北異時雨天公用意何偏枯願龍溥澤均八極東海蒼生誠可吁歸至相見嶺喜見紫海相見嶺頭相見少北風吹却南翁倒短日荒荒白草枯顚狂亂葉如飛鳥前峯低處紫海出知是吾歸里中道父兄問訊今何如只是相公言語好潘少白前嵗惠豫零陵石一片方不及尺而文理巧秀有山水煙雲之狀豫以作硯屏始成因賦長吟以遺之庚辰二月十八日白雲際天隅峯峯爭秀出浩浩水石灘歸鳥時滅沒我欲茅三間巢此重疊峰我欲舟一葉釣此蒼茫中君從何處得此石千巖萬壑在方尺李成范寬格深秀關同荆浩骨峭特殆非一人之所能欲窮其源不可得君言此物出零陵逺近來去皆天成是中能著元次山刻詩勒頌留孱顔後來栁子曾作守銘記摹寫無遺間二子去後精魄在文章散落水石間鬼神往往竊餘巧戲弄筆墨留斑斑贈我以作書硯屏林風石月秋泠泠蕭齊靜對如有聆元子栁子突出也大竒今日之事我為之樂神曲汙田稻子輸官糧髙田豆角初上場楓林沉沉誰打鼓農家報本兼祈禳打鼓打鼓急打鼓大巫邀神小巫舞絳衫繡帔朱冠裳手持鈴劍道神語前年軍過雞栅空今年一母生十雄甽東種秫穫頗厚大甑炊糍甕成酒家機白布濶且長翁媪製作新衣裳再拜奠神重酌酒男耕女桑十倍强大婦小婦別有祝生養好男房計足巫公巫公告爾神産榖不如多産銀驢載馬馱車碌碌免斫柘條行箠撲退之謂以鳥鳴春往往鳥以夏鳴耳古人麥黃韻鸝庚之句乃真知時山齊靜聽嘲哳羣萃有麥熟之鳴戲集鳥名而賦之麥熟即快活汝不食麥空饒舌前時斗粟銀百星錢楮不用民間一切用銀薄如紙而碎如金老農無銀色菜青此鳥年年啄草子今年草根救人死鳥無所食饑奈何見人食麥喜且歌催人煆磨尤殷勤其音若云黃煆銀磨前身恐是老農身大麥炊糍先祭祖小麥作餅賽田神姊捉麥姊捉麥竹雞音也昔人云泥滑滑姊娣相隨筐有獲田間滯穟縱復橫傴僂東阡與西陌婆餅焦斷消息而今麥熟婆當還莫憂餅焦兒不食脫布袴村村雨滿田無路平生不慣著新衣兩腿泥深逐牛步脫破袍與郎裁衫兩髀髙田頭赫日曬額焦脫衣掛樹踏桔橰畫眉叫畫眉叫抹截梳􅏻趁炊早夫婦如賔有古風烏頭白頰宜相好上堂問訊白頭翁蚤晚寒溫候不同善事阿姑姑不惡粗茶淡飯是家風提葫蘆沽美酒布帘書字鄰家有沽來行饁望田頭先酌瓷甌奉姑舅不學前村百舌兒說非說是搖花栁不學桑間鳩婦相勃磎天陰逐去晴歸來大婦偷我弗偷辨說曲直令儂羞淺鋪薄遍煮莧汁二升麥餅鶻突流爺飰飰奉親約已渠非訕誰倚䦨干十二紅鮮鮮翠碧亂芳叢燭燒花蠟夜嫌短詞斫錦囊尊不空此事有分求不得不如歸去從耕農煮莧汁鶻突流爺飰飰三禽言也樂天三月晦日聞鳥聲詩遣脫破袍勞報暖催沽美酒敢辭貧則脫破袍是一禽非脫布袴也梅下洗盞酌台紅感舊天台紅酒須銀杯清光妙色相發揮瓷髹玉石豈不雅君第酌之應自知我有銀杯何所宜恕齊惠我前朝得今朝把酒竟茫然梅花萬里人南北恕齊謝樞密堂也賦山菴梅花庭前梅花八九樹長為春風導先路他山消息未曾真特與詩人映門戶無情有性悟色空將影和香作言語吳酥入酒鬬輕眀是雪是花并月咀折來燭下看橫斜素屏淡墨無聲句生日仲素惠羊酒作此奉謝去年蝶軒饋羊酒主人憐我空無有座上六客皆解吟一翁不吟開笑口今年病叟蚤還山烹雞炮鱉翁對媪五男四婦六稚孫更有曾孫依乳姆往來兩載總遭荒瓦瓶聊以挹酒漿山蔬滿盤白雪白野橘堆飣黃金黃荒村得此已自足羣奴饑啄撑空腸忽聞棠溪有書至袁詩陳賦兩輝煌一松正可枯蘖比五雛真與羣雞爭來詩有一松五鳯雛之句舉家病瘧涉三月一日計減一斗糧留儲到此作素供問君何為特殺生臟神見夢羊踏菜便呼茗碗來祓禳君當戒屠我辟榖輕身與蝶同飛揚田公姥詞田公布衣五尺長田姥角冠八寸强平生布施不造殃教養兒孫耕與桑田公姥生為農家夫與婦夀考百年作田祖嵗嵗田頭管風雨春三秋九享雞豚環珓神靈如對語田公姥聽儂歌看儂舞使我倉有粳使我庾有稌使我囷有黍使我富牛羊千斯牸兮百斯牯田公姥儂肴芬芬兮儂酒湑湑官稅既輸兮公役不煩男不為人驅女不為傖婦讀書識字應門戶次韻和李實父焰火行山樵夏斬樗櫟枝受盡日炙兼風吹天寒嵗晚見功用春透肝鬲連腰肢一室暖香勝樺燭破衲紉縫針線續牀頭甕子新篘成翁媪分虀小筵席山家此樂無厭時何須玉筍扶金巵我亦平生知此味今年此味竒更竒山中低廠編錯薪不知山外飛氛塵一塵一窩榾柮老稚均此時痛快出苦辛虞美人草有序篆畦有花非草非木冬槁春生而夏花花粉紅色穗如蓼葉如槐條如栁故老相傳云劉允叔自江西携種歸散植至此俗以鬢邉嬌名之梅所周道士謂此即虞美人草也因為長歌以遺之咸陽一火燒天紅重瞳將軍帝業空欲據彭城作盟主漢王隨手定關中垓下楚歌聞太晚帳前驚起途已窮當時楚士盡漢歸只有虞兮心不離悲歌泣下計何短項王去後知屬誰世傳姬死橫中道怨魄悲魂化青草年年搖曵舞春風枝似栁條花似蓼羅衣猶自作吳粧也似美人顔色好有人傳曲入絲桐宛轉吳音泣帳中試將此曲花前奏花能起舞腰肢弓但疑此事史無書項王潰去姬何如只應歌罷王自走不為虞兮一回首死耶禽耶兩不知流傳想像寄花枝人生變化那可料蜀王曾化為子規楚王剽悍骨肉叛項伯私漢無親臣范增怒去黥布反生死相隨一婦人吕雉前曾入楚軍項羽還之亦有恩虞死不憐王土葬帝王豈為兒女仁道人能識此花名老人為造花枝曲我歌此曲花當舞更使今人淚相續庵中有紅山茶一株自臘月開至二月半為蘂尚無數也蓋十霜十雪矣山茶一株紅勝燭旋落旋開相陸續朱霞散射曉霏晴熠熠林光映幽谷雪中見此朱砂杯道人無情還悅目端正濃粧不逞妖處女頩然在幽獨有時脫蒂響蒼苔不作他花飛片逐劔南樵叟設色時就掌調丹貴勻熟花容肉色兩相宜肌理細膩端不俗畫猶如此况天生謂花無韻評未足白茶雖白太清癯何惜深紅著深緑憶笻竹杖詞有序謝敬齊昌元所惠出入與俱五年矣丙子避地留致庵歸訪之已失所在笻竹杖笻竹杖敬齊惠我侔璆璗萬里岷江下峽船大竹一筒中貯兩四眀直在海東頭我得一條長在掌蛟龍已蛻脊骨全色如黃玉中心堅節圍五寸莖似筆重如鐵石聲鏗然杖兮杖兮吾與爾曾入千巖萬壑裏虎豹逺遁兮魑魅不逢走及狙公兮追及鹿子忽不見兮誰從寧入水兮為龍或以撾馬兮其毁不逢日暮兮山空篁竹鬼嘯兮霧雨其濛餞嵗行嵗來沙上草頭迎嵗去梅邉雪中送嵗去年來不自由我亦送迎何所用人情厭舊只歡新不道新來老却人喜為兒孫添一嵗可憐光景轉成塵送君此去信悠哉不知眀日肻重來宇宙無窮迷道路追隨不見上層臺蕭蕭便恐逐風散茫茫尚想隨潮回嵗去匆匆不復顧我猶留此君何處非緣故嵗去無情自是新年促君去送故迎新一百年不迎不送無新故守嵗行一年辛苦嵗終成夜杵相聞曉甑香缸面浮蛆初滃滃小槽壓作春簷鳴東鄰麥磨連日響餅料已具蔞牙長磨刀霍霍割紅鮮銀鬛翻光趁湖上嵗䦨無事且招邀鄰曲披榛共來往為言今嵗勝去年來嵗應須更勝前去年除夜各走險荒村千里無人煙今年山舍一爐火妻子甥孫相對坐巷翁里媪在眼前共酌瓦盆行果蓏只憐舊嵗去無還惜此須臾未去間多情一宿尚難別况是相同一嵗闌固知無計得留駐只怕眠中不知去添燈續火甚殷勤起寫桃符覔詩句浣紗婦修竹柴門向山路晴日滿溪春欲莫浣紗少婦不知寒兩腳如霜下灘去少年間倚青梅樹一蓑蓬窗漏晚風蓑衣蓋秋雨蒲白早潮來小兒事扶櫓三尺鯉魚飛上天漁翁醉卧不能舉六月十四夜久雨新霽見月極佳坐觀萬堂中收拾塵霓湛然不作久不見此趣因書之以寄正仲久雨新霽如發䝉嫩月出海來屋東開軒靜聽百蟲語清光入沼翻簾櫳白日勞勞生萬事不如淡月含冥濛收心展體且髙枕合眼不管東方紅我緣居貧得清省晏起一粥黃昏鐘更深一頓白湯餅坐送落月沉西峰眼昏燈下不看字與書相忘如不逢漸妝少年辟榖效養取眼力成方瞳自行此法頗簡易有能修之神氣充臨役多憂劉正仲少忍一月毋匆匆正仲次韻謝證眀亦翁之作此意佳甚不次韻為報人言乍見易得好以我觀君久更佳古來善友晏平仲顧沮孔子胡為哉不如寒拾兩相遇撫掌吃吃笑口開雖然是中有機事笑人惡念自墮邪不如見惡亦弗笑惻然憫悟自嘆嗟醉翁四十早自號君年五十銜始題好翁地位君須到除拜甚稱何歉懷他銜叙爵此叙齒稱位不以官髙低他年同入隱逸傳何須羊馬卧青苔題余文叔山間四時之樓輕財好事余文叔磊落襟期端不俗外方避地客來多我亦從君借書屋屋前曲徑繞淪漪池上髙樓新結束一條碧澗貫虹飛幾片青霞排闥宿四時自換景自留是中雲月無春秋家家見山長在眼處處有山堪起樓不如此樓能著我磨墨題詩樓上頭主人之賢樂復樂青山曾見此客不楊白花案此詩原本未妝今據宋詩紀事及宋藝圃集補入楊白花懊惱隨風渡江水將心莫託少年郎少年一去輕萬里楊條插地便生根花性飄揚似夢塵恨不築城髙萬丈花飛莫放出重門珠簾繡柱香雲護祇有黃鶯知去路騎牛歌題厲歸真騎牛圖人騎馬我騎牛騎馬行大道青絲為轡金絡頭胡衣北笠見者走揚鞭指顧矜朋儔騎牛入山谷不羈不勒無拘束我只騎牛犢自隨母子相呼煙草緑騎馬不若騎牛安牛自肥芻馬傷榖我見騎馬郎白金入手遭鞭朴何如騎牛兒樹下髙眠無寵辱烏鹽角行山中一種烏鹽樹剝皮為角開春路牧童把去上牛吹煙草茫茫沒逺陂一聲兩聲兮桑青柘緑三聲四聲兮麥綻秧肥山花如火遮眉目吹此田家太平曲三年不聽此曲聲捲却地皮人痛哭碧桃碧桃本是仙人花仙人花裏飯胡麻初來此樹向誰得翠眉嬋娟萼緑華世間俗桃千百數溪谷往往蒸成霞紛紛見此欲羞死亂紅吹落汚窗紗陳宫露唾天水碧粉黛欲學爭咨嗟豈知仙妃作狡獪挼花染汁便爾嘉瑶池蟠桃即此種花飛不肻汚泥沙實成唯許方朔喫時時還戲王母家山甫畫松山甫作古松意造無定本枝枝藏太陰筆筆涵混沌氣吞千尺崖猶作飛瀑滾肺肝生洞壑槎丫出隱嶙奮臂盤礴餘墨漬筆不吮若人蓋天機豈為尋丈窘胸中有磊砢欲出不可忍恐是城南樹寫形難自隱嗚呼夾山自有真松圖朝夕左右陳座隅伐薪架屋聽笙竽好翁之計誠非踈曉霜成花日色凄淡炙背南簷記所聞見十月二十有二日霜凇成花泥淈淈黑旗一㸃飛過村居民縮頭那敢出又聞鄞騎入連山搜捕鄉兵火廬室台眀隔嶺易張皇紛紛徙家藏穀實須㬰又報兵首擒向來安民今未畢老夫開戶望前山且炙南簷半窗日出入二嶺行出童公入童公一嶺二水分西東前山萬竹入新路新路蒼海通方蓬入黃甘出黃甘一山二水分北南北南百谷㑹江海鎮亭下注南山潭問君何事經二嶺辟冦辟兵探絶境青山兩路雙闕開桑柘人煙在深井迢迢橫過澄溪頭水風激激流人影籃輿落日黃泥坂短策東風日將晚深竹人家少鄰並麥苗翠被鋪平田忍饑猶自念民饑餅餌風來一飽寬况今聖算窮幽遐檢括丁口究阡陌或說更戍起南氓或議關防驅北客中原隴土少人耕何惜就寬因去窄自古先王訂版圖兵農合一如常式嗚呼先王為民定軍例後王為軍定民籍嗚呼老儒臨風三歎息為國何如惜民力春雪去年臘雪已四白五白六白農夫愁麥苗凍熟鋤不得菜心僵死何時抽常年梅花已爛漫今者乾沒如拘囚枯枝尚黏紅豆緑細蘂初作蒼蠅頭紛紛黃雀狡於鼠窮閻有粟爭呼取老鳶自作攫肉謀空屋狐貍夜相聚嗚呼狐貍有屋爾得居室中居人今在無或言白骨如白雪雪亦有仁遮白骨緑萼香梅十樹咸淳間自內園買歸亂後尚存對之感歎縞衣黃裏緑雲跗仙家結束來天隅承平故態今尚爾流落空山成歎吁莫對此被渠惱惜花情重人先老多少當時似玉人埋沒沙場隨塞草杳杳宫車去不回上林雁過無書到內園今更不堪看蝶廢蜂休日夜昏玉砌無人寒兔入觚稜棲草野鴟蹲黍離麥秀今如此豈為梅花故斷魂詵十二弟以冬菊盆為余夀此花品金色而中心作葱管突起正如金荔子乃作雪中英一首謝之弟以冬菊為兄夀臨風多情為三嗅煌煌金碗覆金柈葱管玲瓏眀艷透重陽曾見金佛頭頂似旋螺踴泡漚別有一種金荔子心中簇簇髙堆起此時衆菊爭紛敷二品於中亦自殊况此千林骨立後何從得此金覆盂從來菊號霜下傑今當喚作雪中英雪中松柏不若汝剛貞孔云後凋特晚耳冬嶺落毛叉亂橫水仙山礬何足道此花便是梅花兄桂臺神龍不知身變化猶認潜鱗為故我先生曾出雨八紘浪靜波恬歸海卧先生兩處領桂臺夢寐一生遊學舍阿宜移扁就山窗鐵畫銀鈎金鈕鎖緑陰閉戶不知春長日觀書誰覺夏天上吹香遍逺山月中散影流清夜先生見扁如坐齊隨行不用木上座攀枝踏影弄猿鶴萬事不到桂叢下天下清芬是此花世間最俗惟檀麝後車還許樂天陪吟筆更須侯喜把幾人名遂不知幾一日倉皇方淚墮人知德祐不出髙豈識咸淳歸計果平生一瓣桂臺香口誦翁詩幾百過舊臺何在桂凋零日暮哀禽自相和今臺喜見桂婆娑往來不礙江鷗社舊臺不見見今臺依舊風流壓江左他年人訪桂臺游舊名更復因今播月中桂樹最久長此樹還如月輪大十二月初一日醉歌常年此日正月吉今年經閏臘月一嵗闌喜展一月期勝似戈揮魯陽日搔頭偶見鶩陳橫曝背間看蜂衙出一冬妍暖三月晴薄雪微雨麥壠青平臯十畞鋤溉畢眀年擬取甔石贏歸耕還有新權柄向時樵長今里正弟姪推尊不敢辭斗酒隻雞先自慶牧猪釀秫待誅求賣田買鈔博性命北人自好南人惡人事紛紛天未定君不見唐任濤宋魏間因詩放後逢寬令九日敏求與姪璋九萬載酒蓀墅邀豫與胡山甫潘少白及華頂周服之道士周若晦作客欲摘蘂浮杯叢委草間未有消息憫然賦之五栁先生貧缺酒不說無花過重九杜陵野客酒可賖只恨青蕊成蹉跎如今風物尤悽惻繞叢覔蕊無消息寒螀相弔野水流病蝶來偎寒日夕不見金錢將翠羽惟有悲風吹蔓棘古人愛汝非無意志士仁人例憔悴楚國無人屈子傷陶杜凄涼唐晉季此日何日悲更悲聊嗅青枝記一時往時好事環轍迹建業錢塘華盡識就中內本碧玉杯欲買黃金惜不得兩都風景今何如淚墮叢邉和露滴孤雁十一月初九日賦憂心悄悄睡未能開門看月一片冰竅木相磨作鬼語凍星入牖如螢青孤雁哀號向何處老夫掩耳不欲聽爾從沙場經萬里昔時繫書達天子如今若向上林過縱有書來誰取視陰山豁處狹如門結陳來時各有羣辛苦避鷹兼避弋前行半度後行分秋水江南無所畏老菰沉米蘆搖穗鷗鳬善熟少驚猜飲啄不爭逰且戲不知何事背羣飛欲宿無依去無疑天長路杳翅流血夜向霜凄聲轉微自倚能飛無與敵豈知天勢有違機作書好報前征侣看取悲鳴落羽時罪言匪兕匪虎吾道非鸜之鵒之侯不歸山南山北靡有定瀼東瀼西生計微頽牆宿莽露泥泥荒田野菊秋菲菲我止安息我行安之噫吁嘻過殷墟兮麥漸漸覽周原兮黍離離黍麥之秀黍麥之有無麥無禾不耕胡取白骨兮成豀膏肉兮成泥已焉哉想自古之如彼匪斯今之可哀死莫懲於既往生胡保其將來東溟之濵相奪相攘殺人填海浩浩不盈輪回報復此死彼生天假手於王師使盡殪於秦坑痛臨淵而一弔悲萬古之茫茫雜言瑣兮尾兮胡中露鸜之鵒之在乾侯朝吟九歎復五噫暮賡七歌并四愁白日曀曀中林幽幽墐塞兩版䝉茸一裘屋漏煤墮糜攪粕浮美人不來兮嵗暮誰謂霰雪滮滮落葉如雨杜鵑花杜陵野老拜杜鵑念渠蜀王身所變我今流涕杜鵑花為是此禽流血濺嗟哉杜宇何其愚萬事成敗皆斯須一枰黑白翻覆手揖讓放弒皆丘墟汝初一身今百億凝滯結戀胡為乎爾生不能存社稷死怨謝豹何區區至今有子不自保寄巢生育非良圖百億禽分百億花數若恆河沙復沙此花開時此鳥至青楓苦竹為其家錦官玉壘不可念翠華黃屋天之涯俚語云謝豹勸杜宇遜位于其相開眀故怨之今杜鵑若呼謝豹云不聞十月杜鵑鳥只見十月杜鵑花何必看花與聽鳥老夫日日自思家解梅嘲昨夜鵂鶹聲婉孌斗覺春隨呼喚轉今朝檢厯知立春屋角梅花笑初囅向人帶笑復含嗔嗔我今為異代民我語梅花勿嗔笑四海已非唐日照爾花也是易姓花憔悴荒園守空嶠閬風自是可憐人六十年來逢立春安危治亂幾畨見到此三年哭斷魂我是先朝前進士賤無職守不得死難學夷齊餓首陽聊效陶潜書甲子星回世换市朝新頭白空山與鬼鄰更有橫金拖紫客臨危不死穩藏身年根雨雪行霧雨弊弊生窮嵗雞寒入屋犬竇吠老衾破絮少溫存濕薪吐汁無氣勢一冬已近四月晴殘嵗垂垂㸃滴聲人心無底難為德一日不作將不食年頭未有五日糧井花水滿人閉倉
