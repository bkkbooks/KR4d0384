body:
  text: 閬風集卷九宋舒嶽祥撰七言絶句得正仲書相勉歸鄉作一絶復之老去無家天一方安貧樂土羡劉郎夜來一陳西風起聞得山亭酒味香短檠昔年曾讀退之詩墻角短檠吁可悲我有短檠元不棄自悲雙眼早昏眵老屋雨涴壁泥行蜥蜴風吟忩紙落蠨蛸空齊惟有書千卷夜夜青燈共寂寥靜坐偶成日午風休樹不譁蝕殘香篆伴南華忽聞霜鳥如春鳥間想蘆花作栁花作意投床寐不熟嗒然隱几睡偏安從來萬事無心好心到無心自是難寒食題山庵門插垂楊不是家自憐飄泊似楊花一樽和淚澆墳土餘餕分張及野鴉題蕭照山水有序蕭照山水四軸得之金陵縑素朽敗然林壑縹眇烟靄滅沒之態可見也丙子兵火以寄藏崇庵幸存第蹂踐汙損可為惻然汙此畫者其桓𤣥之客歟何寒具之跡尚存也丁丑六月二十八日曝書龍舒山致庵拂拭泥滓人與畫為之相唁也烟雨峰巒無古今斷崖迷徑靜愔愔隔溪樵子遙相語昨夜春流爾許深隔澗語樵林窮澗絶石崖傾臨水幽朋更欲登擬共前峯成小隱曉來雲盡見髙棱前峯小隱何人一舸下清溪列壑攢峰想舊棲不雨石林元自濕無雲山路只長迷清溪一舸翩翩涼樹小茅堂揖客柴門去棧長山外橫舟篷不啓誰知世有送迎忙野渡橫舟次韻答戴帥初送麴二絶亂離無酒何以活最愛涓涓淺酌時理到何須辨清濁興來誰解問醇醨子雲嗜飲苦不給時有問字人能來使我得裂醉鄉土為爾特築黃金臺桐嶧陽渾璞凱風心此是姚虞膝上琴我有全琴元不斫時擕枕簟卧清隂山扉未要携家入逺山閉門謝俗自安閒簷低還許歸雲度墻短仍將疊嶂環楊栁筏作此橫舟古栁間八風不動只如山夜來雨漲牂牁沒却道舟移過别灣十一夜月色凄淡數酌竟醉華胥國似可避世也冬暖熙熙作午晴紅梅花下一壺傾衰年未夜先思睡深閉柴門却月明平泉佳景清風截斷排簷雨返景燒成冠嶺霞定是來朝好春色海棠須作小桃花山狖暗穿黃葉響沙烏逺叫白烟昏採蘭童子歸來晚一道香風先到門九月二十七日曉起書夢老去無營百念寬只餘故紙未忘鑽小忩坐寐􅍭幽夢夢涉寒波賦楚蘭紀夢有序初八日曉夢乘款段行故鄉麥隴上見梅花兩株一紅一白意甚愛之有一人同遊故人也取酒共飲不知身在他山亂離中也寐覺之間恍成一絶其人誦數過既覺能記之款段徐行穩不危迢迢溪路見疏梅青枝欲挽憐香雪喚取芳尊樹下來夢歸獨行東阪茅茨屋回望西墻竹樹坡愁殺曛黃歸路逺兵殘人少髑髏多夢中作桃李成蹊春不言有人扶瘦倚欄干柔柔軟軟愁如困燕子初歸帶薄寒夢成山棠紅白間青林上有和鳴百囀禽一陳晚風吹曀去又尋桃杏說春心二十五日晚西忩坐睡夢美人出紈扇索題為題一絶既覺則童子已明燭矣忘其上三句足成此篇皎皎瓊華了不疑緑忩團扇索題詩風流自是天生句燕子梨花恰並時紀夢有序十月十二日五更夢師泉李珏尚書今不知其南北但知其在中朝官兵部尚書耳送二客來謁豫謀之先親薄有以贐之既而與出郊行回顧其後道士周希彰布褐芒屩亦至初見一所似村市列肆門盡閉但步櫩皆黑油忩用白紙糊約度可三四十間店之東有堂五間如津亭逢一人似識其面而忘其姓名衣巾裝束如行客揖豫而去堂東西夾有丈夫婦人十許人方飲食笑語中有婦人碩麗盛飾意其為邸第人也豫避而去之偶逢劉養源與同行少頃見有宅第一區門墻無甚髙大前對大路路旁林木水石可愛因入而遊焉園徑窈窕桃花盛開其特異非人間所見之比有指曰此玊桃也花肉紅色鮮麗不可名狀摘花頭就掌玩之其下有三足如黃楊子狀上若大笑花而明艷活動步廊周遭行無窮而花亦無窮遲回不忍去既覺猶不忘也世方兵亂安得有此處庶幾殘年獲逢治世而見此境界耶不然則流水桃花壺中天地抑豫二親已在此樂國耶故記之纚纚桃花萬樹紅徑回無復辨西東人間何處春風好若欲逃秦入夢中伯夷四海歸周莫不臣首陽山下餓夫身清風萬古何曾死愧死當時食粟人春晚還致庵亂後還山喜復哀舊書亡失等秦灰翛然山徑花吹盡蠶豆青梅薦一杯蕉徑小立晝夜中分凉燠平裁新尉故體輕清無端撓亂成多事剛種芭蕉作雨聲二月初三日曝睡山茶花白野棠紅誶語紛紛雀閙叢眼暗耳聾墻角睡真成老退一田翁去春達善分碧桃移植篆畦今春已作蕊達善前有見過之約偶立花下口占寄之春衫露染玊肌寒來自于闐植小園欲寄平安無好句不如來此共慿欄前年花在玊堂日偶和成編競出竒今日篆畦同寂寞碧桃無語我無詩老獵少壯登山腳似飛張弓安肯擬狐狸老來猶向兒孫話話著南山射虎時即事漁翁一葉舞波瀾不及牛童自在眠短笛數聲烟草晚柴門疏栁小星懸牡丹九枝初拆御袍紅艷質煌煌日正中曾對集英瞻衮冕孤臣灑淚立東風老棕馬鬃頻剪新心吐鳯翅初開徑葉森更有木魚三百尾山僧鍋裏煮黃金芰荷洲緑垤霞川濯錦香何人著屐上溪航數聲疏雨鳴荷葉兩岸清蛙報水涼啼烏詞月明雙影帶霜栖長憶青梧玊井西前度碧忩驚曉夢女奴驅遣莫教啼十五日雨後微月遺安堂前有梔花一枝適開折為佛供此夜清寒雨足清寒月色微風將幽磬落柴扉一瓶薝蔔修清供童子巖腰取水歸西洞宿雲悠然岸幘看雲歸出處無心也太竒未是為霖蘇旱日出山不似宿巖時十一月初三日插梅花古罍洗中因成四絶半映寒溪半映山不妨朱戶借清閒詩人帶得渠風味也有香名滿世間正是江村欲雪時柴門修竹見橫枝誰知句裡生香處只許疏簾半面窺雪中㸃綴精神好月下橫陳骨格真更有風烟生别恨隔簾遙望李夫人洛水湘娥剪曉氷枝頭五出幻飛霙夜來鶴踏髙枝折撒下階前碎月明和劉仙尉咏梅垂垂一樹壓疏籬最愛崚嶒鶴膝枝只占歲寒花盡後不爭開早與開遲古銅爐殷彞周鼎幾千年土蝕苔封洗滌全且與道人燒柏子不須公子爇龍涎即目藕梢菱蔓織橫塘屬玊鵁鶄度渺茫可怪插秧青雨裡暮寒清切水梔香櫧樹凌轢風霜四十圍白猿不上最高枝明堂未構材何用拋擲元珠滿地皮咏龍并序豫先人墓在香巖有湫二湫常現一龍時顯時隱世傳古有樵人見有老人坐石上近之即隱又嘗有兩龍髯現水中大如象鼻水沸激而上復流湫中水不盈也因號其山為龍鬚山今名龍舒以下多舒姓也曾見老人潭上坐忽然不見石泓深至今月白風清夜潭底時聞似笛吟戲咏玊簮花金線草二物金線草頭蜂展翅玊簮花頷鷺生兒忩前野草皆天巧也有閒人為賦詩即事二月東風始見梅山童折得數枝來銅瓶棐几修清供香鼎中間易卷開小春聞提壺鳥戲成越鳥憂兄行不得蜀禽勸客不如歸何如聽此提壺語美酒沽來總息機谷口萬朵千枝滿谷中合成谷口是墻東先生老向花中坐莫放東風落晚紅聞霰卷幔江湖二十年青山兀坐學枯禪夜來雪急敲忩紙忽憶吳江聽此眠冬夜雪月交光憶少年見此燒燭觀梅為之悵絶衰病難禁月色寒何人更倚雪中欄少年妙事今渾忘折得梅花小閣看題杏花翠羽物色春來多入畫趙昌片幅落吾家翠禽欲起還休去可是多情為杏花元夕龜藏夜坐冷火寒齊酒一樽黃柑分遺及諸孫菜園羅帛燈千眼說著承平暗斷魂平江燈最盛而菜園羅帛尤壯觀花隱誰識菊為花隱逸陶潛以後有濂翁落花别有堯夫愛此意與濓同不同中秋風雨夜深見淡月起酌一杯風捲浮雲去復來月明慘淡半簾開人生樂事不可料萬壑千巖共一杯虞美人草楚粧不入漢王宫寵愛如花悟色空世上女兒休笑我當年曾伴拔山雄借居夜聞水聲寒水泠泠出洞來月明靜聽轉清哀無人與入琴絲寫流下前溪漾落梅移葦洗籜移來栗玉乾翠禽相顧自依然從今風雨西忩外更憶吳江泊釣船老猿一笑已霜千丈髮三聲應斷九回腸巴陵月暝林巒慘巫峽江空道路長亂定復過西溪不過西溪三十秋亂餘重到淚雙流黃蒿滿地青烟少日暮驅車不敢留觀萬堂村飲戲成芋魁豆角烏櫧子不用山翁舉箸肥聞道細鱗長九寸夜來溪火急成圍代梅所戲答正仲用韻贈管城子二絶有序正仲和豫七夕詩謂北方以中秋月眀為利用行師其說未知出於何人恐非是考漢書髙祖紀秋毫無所犯文頴曰毫至秋乃成世傳此夕月眀則多兔感隂魄而生也此說近理故戲作此以正之誰將明月作邉愁玉兔毫成是素秋縛取山中毛氏族盛行文教寢旄頭離離漠漠總牢愁仰面書空一幅秋比似羲皇元未畫何須小楷作蠅頭九月初十日山房午睡恍見梅枝已吐白矣驚喜而作生愛梅花是性情故園阻絶淚縱橫夢中驚見南枝曝起繞山邊水畔行老梅已經和靖吟半樹又入花光畫折枝此語便經三百載此梅又閲景炎時閨怨一春心事許誰同金鑰無聲栁絮風怪得枕中黃鳥喚不知忩外海棠紅回廊曲徑入荷花斜隱珠簾半面遮欲繡鴛鴦嫌未似且拋針線理琵琶能把玉簫傳逺意難將彩筆寫秋光翠屏金鴨芙蓉冷夢短却嫌秋夜長貯雪成酥飣玊盤勸郎抄取一匙餐金針指冷愁花凍侍婢添香却夜寒春閨有恨無人可話心間吹栁絮度青林偶然省著前年事仰面聽鶯墮玊簮贈漁者本是浮生江海客持螯斫鱠酒家村一瓶說與長年道三日提魚一到門紅蓼青蘆媚一川夕陽偏麗晚秋天吹沙已老松鱸上日日江頭望釣船清明感舊楊栁家家去下湖有歌有哭共闉闍新孀少婦深深拜却引新夫拜故夫舊日都下風俗如此信亡國之徴也老漁少婦提魚入市㕓兒孫滿眼不知年醉眠還伴沙頭雁身在青天月滿船題趙大年小景三株五株依岸栁一隻兩隻釣魚船水天鵯鴨斜飛去細草平沙興渺然題周梅所藏小景畫卷小鴨鴉烏烟栁坡鵁鶄屬玉滿晴莎惠崇不作大年死惆悵江湖春水多燕嬉舟西湖錦舫簾垂額越上烏篷鐵簇頭江堰不通人已老竹深荷淨且遲留長林偶坐喬木超然兀老蒼一坡盤礴轉崇岡山翁偶坐談何事應賞江風一味涼海上口占獨步溪頭冉冉風莫雲當面失前峰近聞海戍移屯去漁火灘頭萬㸃紅漁父詞占斷江鷗萬里天不貪城市賣魚錢前村酒熟不歸舍楓葉蘆花相伴眠四月一日始聞鶯最是黃鶯愛緑陰數聲消遣别春心傍人只把鶯花並不道花時却懶吟墨誰傳易水廷圭製繅藉珍藏二百年進御近聞翁與葉琴形帶􅙧逐時妍螢老來不用映書帷草上流光數㸃微却憶江村無月夜籃輿一路照人歸紫木筆花簮筆侍臣輝荷槖絲綸郎省照薇花管城不任中書職咄咄書空蘸晚霞無題墮馬烏雲懶畫眉博山宿火翠烟微緑忩不掃香塵護暖日青蟲化蝶飛溪草鴨頭相間緑山榴雉頰一時紅白鷗飛起無尋處衮入梨花栁絮中緑樹陰中春雨過乳鴉聲裡曉寒生紙衾木枕清如水暗想山城又殺更清江似酒能迷客緑酒如江不醉人似酒似江俱莫問傷心最是艷陽春尋花不問村逺近愛酒能論巷淺深江上幾家官釀戶如今南北忘追尋竈户炊粳香似乳山童切餅細如絲黃鸝銜得春愁句玊管吹成楊栁枝白鷗滄海尋盟主黃鳥喬林命友生燕子不來人獨自東風扶我趁花行春風萬里虞姬草夜月千村蜀帝花已矣莫論如許事菜畦黃蝶繞田家雪村聞鵑故國亡來身己非千年猶訴不如歸參天古木魂迷路誰與黎侯賦式微十五日月明悽然無况因憶方泳道挽拙齊詩有人哭台明界天昏水石村之句故用其語以叙傷感月色清寒早閉門秋蟲依舊語黃昏老人心事渾如此舊住薌巖水石村雁老鴈移屯百萬回黃埃極目磧沙飛春風萬里梅花路渺渺江南人未歸
