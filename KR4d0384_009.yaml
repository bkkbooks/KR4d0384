body:
  text: 閬風集卷九宋舒岳祥撰七言絶句得正仲書相勉歸鄉作一絶復之老去無家天一方安貧樂土羨劉郎夜來一陣西風起聞得山亭酒味香短檠昔年曾讀退之詩墻角短檠吁可悲我有短檠元不棄自悲雙眼早昏眵老屋雨涴壁泥行蜥蜴風吟忩紙落蠨蛸空齋惟有書千巻夜夜青燈共寂寥静坐偶成日午風休樹不譁蝕殘香篆伴南華忽聞霜鳥如春鳥閑想蘆花作栁花作意投床寐不熟嗒然隠几睡偏安從來萬事無心好心到無心自是難寒食題山庵門挿垂楊不是家自憐飄泊似楊花一樽和淚澆墳土餘餕分張及野鵶題蕭照山水有序蕭照山水四軸得之金陵縑素朽敗然林壑縹緲烟靄滅没之態可見也丙子兵火以寄藏崇庵幸存第蹂踐汙損可為惻然汙此畵者其桓𤣥之客歟何寒具之跡尚存也丁丑六月二十八日曝書龍舒山致庵拂拭泥滓人與畫為之相唁也烟雨峰巒無古今斷崖迷徑靜愔愔隔溪樵子遥相語昨夜春流爾許深隔澗語樵林窮磵絶石崖傾臨水幽朋更欲登擬共前峯成小隠曉來雲盡見髙棱前峯小隠何人一舸下清溪列壑攅峰想舊棲不雨石林元自濕無雲山路只長迷清溪一舸翩翩涼樹小茅堂揖客柴門去棧長山外横舟篷不啟誰知世有送迎忙野渡横舟次韻答戴帥初送麴二絶亂離無酒何以活最愛涓涓淺酌時理到何須辨清濁興來誰解問醇醨子雲嗜飲苦不給時有問字人能來使我得裂醉鄉土為爾特築黄金臺桐嶧陽渾璞凱風心此是姚虞膝上琴我有全琴元不斵時擕枕簟卧清隂山扉未要携家入逺山閉門謝俗自安閒簷低還許歸雲度墻短仍將疊嶂環楊栁栰作此横舟古栁間八風不動只如山夜來雨漲牂牁没却道舟移過别灣十一夜月色凄淡數酌竟醉華胥國似可避世也冬暖熙熙作午晴紅梅花下一壺傾衰年未夜先思睡深閉柴門却月明平泉佳景清風截斷排簷雨返景燒成冠嶺霞定是來朝好春色海棠須作小桃花山狖暗穿黄葉響沙烏逺叫白烟昏採蘭童子歸來晚一道香風先到門九月二十七日曉起書夢老去無營百念寛只餘故紙未忘鑚小忩坐寐􅍭幽夢夢渉寒波賦楚蘭紀夢有序初八日曉夢乘款段行故鄉麥隴上見梅花兩株一紅一白意甚愛之有一人同遊故人也取酒共飲不知身在他山亂離中也寐覺之間恍成一絶其人誦數過既覺能記之款段徐行穏不危迢迢溪路見疎梅青枝欲挽憐香雪喚取芳尊樹下來夢歸獨行東阪茅茨屋回望西墻竹樹坡愁殺曛黄歸路逺兵殘人少髑髏多夢中作桃李成蹊春不言有人扶瘦倚欄干柔柔軟軟愁如困燕子初歸帶薄寒夢成山棠紅白間青林上有和鳴百囀禽一陣晚風吹曀去又尋桃杏說春心二十五日晚西忩坐睡夢美人出紈扇索題為題一絶既覺則童子已明燭矣忘其上三句足成此篇皎皎瓊華了不疑緑忩團扇索題詩風流自是天生句燕子梨花恰並時紀夢有序十月十二日五更夢師泉李珏尚書今不知其南北但知其在中朝官兵部尚書耳送二客來謁予謀之先親薄有以贐之既而與出郊行回顧其後道士周希彰布褐芒屩亦至初見一所似村市列肆門盡閉但歩櫩皆黑油忩用白紙糊約度可三四十間店之東有堂五間如津亭逢一人似識其面而忘其姓名衣巾裝束如行客揖予而去堂東西夹有丈夫婦人十許人方飲食笑語中有婦人碩麗盛飾意其為邸第人也予避而去之偶逢劉養源與同行少頃見有宅第一區門墻無甚髙大前對大路路旁林木水石可愛因入而遊焉園逕窈窕桃花盛開其特異非人間所見之比有指曰此玊桃也花肉紅色鮮麗不可名狀摘花頭就掌翫之其下有三足如黄楊子狀上若大笑花而明艷活動歩廊周遭行無窮而花亦無窮遲迴不忍去既覺猶不忘也世方兵亂安得有此處庶幾殘年獲逢治世而見此境界耶不然則流水桃花壺中天地抑予二親已在此樂國耶故記之纚纚桃花萬樹紅徑回無復辨西東人間何處春風好若欲逃秦入夢中伯夷四海歸周莫不臣首陽山下餓夫身清風萬古何曾死愧死當時食粟人春晩還致庵亂後還山喜復哀舊書亡失等秦灰翛然山徑花吹盡蠶豆青梅薦一杯蕉逕小立晝夜中分凉燠平裁新熨故體輕清無端撓亂成多事剛種芭蕉作雨聲二月初三日曝睡山茶花白野棠紅誶語紛紛雀閙叢眼暗耳聾墻角睡真成老退一田翁去春達善分碧桃移植篆畦今春已作蕊達善前有見過之約偶立花下口占寄之春衫露染玊肌寒來自于闐植小園欲寄平安無好句不如來此共慿欄前年花在玊堂日偶和成編競出竒今日篆畦同寂寞碧桃無語我無詩老獵少壯登山脚似飛張弓安肯擬狐狸老來猶向兒孫話話著南山射虎時即事漁翁一葉舞波瀾不及牛童自在眠短笛數聲烟草晚柴門疎栁小星懸牡丹九枝初拆御袍紅艷質煌煌日正中曾對集英瞻衮冕孤臣灑淚立東風老椶馬鬉頻剪新心吐鳯翅初開勁葉森更有木魚三百尾山僧鍋裏煮黄金芰荷洲緑垤霞川濯錦香何人著屐上溪航數聲疎雨鳴荷葉兩岸清蛙報水涼啼烏詞月明雙影帶霜栖長憶青梧玊井西前度碧忩驚曉夢女奴驅遣莫教啼十五日雨後微月遺安堂前有梔花一枝適開折為佛供此夜清寒雨足清寒月色微風將幽磬落柴扉一瓶薝蔔修清供童子巖腰取水歸西洞宿雲悠然岸幘看雲歸出處無心也太竒未是為霖蘓旱日出山不似宿巖時十一月初三日挿梅花古罍洗中因成四絶半映寒溪半映山不妨朱戸借清閒詩人帶得渠風味也有香名滿世間正是江村欲雪時柴門修竹見横枝誰知句裡生香處只許疎簾半面窺雪中㸃綴精神好月下横陳骨格真更有風烟生别恨隔簾遥望李夫人洛水湘娥剪曉氷枝頭五出幻飛霙夜來鶴踏髙枝折撒下堦前碎月明和劉仙尉咏梅垂垂一樹壓疎籬最愛崚嶒鶴膝枝只占歲寒花盡後不争開早與開遲古銅爐殷彞周鼎幾千年土蝕苔封洗滌全且與道人燒栢子不湏公子爇龍涎即目藕梢菱蔓織横塘屬玊鵁鶄度𣺌茫可怪挿秧青雨裡暮寒清切水梔香櫧樹凌轢風霜四十圍白猿不上最高枝明堂未構材何用抛擲元珠滿地皮咏龍并序予先人墓在香巖有湫二湫常現一龍時顯時隠世傳古有樵人見有老人坐石上近之即隠又甞有兩龍髯現水中大如象鼻水沸激而上復流湫中水不盈也因號其山為龍鬚山今名龍舒以下多舒姓也曾見老人潭上坐忽然不見石泓深至今月白風清夜潭底時聞似笛吟戱咏玊簮花金線草二物金線草頭蜂展翅玊簮花頷鷺生兒忩前野草皆天巧也有閒人為賦詩即事二月東風始見梅山童折得數枝來銅瓶棐几修清供香鼎中間易巻開小春聞提壺鳥戯成越鳥憂兄行不得蜀禽勸客不如歸何如聽此提壺語美酒沽來總息機谷口萬朶千枝滿谷中合成谷口是墻東先生老向花中坐莫放東風落晚紅聞霰巻幔江湖二十年青山兀坐學枯禪夜來雪急敲忩紙忽憶吴江聽此眠冬夜雪月交光憶少年見此燒燭觀梅為之悵絶衰病難禁月色寒何人更倚雪中欄少年妙事今渾忘折得梅花小閣看題杏花翠羽物色春來多入畫趙昌片幅落吾家翠禽欲起還休去可是多情為杏花元夕龜藏夜坐冷火寒齋酒一樽黄柑分遺及諸孫菜園羅帛燈千眼説著承平暗斷魂平江燈最盛而菜園羅帛尤壯觀花隠誰識菊為花隠逸陶潛以後有濂翁落花别有堯夫愛此意與濓同不同中秋風雨夜深見淡月起酌一杯風捲浮雲去復來月明惨澹半簾開人生樂事不可料萬壑千巖共一杯虞美人草楚粧不入漢王宫寵愛如花悟色空世上女兒休笑我當年曾伴㧞山雄借居夜聞水聲寒水泠泠出洞來月明静聽轉清哀無人與入琴絲冩流下前溪漾落梅移葦洗籜移來栗玉乾翠禽相顧自依然從今風雨西忩外更憶吴江泊釣船老猿一笑已霜千丈髪三聲應斷九囘腸巴陵月暝林巒惨巫峽江空道路長亂定復過西溪不過西溪三十秋亂餘重到淚雙流黄蒿滿地青烟少日暮驅車不敢㽞觀萬堂村飲戯成芋魁豆角烏櫧子不用山翁舉箸肥聞道細鱗長九寸夜來溪火急成圍代梅所戱答正仲用韻贈管城子二絶有序正仲和予七夕詩謂北方以中秋月眀為利用行師其說未知出於何人恐非是考漢書髙祖紀秋毫無所犯文頴曰毫至秋乃成世傳此夕月眀則多兔感隂魄而生也此說近理故戲作此以正之誰將明月作邉愁玉兎毫成是素秋縛取山中毛氏族盛行文教寢旄頭離離漠漠總牢愁仰面書空一幅秋比似羲皇元未畫何須小楷作蠅頭九月初十日山房午睡恍見梅枝已吐白矣驚喜而作生愛梅花是性情故園阻絶淚縱横夢中驚見南枝曝起繞山邊水畔行老梅已經和靖吟半樹又入花光畵折枝此語便經三百載此梅又閱景炎時閨怨一春心事許誰同金鑰無聲栁絮風怪得枕中黄鳥喚不知忩外海棠紅回廊曲徑入荷花斜隠珠簾半面遮欲繡鴛鴦嫌未似且抛針線理琵琶能把玉簫傳逺意難將彩筆寫秋光翠屏金鴨芙蓉冷夢短却嫌秋夜長貯雪成酥飣玊盤勸郎抄取一匙餐金針指冷愁花凍侍婢添香却夜寒春閨有恨無人可話心閑吹栁絮度青林偶然省著前年事仰面聽鶯堕玊簮贈漁者本是浮生江海客持螯斫鱠酒家村一瓶說與長年道三日提魚一到門紅蓼青蘆媚一川夕陽偏麗晚秋天吹沙已老松鱸上日日江頭望釣船清明感舊楊栁家家去下湖有歌有哭共闉闍新孀少婦深深拜却引新夫拜故夫舊日都下風俗如此信亡國之徴也老漁少婦提魚入市㕓兒孫滿眼不知年醉眠還伴沙頭雁身在青天月滿船題趙大年小景三株五株依岸栁一隻两隻釣魚船水天鵯鴨斜飛去細草平沙興𣺌然題周梅所藏小景畫巻小鴨鴉烏烟栁坡鵁鶄屬玉滿晴莎恵崇不作大年死惆悵江湖春水多燕嬉舟西湖錦舫簾垂額越上烏篷鐵簇頭江堰不通人已老竹深荷浄且遲留長林偶坐喬木超然兀老蒼一坡盤礴轉崇岡山翁偶坐談何事應賞江風一味涼海上口占獨歩溪頭冉冉風莫雲當面失前峰近聞海戍移屯去漁火灘頭萬㸃紅漁父詞占斷江鷗萬里天不貪城市賣魚錢前村酒熟不歸舍楓葉蘆花相伴眠四月一日始聞鶯最是黄鶯愛緑陰數聲消遣别春心傍人只把鶯花並不道花時却嬾吟墨誰傳易水廷珪製繅藉珍藏二百年進御近聞翁與葉琴形帶􅙧逐時妍螢老來不用映書帷草上流光數㸃微却憶江村無月夜籃輿一路照人歸紫木筆花簮筆侍臣輝荷槖絲綸郎省照薇花管城不任中書職咄咄書空蘸晚霞無題堕馬烏雲懶畫眉博山宿火翠烟微緑忩不掃香塵䕶暖日青蟲化蝶飛谿草鴨頭相間緑山榴雉頰一時紅白鷗飛起無尋處衮入梨花栁絮中緑樹陰中春雨過乳鴉聲裡曉寒生紙衾木枕清如水暗想山城又殺更清江似酒能迷客緑酒如江不醉人似酒似江俱莫問傷心最是艷陽春尋花不問村逺近愛酒能論巷淺深江上幾家官釀戸如今南北忘追尋竈户炊秔香似乳山童切餅細如絲黄鸝銜得春愁句玊管吹成楊栁枝白鷗滄海尋盟主黄鳥喬林命友生燕子不來人獨自東風扶我趁花行春風萬里虞姬草夜月千村蜀帝花已矣莫論如許事菜畦黄蝶繞田家雪村聞鵑故國亡來身己非千年猶訴不如歸參天古木魂迷路誰與黎侯賦式微十五日月明悽然無况因憶方泳道挽拙齋詩有人哭台明界天昏水石村之句故用其語以叙傷感月色清寒早閉門秋蟲依舊語黄昏老人心事渾如此舊住薌巖水石村雁老鴈移屯百萬回黄埃極目磧沙飛春風萬里梅花路淼淼江南人未歸
