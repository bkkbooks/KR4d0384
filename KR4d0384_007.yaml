body:
  text: 閬風集卷七宋舒嶽祥撰七言律詩贈敏求抄書滿架筆無塵自是餐霞洞裏人性癖貪吟如好色話終更僕尚留賔愛花更縮栽蔬地開徑還通指竹鄰不是不貧貧得雅如今金塢總輸貧戲贈牛女擲果久憐潘嶽好投梭不放幼輿癡彩雲似扇羞郎面新月如弓學婦眉喜鵲成橋終有别陽烏出海且教遲如何自古占天者不說經躔有動移三月二十三日效樂天體習習東風白苧裘餘寒未盡滯清愁栁疑楚舞腰偏細鶯學吳音舌更柔好景良辰千古在騷人墨客幾時休一年佳致惟春莫可惜花飛人白頭小酌送春春風元逐土牛來欲去金錢買不回莫道鶯花拋白髮且將蠶豆伴青梅落花流水辭梁苑芳草斜陽上楚臺老子不嫌間寂坐緑隂如屋兩三杯次韻答孫平叔感春之作從教鑿石置官場不怕滄溟地脉傷薜荔斸開山鬼泣莓苔迸出水精涼東周以後一春夢西晉于今幾夕陽自有青天開豁處髙秋買棹泛蒼茫往時平叔所居樟林山出白石如水晶有㫖遣官鑿之五陵三輔少年場往事歡娛總不傷閲世鶯花見興廢隨時蜂蝶有炎涼原嘗館寂生春草田竇門荒掩夕陽漢殿唐宫亦如此由來天道本茫茫江湖處處尋春去每到芳時醉不歸簾幕生香花欲語池塘細雨燕交飛閒思此事真難得或恐他生願不違欲作三門終老計買山囊罄值年饑寄王真人象簡銀冠覲冕旒一清沆瀣九天秋西湖處士梅花屋太乙真人蓮葉舟聞道遼東來白鶴不知函谷度青牛人間天上無拘束且駕長螭賦逺逰梅花二首遺正仲少見折贈之意晴暖不妨臨石瀨清寒多是傍柴關香鬚蜂咬應知苦斜影僧眠得占間數㸃稀星枝上下一㾗殘雪樹中間入冬冷落愁眉結見爾鮮明故展顔三月十七日食櫻桃蠶豆知麥熟日至矣示家人為我進一杯也清明已自斷百果櫻豆從頭次第嘗青山四面欲春晚白髮千丈照溪長偶然坐石雲離次久不窺園竹亂行甔石屢空惟食粥平臯聞道麥鬚黃郭似山道士寄惠竹筆兩束啓緘乃羊毫也作詩戲之似山惠我筍絲筆乃是長鬚公子毫竹簡固應同祓滌琅函寧肯近腥臊若非月裏霜㕙穎恐是仙家雲鹿毛潤筆定須三百束為君滴露注莊騷賦素馨花此花自正仲宅移植于此小蕊清香真有韻柔條纎葉不勝春承平時節移新主離亂風塵見故人淚重䦨干添婀娜香殘篤耨駐絪緼舊恩深淺君自㑹莫問誰家時與親賦橘花次正仲韻璘娥琢月剪氷花著葉團團更不斜只把青葱爭玉樹不將夭冶鬬金沙吹香自滿騷人國成實還宜野叟家老我真成被花惱尊前坐嘆復行嗟逰潘嶴魏都冶墓菴弄日微隂駕筍輿柴桑五子共擕扶雲門鍾鼓先朝賜丞相門庭近日殊緑樹兩行溪貫串青巒百摺路縈紆惟餘守冢鷹窠在採捕令嚴無牧芻墓道有角鷹産子有司禁民樵采螢熠熠孤光闔復開黃金一㸃亦微哉凌風欲作炎雲助入屋翻疑夜雨來本為微明生腐草誰知殘照落莓苔暗飛只合藏形影羅扇收來却是災正仲過我一宿蓐食而行叙懷追餞之又見王師下海夷書生筆硯自非宜風塵宇內成百戰花塢山中自四時故舊凋零今已矣江山寂寞子何之籃輿載雨匆匆去一飯無因話别離楊花斷茸冉冉青樓外浮影悠悠紫陌間晴日暖風真得所逰絲野馬與俱閒舞經林苑鶯銜去飛去簾櫳燕掠還莫把蘆花來比擬秋深客子更愁顔三月之朔邑庠請僕升講席說詩泮水正仲用前韻紀之因次其韻春服初成冠與童聚觀王式一衰翁圓冠方屨還吾道續衽鈎邉見古風投戈猶待漢符赤藏壁不隨秦火紅寧可短衣充博士莫令城旦屬司空次和正仲詠荷花月露二景天香夜氣兩交加艇子歌眠宿妙花誰展銀泥鋪水色更調汞粉拂霜華即空是色非二景有象無聲别一家此際含羞花正斂明朝一片落驚嗟風清月白天垂碧有恨如羞半斂花紅袖粉痕晨帶濕翠盤珠影夜生華楊枝灑潤菩提雨薇水流香仙子家幾度曉風過麴院七年不見使人嗟謝彌大惠萬嵗藤杖青山節節皆龍冢蛻骨崚嶒幻此藤栗楖生來呼上座獼猴拾得奉胡僧子能致此鬚牙具我試携之氣力增欲上泰山賔出日便須著腳共猱升又詠萬嵗藤杖酬正仲併謝元惠主人潘少白不求海上千金藥且覔山中萬嵗藤潘子入林親揀得舒翁履險力扶能乞君瘦硬蒼龍節伴我清羸病鶴形莫向潭邉令照影忽然變化老誰憑正仲訪余棠溪帥初來㑹正仲時余欲歸閬風未能決書呈三友晴雲髙舉雪雲低日日占天候不齊菘白僵成茭白筍麥黃淹作韭黃虀江湖吐日黿晞甲山路成泥獸印蹄老去欲休官不許夜來魂夢舊山溪暮春書懷寄董正翁寺正尋春曾作太平民說著花時淚濕巾風雨差池桃杏過山林牢落鳥烏親書中悶見傷心事畫裏思逢避世人霄漢故交今隱遁有山堪買願為鄰賦水仙花冷淡不生桃李徑只將素艷伴紅梅冰清玉潤檀心炯日暮天寒翠袖回似倚蘭舟并桂楫羞稱金盞共銀臺誰將六出天花種移向人間妙奪胎同正仲賦鳳仙花其子名急性不耐人觸也本愛真紅一種竒後來紫白自繁滋青冠輕舉真仙子彩羽來儀瑞鳳兒石竹通家分異樣園葵附譜亦多姿莫嫌性急難攖觸我以為規勝佩韋七夕呈正仲金風璧月清涼境紅蓼青蘋迤邐秋漠漠蛛絲穿露重微微螢火學星流何年才子誣躔象幾度佳人候女牛一局爛柯經數代人間隔嵗未悠悠剪春羅誰裁婺女輕羅段我有并州快剪刀色似山丹殊少肉形如石竹亦多毫胭脂初褪黃先露蝴蝶才成翅未髙欲向小窗成扇面世無陶縝倩誰描又戲和正仲賦剪春羅昔時剪綵聊為假今見裁羅却是真葉底綵窠本機户花邉線草是針人獨客書齊思拆補靜姝繡閣學縫紉晚花開遍幽畦草石竹山丹及麗春示兒蛻蝶將舒魄尚凝如癡如夢復如醒風吹海水飛成雪月入梅花膠作冰有口勿言唯飲酒無家可著不如僧眼前喜見行王政已有添丁充踐更時州縣抄具丁口九日與正仲子堂君英舉酒于篆畦璋萬二姪男庭堅仲容仲堪叔獻季臨與焉登髙勝具何人有重九佳名此日臨老眼已昏空悵望壯心猶在惜銷沉天真呈露青山瘦世故流離白髮侵漢水沈碑今出否古來賢逹共沾襟九日觀萬堂小酌懷正仲及梅所鍊師極目冥鴻皓氣初人生快意食鱸魚剪來茰菊觴新酒麾去蚊蠅俯舊書騷雅劉郎今健否清修周老近何如篆畦雨裏青蒿長寂寞無人過草廬新涼慙愧秋風慰白鬚夜涼早已入籧篨白蓮社裏幾人在黃菊尊前萬事疏老婦自欣瓶有粟兒童休恨食無魚故園紅桂通消息定有新詩一起豫六月甲申雨後涼氣如秋蘋花消息入踈櫺六月何曾有此清晚飯出門新雨過深衣臨水早蟬鳴月西人影如鴻影風裏松聲帶鶴聲此意寂寥誰㑹得沉沉默默自含情鬢邉嬌天工施巧亦無窮開盡枝頭入草中先借豆花來作樣旋將槐蘂綴成叢淡勻弄色薔薇紫深蒂含胎豆蔻紅可是夏英無勝汝鬢雲一朵愛瓏鬆免役後登山園小飲書懷深憑歌酒送流紅岸幘披襟萬頃風一斗白鷗蒼靄上數篇黃鳥緑隂中不辭老疾餘年在已付歡哀萬事空新荷使家除户役安居從此異征鴻辛巳自夀六十三翁自荷天亂餘骨肉幾家全不材幸度龍蛇嵗多病休催犬馬年我老思親空有恨人生不飲更堪憐差池九子森童冠屢舞交酬且眼前詠芭蕉虛明旱藕千絲透清冷寒泉百脉來緑燭怕燒先自障青箋欲寄倩誰裁正憐夜雨敲篷響只恐秋風裂扇開月下徘徊清影動却疑翠鳳下瑶臺詩訣蕢桴土鼓為聲始天球河圖非琢工欲自栁州參靖節將邀東野適盧同平原駿馬開黃霧下水輕舟遇快風歷厯瑶琴怨遙夜泠泠玉佩度秋空寒食書懷二首曉寒颯颯侵駝褐山色盈盈入酒杯人物風流隨逝水故都文憲沒蒼苔黃鸝杜宇匆忙過盧橘楊梅次第來氣運總隨時節變人逢寒食自須哀天機妙處莫形容難把丹青寫太空萬古碧山留色在千江皓月此心同烏紗燕子開門雨白髮楊妃掠面風欲問清明休檢厯杜鶻啼血滴巖紅和正仲月季花此花以四時季月開亦名長春一種白色又名月桂陳簡齊詩所謂人間趺宕簡齊老天下風流月桂花一壺獨向叢邉盡細雨霏霏濕暮鴉者是也風流天下真難似惜向籬邉砌下栽依舊風情三月在斬新花葉四時開莫嫌緑刺傷人手自有妍姿勸客杯不擬折來輕落去坐看顔色總塵埃詠凌霄花凌空千尺走龍蛇隱映柴門野老家拚把長纓縻落月亂飄丹粉染晴霞猿猴升慣能收藥蝴蝶低飛不到花最愛豹林种處士紫英香裏岸烏紗卜居丹青不用畫吾廬小小茅茨住近湖欲探春風先插栁要看雪景更栽蘆野船搖處沙成叠海鴈眠來草似鋪粧㸃箇中新景致藤冠布褐老癯儒田家紀事濛濛土霧連三日父老傅經十七年蠶月人家多忌諱麥秋時候好安眠桑鳩逐婦應嫌雨社燕依人不避烟短䇿緑隂新似沃頃筐朱實寫來圓山齊觀物自古詩人皆格物山齊觀物意如何額塗金粉蜂歸穴腹吐銀絲蟢布羅雞母載雛行啄黍雀羣欺燕坐爭窠紛紛擾擾為形役閒補涪翁演雅歌次韻和正仲種菜種麥二首賸欲栽蔬抵食魚蠧繁骨立謾長吁畦丁傴背揮叢篲雞母將雛啄淺蕪菜字元修須雨長菁名諸葛待霜腴閉門欲喫無憂飯已戒譍門早了租稻畦已改翻泥細麥隴初分趁勢斜觳觫倦耕眠樹下畢逋得食下天涯嫩晴微雨調時序臘雪春風潤土砂避地山村成保社倚需湯餅及鄰家賦葦山居種葦意如何相見滄江渺渺波窗外近移秋色早夜來偏覺雨聲多微風動葉蜻蜓立暗浪衝根郭索過誰解寫成團扇面蕭蕭殘雪卧漁蓑三月三日欲過小園聞海棠未開翦韭獨酌有懷尋芳自是少間身世故紛紛更咈人一筯小園初韭脆三杯荒舍晚醅新雲藏栁葉裁難斷月入梨花辨不真每嵗海棠時候近今年寒重殿餘春九日懷故人留燕京者青山淡佇半簾雨碧樹嬋娟一院隂醉舞狂歌前日事微吟淺酌此時心菊花儘晚秋有味楓葉尚彊霜著林萬里故人關塞隔賔鴻應有寄來音苦牙動詩并序豫與正仲小酌西忩偶苦牙動戲有句云病牙臲卼活書板蓋是日偶讀宋類苑見有活書板是也正仲因以短髮䝉茸退筆頭為對足成八句豫亦用此句聨為和篇斯詩人之善謔也身心自縳似芭蕉安得凌風厯九霄間户人隨春去老倚闌花向雨中消病牙臲卼活書板童頂羸垂倒藥瓢善謔偶然成句子叢談聊以永今朝八月初十日瘧起行園瘧鬼自與詩人謔小兒狡獪弄炎涼蔬肥夜雨園丁逸果熟秋風稚子忙枕臂閒思新藥竈扶頭欲起候茶槍故園青桂華如水歸泛天風浩蕩香槍借韻陳簡齊謂之詩家便冝喜聞鄰家食早麥七十三翁飲上池始知糠籺也生肥麥鬚似筆山雌下荷葉如錢海鳦飛天運無窮人自老川流不返志多違舊時此日嘗新日蚤筍窗前一尺圍正月十日新晴觀正仲所寫篆畦藁亂離又活十年身帝閔吾徒已甚仁近厚施為回世運至和涵養合天真花間醉客能騎馬栁外鳴禽似喚人酬唱小編情性好伊祁留得一分春寶相花春風不到上林花流落民間日又斜曾向玉堂承雨露可堪金屋委塵沙生來富貴由天分到底風流出內家莫訝緑繁傷手刺幽貞難犯可吁嗟兒曹請賦草間黃花樹頭緑葉無花看樹下黃花帶葉開火化新錢忘鑄字金成小盞缺施臺貴人亭館何曾識野客園林不用栽鬬草兒曹求入詠蒼苔留坐獨徘徊賦杜若花汀州春晚樂忘歸野草幽花興趣微翠葉參差舒鳳翮斑心㸃綴戲兒衣掌中玉燕翩將舞叉上銀蛾亂欲飛便想此身為釣叟滄江煙雨白鷗磯喻客踏雪相過客定嘉瓦燈何事凍成花捕螳者雀雀憂彈甘帶為且且畏蟆寒拾相逢成一笑觸蠻互勝足長嗟人生只是爭名利名利看來細似麻晚晴九十日春長雨雪喜君今日詠新晴緑隂四面招人坐芳草前頭試我行少駐飛花終有别愛聽啼鳥忽無聲東坡已作秋陽賦欲賦春陽恨未成歸故園并序余辟難明越五遷至版坑棠溪袁仲素兄弟邀館其家已丑六月十六日始就之明年三月歸閬風寓于鳳栖塘田舍行視篆畦故物無一存者惟咸平古松及瑶池無恙耳作歸故園二首遺正仲千家桑梓兵餘痛十世松楸火後悲瓦礫成灘無鳥雀荆蒿如杖有狐狸咸平樹在枝柯損晚易書亡目録遺半樹瑶花微雨裏向誰寂寞淚將垂晚易舊齊名也辟兵辟冦走他方六遍移家路轉長百醉與君同出處五窮隨我共行藏栁花暗度誰家竹燕子寒歸何處梁最羡劉家好男女穩拋家事客原嘗百醉見樓攻愧集四月一日霖潦新霽痼疾稍瘳乍歸故園拂剔叢莽衰翁病起頭初裹拄杖穿林探笋生悄悄菰蒲看鳥下踈踈楊栁見人行一春長雨花全瘦半日佳晴蝶便輕小立緑隂青子下穠華洗盡總幽情和正仲詠荷并序一葉一花此寫生馮家之畫法耳必如此花葉乃無踈密之嫌真花未必然也畫筆作荷止有風晴老嫩之本月露精神有不能盡曾聞畫史傳真訣一葉旁邉定一花莫把風晴拘格範好於月露寫精華耶溪舴艋花間屋苕水鴛鴦葉底家浙水東西江路絶坐吟濓說自咨嗟夜讀達善燒㾗漫抄次來韻奉謝桓桓松柏嵗寒知白髮相逢也自竒猶記小儒曾共勘絶憐後藁未全窺斯文定價何必我自古趨名存者誰惟有立言差不朽夫君此計未應癡次韻山甫松石浮榮流潦一盈科獨此堅貞嵗月多入土同時成琥珀為槎何日到天河英靈真是隨星隕磊砢誰能把劒磨今日尚疑龍蛻骨當年曾見鶴成窠次正仲别後見寄韻同聽精舍對牀雨憶著西湖一舸天何必錢神能使鬼只須酒聖與逃禪作文自昔少稱意種學何時大有年凍餓一生秪百嵗聲名須在後來傳庚辰冬帥初與正仲約過閬風既而豫坐病二友亦不果至辛巳四月帥初特來訪豫時尚在病中為豫留山庵一宿而去似不欲勞豫應酬耳歸至中涂有詩見寄豫次韻因貽正仲也杜宇啼時多是雨酴醿開後便無春惜花底學千金子對酒還思兩玉人良藥草中間長葉幽禽花裏巧藏身青山百里通來往衰病何曾厭客頻正仲次帥初前韻見示數日相訪再次韻酬之絶憐幽谷此相親屋角來禽作小春梅笑故知情熟客犬迎不是眼生人青燈知子别來意烏几扶吾病後身莫怪柴門長日掩俗交正復厭頻頻舊時邉閫城門兩邉設板榜大書云眼生人隨後蓋防異色也次韻兒時人道是竒童末路翻成眊矂翁燕去燕來催嵗月花開花落共春風有金斑鬢難重緑無酒衰顔肯更紅夢境如今親厯過何須學佛更談空七言長律金線草葉圓如錦葵芝草青紫色有脉如荷葉夏間作花如蜂蛾蜻蜓之屬宜植階砌隂濕處花心有紅紫細斑不生子於其根莖之側四散垂條如蓴絲杪如蕨菜芽條所著處輒生根成莖葉以其條似線故得名有一種花葉條莖則同而葉上有毛無紋亦以有條名龍鬚以其葉圓故名虎掌二種皆有之小民取之以治藴熱金線比方渾未盡玉函收録尚多遺盈盈蜂蝶菩提葉裊裊蜻蜓菡萏枝舊時都下花工作翠花名菩提葉綴以蛾蟬之屬作小荷葉名滿池嬌則綴以蜻蜓茄葉之類浮動其上金線草之花葉正似之寒女有針縫不得山人無衮補何為芝莖底事生庭砌蓴葉胡為上井湄剪綵不香難作實垂絲著石便生兒莫輕小草㳂幽僻也有凌霜傲雪姿
