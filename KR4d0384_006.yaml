body:
  text: 閬風集卷六宋舒嶽祥撰七言律詩詠紫荆花自古惟聞棠棣詠後人多感紫荆回固知天理隨機觸亦本詩人起興來枯條誰綴桃花米嫩蕊初挼撒酒媒野老門前栽一樹才開桐角此花開登樓千年日月藏丹鼎萬里乾坤著白頭落木斷虹天渺渺閒雲倦鳥日悠悠開門白海通諸島極目青山是别州我欲便騎黃鶴去回頭還有故鄉愁和正仲送達善歸錢塘韻二客論交自有時篆畦相㑹不相期家如元亮貧更好學扺申公老未衰好詩甚似無聲畫昏眼羞同沒字碑買地近來聞闢圃樊侯種漆未為遲水金蓮波心隱隱金椎出只道馮夷先導來笑口漸開黃玉罋丹心初見小蓮胎步花想見江妃佩燒燭那從水殿回傳記無聞今始著莫嫌間客少詩才題巾山翠微逆水遊鯤去不回兩鬐插背尚崔嵬月將塔影和峯轉風作潮花入寺來星斗四垂雙闕壯乾坤一覽八窗開山僧高卧還知否人世如今換劫灰梨花新葉輕柔宜與藉芳心疏散不須茸象床骨冷驚春夢霧閣神清怯曉風雨裏多情危有淚月中澄瑩望如空清明寒食人何處金谷昭陽事不同牽牛花卉中深碧斯為最繡蝶紅蜻宿近枝巧補疏籬陰漠漠善緣高竹實纍纍滿承秋露瑤杯瑩半斂朝陽翠袖欹入藥性寒君莫棄良醫疏滯用隨宜石上種劔蒲其脊成矣非陶隱居所謂溪蓀者耶崑山片玉天生潤鴈蕩移來手自栽禪客久親清少病山童勤拂淨無埃葉端灑灑通心露根畔疏疏引水苔必有事焉還勿助此方端自養原來菖蒲最難養置而弗省則弗滋勤勤拂拭則病矣余性甚嗜之往往不特人病苗而苗亦病人矣講求其法至備嘗為之作譜書留南郭楊建處建攝令黃巖死於兵無從問矣端午日尋石菖蒲偶成一律多忘昏昏久廢書間來石上採菖蒲瘦鞭走石蛟龍窟細葉穿苔虎豹鬚陰洞容光明復晦乳泉盈坎潤難枯試拈九節風前嗅已覺登仙不用扶六月十一日山窗散愁平生志大孔文舉牢落依然不可羈茨闔小窗巢燕子菰蒲新雨試鵝兒胸襟大悶書不讀口吻微吟人未知安得一簔江海去持螯作鱠卧鴟夷賦眼昏不為吟哦苦苦頻老逢憂患損精神見人依約近方省認字微茫久未真漠漠江山渾水墨冥冥草樹隔烟塵何人解呪揚枝水洗淨從前業障因次韻正仲秋晚感興有序每得正仲秋篇必先鋪叙所見聞不必左史倚相之讀墳典也蓋古事已有傳之者而新聞就泯吾懼無述焉儻因此而增長之則咸淳德祐故老所傳猶可一二不沒也十月十九日舉頭無路見長安十月江南有朔寒岩瀑飛來雲影濕溪霜著處葉聲乾相思一夜心先醉欲話前冬鼻已酸愛爾和詩添記事愁來時解錦囊看次韻答胡山甫避地述懷時豫有結茅馬奧之意兔迒鹿町便為家不怕飛騰萬仞崖此日披榛尋細路他年買地卜幽齊山風索索鳴林籜野水洄洄泛槮柴到此冥心齊物理藉茅枕石氏無懷有感風雨翛翛花事闌餘寒迤邐麥秋天一春不見飛蝴蝶幾夜初聞叫杜䳌林外畫眉誰嫵媚花間繡眼自便翾上林還有嚶鳴否此日春歸一黯然玉毬花花開壓徑枝堪挽花落鋪階雪不飄繭老蛾成投緑水香乾蝶散離長條滿地月明濃不掃無人梅落怨難銷老人别有心中事愧爾投瓜乏報瑤問信鳯棲老子近何如骨格崚嶒久病餘新酒得時招近局小樓無事憶亡書眼昏長道青燈暗頭癢空將短髮梳昨夜西風吹海動磨刀準擬膾鱸魚蜜蜂官課有嚴投急影公衙未退沸繁聲香材聚斂千家圃兵衛森凝百雉城額上粉輕春尚早股間金重日初晴百蟲未敢梅花近唯有渠來蹴雪英題劉君英石屏天碑萬古閟嶙峋自我來追此日新旭日小村鳩喚婦寒霜疏木鴈來賓路長橋斷誰家店天逺舟行何處人萬頃黃蘆秋色裡是中著我坐垂緡次韻記馬耳峯舊遊牙軸珠聨祕籥縢曉窗開卷見詩朋曲渠荷葦鳴新雨深院茶梅響落氷山市雪晴邀試酒溪橋月好近燒燈玉泓不放花流出聞有潜魚解避罾遊玉澗日俞澤民說潭有潜鰱長數尺隱見不測樵者見之而釣者莫獲也次韻酬正仲絲窠鼠跡鎖書縢老去斯文屬友朋凍芋共煨須熟火寒葅對嚼欲生氷山深有客傳詩藁庵小無僧上佛燈西去薌嵓才半里有蛟寒蟄得沉罾周梅所携正仲再和借書韻見示次韻報之少日從軍輝緑縢如今一室與雲朋低眉深閉車中婦背俗空懸木上罾何幸傳衣歸六祖莫忘受記出燃燈相期何止詩篇事大節無虧誓飲氷七月十五日競傳有鐵騎八百來屠寧海人懼罹仙居禍僦船入海從鴟夷子遊余在龍舒精舍事定而後聞之幸免奔竄深有羡于漁家之樂也作漁父一首年來避世羡漁郎全載妻兒雲水鄉隔葦鳴榔分細火帶苔收網曬斜陽一絲寒雨鱸腮紫半箔歸潮蟹斗黃欲逐鴟夷江海去西風無奈稻花香次和楊中齊讀閬風菊譜因覔本植齊前韻為愛寒花晚節香故栽松徑與茅堂壽思園綺眠商嶺清想夷齊遁首陽俗眼只貪金帶紫一種黃色而帶紫俗號北紫綃金丹心惟喜御袍黃先生逺覔陶潛種急作山書寄孟光端午感懷曽飲昌陽七十三老來大布當輕衫豫儲當採三年艾緩計空尋六日蟾楚俗舊時沉黍恨唐宫此日賜衣霑梔香滿院人如玉尚想薰風半捲簾正仲入鄞叙懷送别二首遇事無心心自放如今心事放尤難酒開愁緒湯澆雪書潤枯腸火養丹欹枕啼鴉分曉色把杯歸鴈破春寒君來訪我連朝雨三日新晴理去鞍此别未知長與短一春風雨助凄然欲隨流水入城去更繫扁舟話栁邊芳草斜陽新住蝶落花飛絮亂啼鵑鴈蒼山好須回首便見秋風在眼前正仲有詩因次和再别好客分明為我來不嫌茅舍似雞棲歸雲古樹如新畫久雨蒼崖失舊題别我此行正月盡懷君老眼兩行啼丈夫出處有常度不為黃金顔色低夢笑過盡江山十萬鴻梅花昨夜笑東風客行草樹綿綿外夢覺烏鴉渺渺中天道難知龜不信人生有恨水無窮今年厄閏有如此萬事繩牀俯仰空十二月初八日曉夢歸故園紅藤枕上到家園花木蕭疏可若干陋巷夕陽人悄悄舊墻新雨竹娟娟數聲啼鳥春愁破幾㸃殘星夜話闌世事旋消還旋積只留青史得千年野老野老巢居江上成相親幽事逺浮名近村飲酒携孫去逺寺尋蘭領犬行麥老秧高關念慮花開果熟有將迎舊時風俗今誰有見爾令人憶太平有懷正仲還鴈峯詩松聲夜半如傾瀑憶坐西齊共不眠一鼓輕雷驚蟄後細篩微雨落梅天臨流欲渡還休笑送客歸來始惘然掩卷有誰知此意一窗新緑待啼鵑戲述任翻詩句酬儲梅癯見和之作我愛巾山去復回城中平地起崔嵬前村清景何人占絶頂新涼幾夜來鶴起露翻松磴響僧吟月上竹房開任翻鍊得清新字想見斯人百念灰四月初一日積雨新霽偶成渺然清興憶江湖縛住此心安破廬新緑池塘魚散子落紅園徑鳥將雛青梅成後少佳果苦蕒出來無好蔬老疾已艱登陟具誰能為作卧遊圖挽愛山李德夫不為時新刺繡紋鵠袍鶴髮自相親襄陽須有漢耆舊彭澤終為晉隱淪往往名場躋後輩時時相衮問斯人如今天道平如槩得失榮枯一幻塵即事麥熟南風挂衲畦山禽快活曉來啼中分草色柴車路半壓藤花石步溪茅屋數家深避馬竹林三里逺聞雞荒村得句將誰贈牆壁還隨即事題次韻和正仲南風有客披襟曰快哉豈知元自舜絃來但令酷吏暑先去足想蒼生愠自開樹影縱橫流院落荷香來往護池臺公權只賦生涼句不道閭閻正苦哀十月十八日聞鴈一聲空杳分千響萬里荒涼月正明共說江南舊來處還思沙漠逺行程如哀如怨知何事相應相呼也有情驚起蘆花不成夢江城應是報嚴更新厯未頒遺民感愴二首貽王達善曹季辨胡山甫戴帥初諸君皆避地客也故國山河成斷絶孤臣江海自飄零窗間取月離離白樹下窺天碎碎青一鴈不來山驛靜千梅欲動客愁醒新來未賜王春厯三尺堯階自有蓂寒氣著人身似病世塗多故鬢如銀劫灰今信胡僧說野燐多應戰鬼新兵甲縱橫滿天地衣冠顛倒走風塵古今厯數歸仁義河洛圖書屬聖神自和前韻答達善一字不輕王達善忽看唾玉落鈎銀共評中說躋尊魏誰草𤣥經飾美新大澤深山容避地蓬萊弱水歎揚塵與君同勘丹經訣長飯青精養谷神幽幽叢薄無塵到渺渺菅茅有露零松曲似腰元自直潭澄如眼向誰青千愁淟涊那能浣萬事凄迷不欲醒陰晦終逢開霽日宫槐移影度階蓂再和前韻答達善季辨屝屨送人征影逺布裘知我涕痕零初愁凍雪無狐白忽喜晴霄現卵青欲向華山成穩睡不禁楚澤自長醒桃源自昔無秦厯草木榮枯是瑞蓂北固漫誇城立鐵錢塘休說浪翻銀江山不改英雄泯宇宙無窮戰伐新過眼煙花空似錦到頭富貴總成塵舊時都下逢除夕果食花餳祭竈神緑陰野色蒙茸翠羽蓋山光淡蕩碧油幢午煙時引煎茶竈曉霧還霑讀易窗隱映擲金鶯㸃㸃分明藉玉鷺雙雙莫疑蛇動杯中影一笑開襟釣大江詠鸂䳵雙雙遊戲水仙宫著錦衣裳舞鏡空晴浴桃花紅影裡雨眠蓮葉翠香中文禽自是風情别野鷺休將品格同寄語虞羅須並取莫令失侣各西東謝御史王素行免里正之役繡衣御史當霄立星次周流到上台萬里東隅觀出日十年幽蟄聽驚雷頓令絶學知書貴解使貪官覺賄災恩及老生何以報只將頌語獻行臺感懷時事傳來日日新信疑相半向誰詢一寒一暑成吾老多雨多愁過却春酒畔暫休無限事花前難買自由身百年猶有四十在須見升平作幸民對紅藥有感牡丹過後賣芍藥清曉天街頻叫時傳世園林鶯自占有名花草蝶先知百年富貴一場夢千古英雄幾局碁世上興亡總如此我今嘆老復嗟衰百合收拾千紅不上枝緑莖丹萼稱施為燈籠翠幹從高揭火繖流蘇直下垂文豹畨身騰綵仗赤龍奮爪擺朱旗莫疑衰老多誇語漬蜜蒸根潤上池梔子花六出臺成一寸心銀盤裏許貯金簪月中不著蠅㸃璧春過翻疑蝶滿林陸地水光山院靜炎天氷片石壇深揚州只說瓊花好漠漠風沙何處尋和王達善碧桃詩有序正仲賦碧桃舊矣雜之書冊間失其所在偶閲書見之次和奉呈聞仙桃一實三千年和詩不妨遲也石階無罅誰銜子燒地成焦豈復芽千嵗分根染天水單臺五出異朝霞朝紳濟濟水蒼佩仙袂盈盈萼緑華作記不嫌人事晚來年潤筆到山家同正仲賦赬桐彩蝶守著赬桐不為香翩如鳯子往來忙徘徊最愛真紅色搖曵偏垂五彩裳寧號孟蟬隨鬢裊莫為鬼蝶幻身藏惜花却似詩人性日舞中間夜宿房一葉欲排江渚千鴻陳先舞庭皋一葉秋細路桑麻高下屋平湖風雨往來舟人間酒熟花為客夢覺殘燈月上樓故舊凋零我老矣少年安肯與同遊枕上聞蛩有感桑鳥催耕緣底事草蟲促織竟何成春風秋月祗垂淚北斗南箕空得名有客悲歌持筑擊何時至治以韶鳴吾儕吟詠還如此哀樂不知何處生小閣省心避地逃名花裏居春風何事轉桑樞退藏小閣收心靜間下危階放步徐身到衰時方學道眼當昏處始觀書一生日力悠悠度總悔從前作計疏詠蝶前身曾學昭儀舞時樣工為京兆眉揀盡好枝無可意倦尋芳草歇多時曉畦霧重狂須減風檻花飛誤與隨不但蛛絲深著避更知紅袖亦堪疑春日即事燈夕花朝都已過石泉槐火又將新故鄉失業荆榛滿客子長饑雨雪頻底處桃源堪避世何人橘裏得藏身朝家細核丁黃籍食指雖多無絹銀次正仲賦桃花韻紅紅白白好容顔笑日臨風錦裹山且引綵雲來洞口莫隨流水去人間憶遊夢得嗟重到訪異驎之擬不還自是劉郎有緣㑹一千年後重來攀詠篆畦垂絲海棠此花最早開未有葉長條下垂花密似錦帶也奪胎錦帶仍添麗借面芙蓉特太癯睡去不禁春露壓醉來誰倩曉風扶長條莫恨無新葉纎瓣還能著細鬚火急提魚花下飲明朝千㸃亂青蕪正月十四日小園偶坐天地元從雪後新開簾間坐看回春謝公夢覺池生草杜老羮成澗有芹正是泰和嘉氣象好調寒暖養精神花前不著多憂客百舌何妨報事頻次韻答達善道不能鳴假物鳴數篇詩見故人情重經喪亂成南北多謝交遊訪死生我始欲愁將老至公須少忍待時平古來毁棄連城壁不恨沈埋百世英試楊日新筆次韻答戴帥初聞爾又歸青嶂住四明西畔越東頭山當籬外偏環屋水到門前總合流得句苦遲難附置懷人不見更登樓掃除兒女相思話好作閬風十日遊置傳書郵舍也閬平聲寄慈林交講師有意西林尋小隱無田東瀼可鄰家聞師投謁不入巷知我無人能㸃茶山色一溪連雨色雪花十里糝松花秋聲正與公相似相對忘言定不差交師病聾故云詠密囿花繁枝密密宜樊圃以此能當密囿名不信嫩莖藏徑刺試將纎手觸紅英毛身秦女自正色鳥爪麻姑無俗情方朔竊桃何處入只應列子御風行攬秋讀書瞪視眼花亂力穡作勞足繭休尊俎風流容鴨腳語言滋味許鴻頭蘆根繫艇誰敲火木末開扉獨攬秋壯日貂裘無恙不浩歌聊為解牢愁詠佛見笑一名錦堂春錦堂得此添春色金屋從他著麗人老佛見之憐且笑少年休以妄為真梵天寶相宜方駕海島金沙合效顰可是好花多刺手漢濵游女禮防身蓼花曾向江湖久釣遊極憐紅蓼滿汀洲清秋欲近先開眼小雨才鳴急㸃頭翡翠忽來機事動蜻蜓不定晚風遒拒霜未放菡萏謝㸃綴中間一段愁約平叔高秋泛海乘桴欲看日生東借子門前一席風白石鑿餘雲補穴青峯開處月浮宫持螯斫鱠萬事足踞殼食蜊千劫空剩欲作詩招酒社恐君户小趣難同冬至前一日小史自溪上獻梅四枝置之書案竒奇怪怪為賦長句志喜也中有黃金白玉姝莫欺紅粒綴茱茰曉風吹面成氷腦夜雪流脂結玉酥凍蘂未期春鳥啄寒香不上暖蜂鬚一生欲壓孤山句囊錦空垂氣浪粗木芙蓉溪山瀟灑最宜秋緩步何須百尺樓亂後見花如故舊老來得酒更風流幽蓀暗折誰知處好鳥一啼人舉頭欲對黃花開口笑茫然消息也堪愁
