body:
  text: 提要閬風集十二卷别集類三宋臣等謹案閬風集十二卷宋舒嶽祥撰嶽祥字舜侯寧海人寶祐四年進士官奉化尉終承直郎宋亡不仕教授鄉里以終兩浙名賢録載所著有史述漢砭補史家録蓀墅稿避地稿篆畦稿蝶軒稿梧竹里稿三史纂言談藂藂續藂殘藂傳藂肄昔逰録深衣圖説凡二百二十卷今諸書多佚不見焦竑國史經籍志載嶽祥閬風集二十卷世亦無傳檢永樂大典中所載嶽祥詩文間題篆畦蝶軒蓀墅諸集名而題為閬風集者居十之八九似當時諸稿本分帙編次而閬風集乃其總名今原書卷第已為永樂大典所亂無可辨别謹依類裒緝釐為詩九卷雜文三卷仍其總名以閬風集名之又集中有百一老詩序蓋即所賦老漁老獵之類似原本亦别有一集然所闕已多不成卷帙故亦不分析焉嶽祥少時以文見吳子良即稱其異秉靈識如漢終賈晚逢鼎革遁迹終身乃益覃思于著作其詩文類皆稱臆而談不事雕繢集中有詩訣一首云欲自栁州參靖節將邀東野適盧同又云平原駿馬開黃霧下水輕舟遇快風其宗旨所在可以想見矣乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀原序舒先生既捐館舍之十年遺書有夢蝶軒稿篆畦詩已鋟梓行世獨號閬風集者最為大全板本既災於兵子叔獻將復刋之家窶甚力不能任且以三百年來諸公詩文論之梅聖俞宛陵蘇子美吳中歐陽永叔廬陵蘇明允父子成都建安九江王介甫臨川曽子固旴江陳同父婺郡葉正則海陵豈其家子弟為之哉古儒先生也門人父子傳其書轉相教授及後來摹印簡便之説原闕則鄉黨朋從與異世慕用之士相與出資貨以給費閬風集是三人者盡將刋之先生負竒氣固伯仲諸葛孔明王景略其視齪齷瑣碎雖達官貴人若遺涕唾不肯一回顧少年已擢巍科同時流輩往往涉足要津已獨凝立却行不能以分寸為進其文凌張文潛秦太虛而出其上其詩韓子蒼陸務觀不足髙也至大四年龍集辛亥三月永康胡長孺序之於海上仙源觀讀虞書賡歌可以見詩之雅正讀夏書五子之歌可以見詩之變風變雅世道之隆汙不同而詩之正變亦異然天典民彛之正萬古一心也士生斯世豈不欲以和平之聲鳴國家之盛時不虞氏也遇合不皋陶也於是離騷興焉佹詩作焉曰指九天以為正曰弟子勉學天不忘也不求人知而求天知一心之唐虞豈與世變俱化哉此陶靖節杜少陵所以卓然為詩人冠冕而謝靈運王維之流不足數也論詩者觀其大節而已余少時已聞舒景薛言語妙天下景薛更字舜侯擢丙辰第與余弟仲儀為同年進士然自重難進閲羣飛之刺天而無競心不得弦歌生民清廟之章薦之郊廟又不得紬金匱石室書續左馬班氏之筆晚嵗涉坎險歷蹇難萍流蓬轉有陶杜所未嘗氣益徑思益深胸中之書不燼方寸之廣居浩乎其獨存弄雲月於嵁巖之下友漁樵於寂寞之濵固窮守道皓皓乎白璧之全其文如泉出山達乎大川而放諸海有本者如是何謂本大節之特立也余與舜侯别二十餘年時得見其詩文一日書來以碎地篆畦蝶軒三藁惠教讀之如朱弦疏越之音一唱三歎年進而學日進學進而文日進述酒之微婉同谷之悲壯友陶杜於千載德業之進亦未艾也三史纂言考訂精確惜不令作宋一經以垂無窮嘗以晚易名齋探索三陳九卦之藴以處憂患顛沛流離不能詘其志厄窮憔悴不能更其守在賁之初九舍車而徒此賁之所以為文豈槧人墨客所能識哉舜侯贈余詩曰從來明月無今古此坡老所云浮雲世事改孤月此心明余不足以當之而教我之意厚矣凡百君子各敬爾身蓋朋友相勉之詩也願相與切磋焉旃蒙協洽嵗圉陽月既望浚儀遺民王應麟序閬風集原序考證第一頁前六行案建安九江四字上下當有脫文又下文是三人者句文義亦未明疑有誤
