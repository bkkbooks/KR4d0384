body:
  text: 閬風集巻三宋舒岳祥撰五言律詩槐花尊貴三公府匆忙舉子装周官那可見唐制自難忘夕照深宫裏西風大道旁蟬鳴猶未悟但報早秋涼有田婦獻水麥甚美不知滹沱玉食曾有此否感悵作詩牟麥未全黄和灰熟煮香嚼來氷響齒嚥下露生吭肉似雞頭韌形疑鱟子長食芹應配美吾欲獻君王喜食新麥亂後歸田好殘生似可延餘花戀餘景新麥起新烟畎澮藏科斗園林帶杜鵑妻孥共甘苦一醉慰饑年春日懐帥初夜雨流如澗春風響似雷千愁芳草逺一笑百花開白髮癡貪酒昏眸􅂴上臺懐人不可見應棹剡船回八月十九日得董正翁寺丞書兵疫後城中故舊十喪八九愴懷乆之顧我已多幸矣黄菊一瓶酒青山四壁書吾年餘幾許天意復何如寒日沙禽並風霜野果踈山城詢故舊十九是丘墟溪上小憇鵲立碧峯逺雞啼清晝寛青苔留客醉白髮借書看方枕藤花軟一瓶丹井寒此時無二事藜杖共盤桓種麥後栽補桑柘至田家憇息桑柘踈時補篁茅宻處删水邊黄葉路雨外夕陽山一鳥自啼足兩牛相對閑山翁留壁記子丑話時艱有懐寄二林去矣兩黄鵠歸與一老翁秋蟲隂雨裏夕鳥水雲中今古唯愁在乾坤總幻空詩成無寄處沙上竚來鴻有懐寄正仲往事沄沄逝新愁衮衮生風來看木末月上候潮聲偶鳥分枝泊鄰蛩䕶穴鳴洗憂思學易聞爾著書成百年流水故人盡荒村落葉多空餘老矍鑠全是病維摩齒落不知味眼花應有魔百年聊爾爾千載欲如何與正仲同遊故園向老工詩句殘春盡樹花君來相映發吾得減咨嗟著帽風前側揮毫醉後斜避塵如避虎籬外便雲遮題正仲真遊園借問真遊趣華胥路不賖青黄隨澗栁紅白任巖花適意絃歌鳥無私鼓吹蛙秋風榛子熟撒雹散林鴉曉寒獨立紅茶花下長物烏皮几宜人白㲲裘曉霜花口噤午雨栁綿收栁絮正午時飛晴則放隂則收毛髪匆匆變光隂冉冉休直須𤓰芡熟長枕卧清秋予以六月初六日可替里役田家即事飽暖無他事天心亦易迴繅車翻急瀑麥磨響輕雷履辟行泥笋衣蒸過雨梅荒村㫁魚肉隨興酌山杯燈花衆花皆可喜最好是燈花好結無風屋偏生有慶家案頭生瑞菌火裏養丹砂清夜開樽看山人被詔加前詠諸花皆托物以賦者爾未若眼花乃吾身之花也率成一律春去花亦去何如見此花青山飛靄合白日亂烟遮望月惟昏鏡看書似隔紗瀟湘聞夜雨此景屬誰家己丑正月二十四日避地鹽入省坑存思庵和舊韻到此于今四情深即故鄉新松知改徑舊竹不依行平施天猶病周回日載陽鄰人餽雞黍厚意未能償雪蕻羊羔白菘芽栗肉黄舊京有黄芽菜為誰端有此正爾未能忘覺後心無愠修來面有光道人參妙趣一炷石鑪香七月望日避地省坑存思庵留題時章林出白石可為水晶有旨差路縣官同金玉提舉差夫取鑿又宿兵守之吏卒旁午指予為上户求雞羊酒米油鐵無以應其求且不堪其屢也來避于此予念自丁丑之亂至此凡三避矣僧舊屋更新悵然有感因賦之去家無十里過嶺即他鄉避地身三到傷時淚數行髙簷齊古樹新屋背斜陽我欲相鄰住青山志未償㑹計家釀得十石日飲三升可周一嵗是日一飲成醉朱朱石榴樹白白水梔花振鷺青溪客遷鶯碧栁家衰年新旅食小雨夢京華貧有杯中物賓來未用賖收心山寒猨夢㫁地逺雁魂歸獵火雲中樹漁榔月下磯官梅撩技癢池草見天機百嵗風前燭收心坐翠㣲謝周拙翁惠萬嵗藤杖周老手中杖天封頂上藤戰龍紛可解鬬虎斃堪乘險路扶勝僕深林肯伴僧山中行住坐賴此好交朋嵗晚寄帥初車魚鄮城館書畫剡溪船飯顆詩應瘦燈花人未眠空林帶氷月老屋架霜烟寂寞凰棲叟思君又一年睡魔睡魔如瘧鬼日日應期來符篆燒難却茶槍戰不開中宵翻醒去當晝又潛回應是五窮數留君共酌杯白髪新髪從渠白舊顔疑我非莫嫌冠易墮且喜蝨無依鏡裏星星出梳來日日稀長慚老松樹翠鬛沐烟霏石蓮花石上原無藕林間自有蓮開花髙似雪垂實軟如綿不入江妃笑祇令山鬼憐芙蓉生木末可證楚人篇旱蓮紫玉炎天菊紅芽陸地荷孤芳羣訕集一笑百憂多美味河豚虐妍姿鴆毒苛借渠存警戒何必辯真訛去年大兵入台仙居幸免今冬屠掠無噍類衣冠婦女相随俱北聞而傷之作俘婦詞初謂無兵禍那知酷至斯相看不敢哭有死未知期兒向草間沒夫隨劍口離琵琶猶帶怨况是作俘纍次和杉棚上伏清涼散家僮手自成日斜蛟弄影風過䑕行聲解助藤床冷何妨棐几明風車捲氷雪得似此般清自歸耕篆畦見村婦有摘茶車水賣魚汲水行饁寄衣舂米種麥泣布賣菜者作十婦詞前壠摘茶婦頃筐帶露收艱辛知有課歌笑似無愁照水眉誰畫簪花面不羞人生重容貌那得不梳頭田頭車水婦挽水要流通烏帽掀炎日青裙鼓晚風翻翻循故步踏踏似虛空聽取勞歌意生身莫嫁農江上提魚婦朝朝入市闉守船留稚子換酒醉良人不著凌波襪長垂濺水裙渾家同泛客笑殺别離津溪頭汲水婦力小憇中途奉佛澄齋鉢供姑潔飯盂煮􅂼甘勝肉洗布白于酥醸黍修時祀家篘不用沽欲識農家樂聽予行饁詞兩家從結髪一飯亦齊眉世上恩多薄田間禮莫違不須言富貴頭白鎮相隨閨中寄衣婦夫婿在遼陽夜静翦刀響天寒鍼線長自傷乖匹偶不肯繡鴛鴦早願王師息我歡還故鄉田家舂米婦隔宿辦朝糧舉臼紅顔汗投舂玉腕揚雞窺篩下米犬䑛簸前糠未奉翁姑食炊塵不敢嘗種麥誰家婦青裙皂角冠從夫無燥濕自小習艱難窠淺愁鴉竊株成畏馬殘夜來新得雪濁盎慰初寒婦啼如此苦吏奪一何豪尺布不得著長年空自勞剥衣聊贖命覆體不生毛念欲全家去乾坤何處逃賣菜深村婦休嗟所獲微蕪菁勝乳滑萊菔似羔肥槖裏腰錢去街頭買肉歸種蔬勝種稻得米不憂饑蝶軒讀易幾負薪收芋栗捫蝨曝荆扉落日烏行亂清霜杏葉飛嵗窮終有復人老自知非兀兀窓西夜吾方理易幾先人遺文和正仲君子泉泉乆潦不溢君子之徳也因以名之脈來層嶂逺影到片天清洗硯雲根起歸瓢乳味盈岩花䝉潤澤水草見分明已遂投簪志何須起濯纓二老亭人與松俱老因名二老亭只慚吾髪白不及爾髯青佚史應同傳幽圖總寫形把杯長與對我醉任渠醒喜山甫相過閬風有詩𣲖一𣲖落山房新思如春栁别來應更長相逢無可說不見自難忘此是空圓意雨餘荷葉香夢回春草逺病起故人来耿耿孤燈話沈沈細雨杯千愁雙鳥過一笑百花開世事𣺌烟水相攜卧緑苔食鹿肉謝正仲見餽山寺曾聞叫悲哉失侣音能鳴終召禍善走竟成禽設罟須新雨尋蹤戀舊林衰年資血味生殺亦何心踏莎偶成三首并序莎草即地韭也唐人多有種莎之説其根有實能散滯鬰藥品之良也農人常厭其繁薙除惟恐不力余性愛之循徑而行是常引余步柔軟如茵褥也坐避窓邊瀑行便石上莎清池寫癯貎空谷應悲歌暮色東西合蟲聲寤寐多離愁誰與洗舉斗酌明河兩山天一路孤石水分流多難身衰日新涼病有瘳侯封竹萬箇奴課橘千頭生理能如此真堪隠去休玉宇浮叢雁黄槐帶化蟬青山一長嘯白日半欹眠機㫁蟲虛織嚢空蘚疊錢去年真可怕戎馬暗山川七夕河似琉璃底水行空影中槎浮應恍惚星㑹恐朦朧七月初七夜一年須一逢經􅄤那有此吾欲問天公聞雞早起鐘扣星辰動鷄號天地開夜来新過雨行處旋生苔白日一窓轉飛霜兩鬢摧勞生何所戀只憶兩三杯十月初五日夜聞雞荒郊寒雁起深夜早雞鳴木枕違安寢繩床遣不平風霜雙鬢晚嵗月寸心驚牛具孤忠在鷗波萬事輕登小山谷葉丞相城中别業王梅關之故園也丙子冬兵火滿地皆黄花耳亭榭隨人事江山換劫灰鄒裾前日盛謝屐幾時来紅樹欹城坂黄花上石臺欲尋觀聚賦誰與剗蒿萊茅屋茅屋不稱意清泠照此心白鷗波萬頃黄鳥樹千岑薝蔔炎天雪蒲萄午日隂舊来須此物隘巷若為尋紀事盜賊自反覆干戈無是非上謀先劫掠善勝昧攻圍禮樂成烏有詩書入翠微無銀堪易米甘采首陽薇詠海棠一年春㶑灧二月錦闌干緑嫰難扶醉紅輕最覺寒欲知花有恨来向雨中看泥飲須通曉千枝放燭殘自用韻再賦海棠含羞滄海畔移種蜀江干對此花枝重不應詩語寒半開須與醉足睡更来看説與花神道當筵莫放殘樵童自故園来獻海棠因賦二章深蔓迷歸路荒蹊未有家誰知寒雨裏也作小春花菌紫松間茁菘黄澗底芽道人新破戒窓外種紅茶只道嬌春日誰知戰朔風輕霜去人逺愛景入枝紅依舊風情在難將艷冶同年年揺落後来惱白頭翁山齋排悶耳聾便穏睡眼暗總迷雲樹濕直如沃花香不待焚燕歸知舊主蜂坌有新君莫怪今非昔從他聚必分三月六日黄霧四塞涉三日不散木葉屋瓦積塵皆泥粉因記所見故國烏頭白太空雞子黄蒲茸千頃麥筠粉萬株桑錯莫昏花眼朦朧塵土腸天河如可挽洗出太陽光書事倚徙白頭杖哀傷赤子兵斜封今不用直指近方行商鞅何妨徇桑羊儘可烹擊䝉須用此尺箠惜刑輕即事冬旱井泉竭霜清天宇空驚心嚴戍馬極目覽征鴻弓手徴中産船官及老農可憐時節在吾道自終窮物化擾擾孰分形紛紛誰與明螻蛄擘地走蚯蚓上堦鳴隨事皆天道因人見物情蟬吟兼蝶舞風韻喜輕清初食栗新涼喜見栗物色近重陽兔子成毫紫鵝兒脫殻黄寒宵蒸食暖饑曉嚼来香風味山家好蹲鴟得共嘗秋晚隨意行澗上值老農問勞去年避亂時事書在心猶在時艱變易衰白雲山半寺紅葉水西祠農老言多善烏馴噪總慈誰于千載後見我苦吟時輞川踈舊業復望草堂歸落葉無人徑殘陽向水扉井螢吹不滅塹鳥暗還飛豺虎方當道何時賦式微初八夜遭緣林之禍因紀其事夫子賦歸與田園欲把鉏春風吹故國流水遶通衢螮蝀吞滄海蟾蜍食太虛一燈深夜酒呼子了殘書遊天王寺客子倦行役閒尋古刹林雙巖来勢盡滙水去聲沈經社千人㑹然燈七佛深松行喧萬籟僧定不知音寄子堂時子堂借居清蓮寺知君不寂寞禪脫只空房書巻依經藏吟聲繞寺廊早霜貍面白新酒菊花黄共此山家景西峯隔夕陽正仲思歸作篆畦今夜月十詩非篆畦月乃雁蒼月蓋杜子美鄜州月之意也予作十章乃篆畦月也篆畦今夜月先暝啓黄昏狐叫青峯逕僧歸白石源分燈三户市打鼓七郎村莫管啼烏繞吾今已㫁魂篆畦今夜月湧海出初更溪寺鳴鐘罷山城禁火明梅光初㸃滴鶴睡自凄清還念故人逺燈花結未成篆畦今夜月出嶠二更初蓐食催鳴碓䝉頭静著書清霜聞吠犬細火有歸漁一盞解寒酒風爐煮雪蔬篆畦今夜月有待到三更水鳥隔烟叫山樵踏雪行詩成嫌燭短酒渴愛菹清此際誰為伴梅邊送影横篆畦今夜月絶妙四更殘欹枕清無寐推窓獨起看流鴻曳稀宿躍鯉散微瀾頗記倦遊日孤舟宿雪灘篆畦今夜月初出五更頭清旭輝相映餘光淡未收烟消江樹出霞弄市嵐浮憶昔趨丹陛雞人唱曉籌篆畦今夜月尊酒共論文凍茁沙中笋氷芽澗底芹人生半歌哭世事異傳聞風憲分流品儒生免出軍篆畦今夜月政自使人憐乆廢登山屐愁催下瀬船衰年免黄帽舊習守青氊東浙承平地如今是近邊篆畦今夜月特地向人明海驛催傳箭荒雞誤報更平生大敵勇末暮小詩行老矣今安用深盃送此生篆畦今夜月故意照人衰一夢十年過千愁萬里來只今安粤徼何日悔輪臺吟罷四百字更傾三五杯寄石泉策禪師師住崇教寺不來三十載僧與寺俱非棕屨延蒼蘚蒲團坐翠微溪傳松頂相風助竹談機侍者能栽菊秋深重扣扉少師丞相國公西磵先生挽歌二首宰輔平生望儒酸貴日同諸賢親盛徳末俗仰髙風道喪悲歌鳯時乖歎卧龍經綸兹日泯憂愛與身終咸淳無正史徳祐少完人他日修公傳終身作宋臣淵明還死晉商皓本逃秦壮士元無淚西風自濕巾兼静黄壇楊君書室也取錢起柴門兼竹静之句名之邑里吟人題詠殆遍矣予為友作反騷不知者便謂子雲與屈子異意非也本自柴門静誰令種竹喧月來将畫寫風過引書翻黙坐雨偏響閑眠雪易繁動中還有静此意互為根余名宴居之室曰一枝巢賦詩以自遣世事隨流水年華逐北風雁横殘笛外人老夕陽中聽雪三間永催梅百榼空沿溪漉明月只在最髙峯喜帥初歸剡吳客多流越君尋古剡歸民貧官箠急嵗歉米船稀嶺鹿三丫入溪鱸一尺肥榆林知可隠安得翅能飛和亦翁韻斜日照疲蹇茅茨葺未成覘梅天氣好卧雪夢魂清葉脫懸星大谿長去火明詩翁如退將誰守五言城小窓一首寄帥初愛酒不嗜飲行藏一小窓斜陽屐樵磴細雨笠漁矼紅樹橋邊獨青禽石上雙永懐草廬葛来訪鹿門龎為胡後山提幹詠南麓古松志在千尋上根蟠十里間不除當路樹為作對門山田近龍常見枝低鶻可攀向來戎馬入世故涉艱難柴門正當偃松岸下即田丙子大兵入尚義里屯予宅此樹繊柯不動疑有神物者䕶持之也中夜對月有省風開半村雨月吐四更潮静處常參省從來本寂寥天機雙鶴唳霜信一鴻飄短髪梳還癢寒釭凝不揺十月十三日嫩晴薄寒山房新構書閣去年此日北兵入是夜自中心􅓝徙獨山霧重月無色夜來寒有情牆根餘宿莽木末弄初晴去嵗那知有新冬得此生擁爐談往事鸜鵒報三更早涼出邑暑濁難為酒秋清易得詩出門殘月在騎馬曉風吹山厂藤蘿構荒園枳棘籬新條聞快活歸路不妨遲海眺自嫌林谷暗欲作海天遊蘆葦人家曉蒹葭國士秋樹根生石上山影占江流載酒船頭去風波幾瓦甌送山甫還峽中到處圖松樹何曾忘却山相攜溪路㫁愁踏夕陽還田􅎜吟桑空山雞飲石間所憂無可醉天上酒星閑自次前韻詶馬奥諸丈見和得肉鳶歸樹無魚鶴下田此中藏世界他處少人烟可怪衣偏裻何妨屐下穿亂離多少事史筆若為傳乆别形容改相逢涕淚收少陵歌裏哭元亮飲中憂巖瀑和氷下溪楂避石流故園春早動歸計莫悠悠巖雲巖雲黏壁白瀑雨㸃簾斑詩句鴉初曉鄉愁日半山故人來沼上好鳥韻窓間樹近夜先到村空春未還悵望雁山雲悵望雁山雲柴門一欠伸笭箵潭底影襏襫雨中身紅煮溟波日青回燒地春青城新祼奠餘景付詩人庚辰元旦試筆數我初生嵗今為第二年光隂六十過行輩幾人全試把新詩寫閑將好夢圓兒孫扶出拜蘇酒譲渠先夜坐黄昏風雨後清夜聖賢心松月生池底窓燈間竹林嚥津芝术味洗耳石泉音早秫傳消息清香慰暑襟矮樹千年矮桃樹從昔不教長静入仙人室低親處女粧苔枝深漬雨秋實冷含霜蜂蝶誰知顧春風四畔香楊栁清明近二首楊栁清明近棠梨烟雨愁紅來千樹色白盡幾人頭歌哭同途去繁華轉眼收銅駞千古恨只為一尊休楊栁清明近梨花氣候寒誰家争蹴踘客子淚闌干茇舍鳯棲小芹泥燕子寛西湖吾舊夢見説不堪㸔
