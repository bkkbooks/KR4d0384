body:
  text: 閬風集巻四宋舒岳祥撰五言律詩酬張常吉慿誰詩寄我溪水接流瓢島瘦神空泣韓豪骨未銷閑眠重落葉久坐到歸樵予亦逃名者何當共寂寥次韻酬正仲見和并貽用之世事多眉皺綀衣覺鼻酸老懷呼子冩瘦影引孫看爾徤心無事吾貧骨帶寒一樽江上别露氣夜来漙次韻酬用之見和秋晚如春早晨昏海氣濛霜嗥呼偶鹿雨啞破昏鐘知命休行險吟詩不怨窮吾儕天所賜出入戴青松十二月十三日曬藥有感賣藥不二價買書甘一貧誰於旡妄世完此不貲身酒熟狂連月花香走四隣因思少年事黙黙自沾巾詠荳䓻花即詞人所謂荳䓻梢頭者也一名魚袋牡丹以其葉相類也亦名含胎菊春晚愁偏重垂頭向下生牡丹憐與葉蕙草愛分莖懸袋雙魚意含胎少婦情幽姿如冷淡那敢擬傾城舌吐梅仁顆心含荳角花折来無處著留取愛名嘉脆紫深愁雨輕紅落軟沙虞兮成恨草姊娣共成家水閣新成與潘胡二子小飲小有龜藏意横陳燕息初一間規畫舫數板束方渠隠几時聽雨開牕即釣魚天寒須共飲吾已久捐書次韻荅潘宰見和送正仲多字韻詩彊健近八十如君誠未多夢中思謁帝醉後縱懸河撫事遽如許流年奈若何相期成二老舉斗酌纎阿次韻荅達善季辯眼暗書多誤牙搖飯著沙山林消幾屐天地總浮家故國帛書鴈荒園鼓吹蛙經年無驛使何處問京華次韻荅陳用之王奕世袁明復三子和篇藥留殘焙火枕避近溪風意澹琴三疊人和酒一中自遭兵禍後已覺世縁空安得飄然去茅廬海上峯避地李山山居門早閉雪後樹重青不為艱危廹誰能險阻登寒機與舂應村誦隔溪聽絶頂觀滄海海平峯上層蹔山薄暮悲歡意無家去住間三間臨水屋半樹夕陽山石雨疎成宻沙潮去未還數旬成卧病轉老轉多艱將為鄞江之逰先寄正仲三首相思不在逺道地一来難殘月中峯見疎星半夜看江湖青草逺風雨小牕寒鄞水饒魚米何由得共餐天地悲歌裏江城戰血餘哀湍㵼壞道斜日照殘書髮秃因慵櫛園荒亦懶鋤舊来雙紫燕隨我到茅廬水漲苔梳髮風晴麥漾鬚茶香度深竹燈影射平蕪嵗月江流駛乾坤客枕孤鄞鄉風物好蓴菜出湘湖燈花火樹知誰種燈花凝不銷何人知此意有喜在明朝兒愛抄詩巻童歡進酒瓢紗籠添䕶惜莫要隙風揺留山甫新舂知麥味舊債了鄰賖借榻無䳌處敲門有竹家韭苗香煑餅菊腦和烹茶少駐還山屐烏紗細雨斜春曉髙枕還慵起晴窻曉日明家貧從省事身老放徐行溪樹藏村暗山花照市明園林有樂事桑下見雛成靜息茅竹荒墟地菰蒲野水天故園長莽莽歸興自翩翩文字留身後瓶罌滿眼前海棠知我意故作小春妍冬日過良坑岡東望滄海隠隠見漁村有感時避地者多浮海云平陸人煙險漁舟家口肥青天圍篛笠白雨澣蓑衣靜釣鷗分石寒歸雪滿扉磻溪有恨事嚴瀬本忘機篆畦春日有懷正仲别來成隔嵗即是久相疎詠物追唐律名亭學史書荑柔春霰後花韻午晴初閒日有閒課人生無逸居曉起觀梅玉氣占虹貫珠光照夜闌凄涼兼水淨的皪與星殘欲折先呵手誰來獨倚欄白螺􅆽曉露起向月中看趨農種浸清明後芽烹穀雨前未能饑守死何不力耕田溪草鳬毛滑山花雉頰鮮倦行聊少憇茅屋帶晴煙次和花字韻酬正仲實父少白三友不讀口生棘多愁眼易花江湖四閒客今古幾詩家吟是蠲憂藥功如解困茶艱難俱已歴好景夕陽斜再次韻酬正仲好翁須好客相映栁和花自是曹劉匹非分唐宋家書空因學草品水為知茶愛酒欣逢伴臨風醉墨斜放螢寄正仲殘編百讀過年去放螢飛好帶隨身火休爭秉燭輝夜涼辭竹庋風逆返書幃未是明經日何人拾汝歸螢毎向坳塘照多從曲徑燒無煙知有焰著草不曾焦雜燐因風亂隨星沒夜遥老來疏簡冊四散任渠飄漁童丫角長身者依然髪􅂴梳只將星子餌釣得尺来魚險阻行来慣風波舞自如曽因潮岸塌收得古人書春日山居好十首春日山居好初春草色回小橋帘映栁野店燭簪梅箭茁穿沙出蘭芽帶雪開從今排日去連月覆樽罍春日山居好尤佳是仲春半開花有韻微醉酒全真堯帝衣裳日周公禮樂辰枝頭百舌子播告太諄諄春日山居好春深自向歸且看成茂實何必戀芳菲樹合明湖隔蒿長逺徑微風雩吾黨事試浴振春衣春日山居好春来不問深栁能同燕舞鶯解代花吟有酒家閑去無詩客莫尋賣田强免役何必苦勞心春日山居好閑思二月頭麥青農作暇荑秀女工休布穀遲催種提壺早勸逰老夫同獵較陌上暖風柔春日山居好西湖樂事非青黄雖未接紅紫自交輝酒在何憂死詩成可療饑典書猶可醉何必有金揮春日山居好柴門愛客過連朝恣泥飲隨意有山歌句小從人學才衰覺氣和情懷依分足好景不須多春日山居好尋花急占先騎驢投酒市領鶴上漁船薄暖還揮扇輕寒未替綿清和時候正麗日牡丹天春日山居好春園賞海棠風流思妙麗老大尚清狂暫拭傷時涙還逢絶世粧傾銀并注瓦彼此一時芳春日山居好光風草上浮溟濛晨靄散澹蕩夕陽收發軔梅花報攀轅芍藥留春来亦何好惟有白添頭夏日山居好十首夏日山居好清風報斷梅林深蚊却退山合鳥飛回一霎過雲雨數聲深水雷遶園尋蠧笋聊以薦山杯夏日山居好吟来亦自豪焚香誦周易痛飲讀離騷莫諱無三甲吾今已二毛蕪編三百卷空費一生勞夏日山居好還思童冠時汗流修舉業浴罷間題詩邊事廷紳奏朝除邸報馳槐花時節近新説合新知夏日山居好茅簷水餅香蕉衫身儉潔紗帽頂清涼潤葉桑藏井新梢笋過墻莫言炎熱苦勝處苦寒鄉夏日山居好涼風樹下生三茶還可瀹二韮尚堪烹永日閑言語平生實講明半空飛赤電燕坐不須驚夏日山居好清溪一笛風瘦軀便褐短寡髮愛梳鬆細雨明歸鷺斜陽飲逺虹有時吟未穏飽步自書空夏日山居好鷄鳴桑柘煙笋揺知􅎜過草偃覺鵝眠休問田園計聊隨飲食縁經營空自苦煩惱更誰憐夏日山居好蟲鳴山更幽青鞋紫藤杖玉醴緑甆甌飛露吹黄葛涼風洒白頭已知時雨順更有虎狼憂夏日山居好日長宜學文金門堪避世畎畆不忘君林宿三冬雪巖藏萬里雲屈伸吾道在何必雜人羣夏日山居好藤床面北林荷心風百頃秧底月千尋幽鳥珍毛羽流泉響磬琴此中多樂事客至亦能吟秋日山居好十首秋日山居好新涼讀舊書黍馨秋社祭燈燦夜灘漁茄摘收花後𤓰嘗脱蒂初早田三得雨一飽解憂虞秋日山居好園丁貢美蔬燃萁酥煮豆拗頸爛蒸壺菰首甜供茹薑芽嫩漉菹秋来風物美何必去吾廬秋日山居好吾居山海間意行逢酒住興盡放歌還稻穫歸流水林疎縮逺山誰知僧快活飯飽即身閒秋日山居好星河頂上懸聊隨兒女戲也設果𤓰筵欹枕看星渡開窻抱月眠溪田六十日接闕到紅鮮秋日山居好新涼及早興玉餐陽塢米冰嚼下洪菱海錯来蒲港溪鮮出石屏欲從逋客逝為此未之能秋日山居好中秋興莫違四腮鱸正脆一尺蟹初肥白露秔登饌清霜絹下機急舂輸井税無事早言歸秋日山居好重陽庶物穰剖菱紅綻白剥栗紫含章黄雀綿披脊霜貍玉截肪登髙惟小圃何必上重岡秋日山居好清涼鴈過初雞頭消暑夕鴨脚待霜餘草淨􅀢䖟逺𤓰香蚤蟻除小園新雨過菜甲自刪鋤秋日山居好疎眀入畫峯獵憐依寺鹿樵䕶倚祠松鴈起西風笛人居夕照舂東山久不到勝具一枝笻秋日山居好秋濤木末横龍藏寒水靜鶻擊廣原平紅葉茅茨露黄花麯蘖成西風輕步履隨意得閒行冬日山居好十首冬日山居好茅茨不漏風山厨蒸芋栗野徑掃風蓬嫰酒篘初白寒灰撥暫紅編氓吾未免杜老屢囊空冬日山居好誰能倚市門從横鴉出郭寂寞鸛歸村為念曲肱樂因耽曝背温此時新放飲招我苦吟魂冬日山居好隨家豐儉宜果成猿種核薪落鶴巢枝梅見天機早菊知霜信遲讀書年少事任汝眼昏眵冬日山居好幽齋羃紙窻温存簷鵲並暖熱竹鳩雙鹿下霜封塹樵歸雪印矼從兹謝城府吾志鹿門龎冬日山居好尤於老叟便年衰催釀酒骨冷早裝綿著帽来梅下扶輿到雪邊興来聊復爾微倦自髙眠冬日山居好農人告嵗功明朝輸井税深夜動機舂木脱見山市霜清聞澗鐘倘無饑凍廹何必羨侯封冬日山居好先生獵較時海陂寒網鴈嵐市夜分麋酒熟隣相聚家貧盜不窺偷生前進士幸矣過耆頤冬日山居好能閒樂自全米豐平酒價蔬賤減魚錢偶爾思前事依然是少年下簾髙枕卧門外北風顛冬日山居好不知年又窮老人六十七破衲兩三重未要迎新嵗聊須駐舊冬明堂知未議安用聘申公冬日山居好能安始識閒漁歸溪口港樵下屋頭山竹蠣含梅蘂江鱸著玳斑人生何所事口腹最相關山甫逰鄞訪僧復歸山房麥熟歸小隠詩名留逺方竹冠山靄重棕屨石苔香掃徑憐新筍臨池玩舊芳僧交非昔比吾黨懼行藏送胡山甫歸山房出峽復歸寺身孤心更虛半瓢岩下水一豆雪中蔬自制烏羅帽閑將白髮梳與君能幾别此意重相於八月十五夜月此夜十分月年時中半秋華夷同一照今古幾多愁顥氣横空白天光際海浮兒時讀書處桂子落巖幽􅃧贈陳用之羨渠食筍也食筍肥勝肉胷吞千畝寛汗青終日對水墨一窻寒吾子風流甚此君氷雪完每思參玉版莫作北傖看山行今日新晴好東風散麥鬚山泉中琴瑟巖鳥合笙竽總是太平曲何勞擊壤圖誰知花濺淚杜老獨嗟吁憶篆畦流水人千里清風酒一尊烏頭何日白鶴髪㡬人存石樹根基壯秋蟲羽股繁殷勤問來使元亮欲歸園送王奕世歸玉塘故人今有子過我乞銘文紅樹催年老青燈話夜分詩箋傳父業𨽻筆張吾軍萬里青州路沂公幾代墳十二月初七日補綴舊詩寄正仲嵗闌思飲酒人老且捐書春日將輝賁陰風為掃除花前看燈蟹雪後坐庵魚有約君無負墻根摘露蔬山居雀飲梅心雪魚吞水面雲山居差有味世事不堪聞野燒窮狸穴晴霄轉鴈羣溪寒春未著閏月壓餘分借正仲韻賦牡丹洛陽宫苑地幻出幾花身艷色宜當午開時惜殿春管弦非舊國風雨易愁人同是多情客相逢説夢因阪坑頭上籃輿煙雨中賦此醒困下眺黄泥阪濛濛曉霧漫巖泉時一滴松雨幾曾乾利倍鹽為市耕勞石作田我来聊小憇前去路千難十三日即事是日於松下聞鵑鳴此禽陰物至春暮感陽氣而作夏至後則止今八月半而鳴書異也蒿欺菊藂瘦蔓壓橘枝低應俗精神減傷時夢寐迷欹眠中夜鴈薄飯午時鷄咄咄真堪怪秋深杜宇啼春分偶飲成醉兀兀坐睡覺而殘月在窻矣酒熟還成飲花香忽過墻近燈人影大斜月樹身長陰洞龍藏雨春苗麝養香閒吟誰與語醉倚一胡牀闕題潮分船出浦雪破馬行沙去去三千里疎疎八九家矮壺分乳酪疏竹看梅花虎豹方充斥風林噪亂鴉田舍偶憶菖蒲山窻偶閑靜無事憶菖蒲怪石磨劒脊西風拂虎鬚性貞偏愛潔節勁固應癯何日新書室清泉手自􅆽渚宫秋思石樹表獨立瓦蛩相與言雙鷗定漁社一犬䕶柴門抱甕非吾土浮家何處村枕邊黄黍飯用此了乾坤風太虛無眹兆因物見形聲入竹須搶地驅潮欲打城八方隨氣轉萬里掃塵清誰道鵬摶壯反從虎嘯生中秋與山甫登樓小酌莫笑斯樓小因髙勢自尊江山圖萬井烟樹㸃千村斫却月中桂烹他海上鯤乗槎八月半與子探河源觀窻前月過有感簷影倒垂地月髙窻更陰殘蛩沉積葉悲鳥發遙岑易下傷時淚難平讀史心胷中猶若此酒盞可辭深聞有海船入鄞作詩附寄正仲華館多髯客深山短髪翁鐘聲更㸃外螢焰燒痕中春日同傾酒寒溪數過鴻天門通海路詩寄鄮城東山甫還峽石有懷書寄靜者一為别誰將幽抱同行詩求谷友買紙囑溪翁數㸃淡雲樹一行遥海鴻莫因尋薯蕷深入萬山叢坐對蘭菊有樵人獻石輪囷如雲亦鐵中錚錚也喜而成咏老入逺公社閑披貝葉文移梅兼得月買石看生雲潭淨知魚數煙青别鷺羣平生有香癖蘭菊勝爐薰春深贈山甫石枕空蝴蝶山窻足杜鵑春深方沃若人意自翛然衰老難為别留連未肯眠燈花知我意今夜大如錢贈周此山梅花台越路來徃此畨新風月三間屋乾坤六尺身枕中鉛汞術筆下蕙蘭春聽説西江事廬山面目真春晚聞霰客思凄然兩日不見達善季辯書懐奉寄夜闌風薄樹雨急水坍沙書在吾何恨春深自憶家髙花猶著雪淺草早鳴蛙同是離居客相逢弔嵗華趨俗殘雪髙峯外孤猿細雨中看花心未老問事耳須聾時俗同傖父歸休學塞翁相隨携酒去獵較祭田公葬沈氏墓連夜頻夢見那知是與非天髙難告訴佛近且皈依修竹墳三尺寒梅石四圍有兒年十七他日望傳衣哭謝尚書尚書在南日與予厚有書云生死出處與足下同之予徃潭幕君以卭竹杖為贐兵後杖失所在翰林真學士吏部老尚書薊北非吾土鄞江有舊廬死生今已矣出處竟何如卭竹先龍化人琴一慟餘哭王達善一叟經年瘧蕭然强飯蔬殘花清供後瘦竹苦吟餘女授伏生業兒工阿買書曾無一紙别疑信問何如哭李實甫帝閽嘗再叩龍頷竟難攀帙散螢千㸃詩留豹一斑人生㑹有極吾道幾曾還藏我擇軒記名垂天地間螢千㸃一作灰千刼哭匊田詩老君詩序自謂由翁巻徐照而漸趨唐人翁徐永嘉人尋源自永嘉清響黜浮葩一字不犯古五言真到家思幽多掩抑情至重咨嗟欲擬徴君誄天寒日又斜本是攻文者其如癖在詩人皆尊島佛我欲效宗師廢圃營新屋寒花帶短籬風流無此老遺藁訪佳兒一作燈續家今世友殘藁自遺嵗辰賢所忌一夢驗於斯哭陳伯求早總淮西餉晚為刑部郎艱危身九隕漂泊淚千行天地孤忠在山河遺恨長寡妻隨季女猶得在鄞鄉
