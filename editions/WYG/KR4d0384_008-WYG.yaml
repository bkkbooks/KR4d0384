body:
  text: 閬風集巻八宋舒岳祥撰五言絶句綠隂穉綠藉老紅政爾有餘姸萬慮不作時清朗見堯天荷亭影浸蒼涼月香隨澹蕩風露華初汎汎秋思莫匆匆丙子兵禍台温為烈寧海雖經焚掠然耕者不廢丁丑粗為有秋但種秫者少以醉人為瑞物吾亦似陶靖節時或無酒雅詠不輟也八月初九日連日雷雨溪路阻絶山房岑寂此夕初霽濁酒新漉數酌竟歩秋樹隂潭魚可數望前峯老楓數十株已無色白鳥飛翻去來是中有惠崇大年筆家人遣兩力來迎因倒坐籃輿而歸人或問之戯答曰吾日莫途逺故倒行也記以三絶事過清眠足心寛緩歩宜古人無限事煙蹙幾修眉去鳥仍囘白殘陽更借紅傷今兵亂後人醉不如楓白秋毫綻青蟲樹色并興亡誰與弔聊復快新晴花下掃石坐花隂花隂復滿襟此時真晝錦富貴亦何心八月初十日夜露坐場圃新月半破前溪夜舂俛仰寥泬小兒子周在側忽引翁袖曰月照山重也聊記其語露葉墮清響隔烟聞暝舂夕嵐那可撥月照山重重柘溪道中有感時入城求免役得勢茅欺蕙安居爵笑鴻吾年已如此役役又西東即事菜花隨麥長田水入池平此景尋常有何人自在行題李唐松月眀月青松枝幽人巖下歩勸君早歸來草頭已多露懶出飛霧不成雨幽人懶出谿落紅雙雉過新綠一鵑啼宿龜石寺山深無横吏客至氣和平野寺鳴鐘罷安眠到五更齒酬舌贈子任調和逸吾當噬嗑勞生年雖後子未老得先焦齒酬唇贈剛柔君不吐冷熱我須當鐵石還銷毁吾今已久長白雪詞四首一雪林屋浄二雪臯隰新三雪為瑞應伊耆氏作春濛濛接白雲皎皎混清月長歌古人句山眀望松雪半空紛下鶴千尺矯遊龍再歌古人句晴雪落長松古人不可見物色故依然二麥何人種忍凍及豐年薌巖山居孟夏二十絶獨鳥怨遥夜冷螢眀逺陂且弄碧蘿月莫問出山期無色庭前石無聲石上琴此時寂寞意千載有知音凱風引柔蔓時雨滋綠苔寂寞無一事空壑生悲哀晨霞冠山椒夕虹飲澗曲熊蹯未入唇羊胛早已熟桑柘隠寒墟牛羊雜亂石林果摇青黄已縱飛鳥喫鐘聲澄萬室月影散千林岑寂巖棲客應觀不轉心鳥鳴青溪中人行綵虹外洗藥歸去來聲跡兩幽晦微泉静後聞去鳥空中滅耳目吾不營煙景相與悦幽鳥時一啼前峯晚來翠人語慘澹中復向煙雨外迢逓川觀眀氤氛夏條綠於焉沖抱盈緬然散煩溽綠樹塞柴門青山壓茅宇遥遥望來峯日夕多風雨蛙聲合川隰荷葉等堦除悠然故園思今雨後何如逺水去微茫近峯互眀晦偶與農夫言飛雨靄而至旭日原隰麗積雨條枚新萬物此蕭散宇宙一欠伸雉子行傍叢鹿麑下飲澗近人固數驚無心復逺患種松為老伴栽菊充嵗糧新國苦長役遺民懐故鄉珍禽好毛羽髙飛不啄粟路旁挾彈兒何自規其肉兹峯虎蛇善月下人去來濯足瀑水源山扉終夜開夕陽掛東峯光色籠逺樹西峯急雨來童子渡溪去雨雲冒山頭晴雲出塢口東峯有龍湫雨我私百畆秋夜院靜泉聲合夜深蟲語多近牕移素榻欹枕見星河除夕軟煖爐星火新香甑雪糕老人消一睡守嵗為徒勞遊永慶寺慘澹蕪城暮蕭踈野樹寒登山不憚逺反恐下山難施元屏面髙樹俯滄江老屋隠亂石水深羣魚集一網千尺碧漁翁不食魚愛換酒子喫臨川羨魚人似喜網有得題零陵石屏大山揷洪瀾定是闗仝筆縑素不能永壁石冩雄逸青峯揷天隅淡月如可吸江流疑有聲孤舟舞蓑笠大山如大國小山如小邦低樹無附麗洪濤恣舂撞大浪所簸摇青山為俯仰云何峯外雪亦與相下上九日萬事一鴟酒平生幾蟹螯悲秋仍送逺懐古更登髙桐乳桐乳深藏鳥苔花暗語蟲誰能借修竹為我宿清風春嘆春色三分二人生七十稀蝶魂歸蟻塜花瓣泊魚衣秋日東風舊雨黄魚簄新霜紫蟹䈻吾生了朝夕何事憶江湖六言絶句晚易齋百年客鬢雙白四海春風一青百舌枝頭分付黄鸝葉底丁寧泳道東湖聮句正仲篆畦和篇半世清風朗月十年悶雨愁煙感興夢與黄梁並熟路尋白社同歸深欲蜘蛛結網長勤絡緯鳴機成石屏詩後再賦六言蠟屐枝笻穿嶠蓑衣一笛横江試向屏風一攬千山萬水秋窗七言絶句丹林有作黄金為殿浄莊嚴篤耨醲熏翡翠簾正恐天風來㧞宅丁寧収取白銀蟾萬古靈根種廣寒折來白日便昇仙集英曾對三千字也勝南山孟浩然老椿并序京口多此樹余昔從趙菊坡遊景韓時在總幕㕔前見此樹㕔有大紙屏余記其説於屏上十年後遊金陵過京口有總所老吏収藏此屏紙墨如新問其故乃用素紙䝉其上揭去其䝉故如新蓋一時醉後書今不復記其文矣大槩謂淮楚此樹為多最是長大莊周楚人故知此樹為長年也歸舟曾載得一小根種山園即今樗木莊生亦言樗以不材而全余有取於此也江南江北皆宜産濠上莊生語不虛京口舊來曽記此紙屏流落近何如漁翁大男舉網錦鱗紅稚子輕摇一榜風微雨斜陽身半濕瓦甌醉酌主船翁題王任所藏林逋索句圖圖上著帽隐几而坐若有所思案上置筆硯紙墨案前有古罍揷梅花此和靖也背後一童子坐舉足加火爐上後有一鶴就地欲眠引頸反顧與周道士本同格清新半樹横枝句冷淡暗香踈影詩誰見當時苦吟態只應童鶴在旁知再題隐几何思此意微鶴眠未熟覷吟機踞爐炙脚童全野應是前村踏雪歸千秋萬古梅花樹直到咸平始受知若道此圖真此老何人覿面敢題詩身後不遺封禪藁吟梅全是自題真畵工豈識凌雲意童子趨炎鶴附人十月初三日自邑夜歸北風茅店晩炊遲吠犬聲中踏黑歸溪上人家應夜績松眀一㸃出踈籬綠隂絮盡花空碧漲潯幅巾藜杖度前林提壺愛我煩三請􅂸與長瓶卧綠隂代影答贈一首寒宜絮帽䝉頭坐暑稱松風灑頂涼蟣虱更無依附處方知清野策為長神鰲石名靈璧産清聲端是磬浮泗黑質渾然玉剖荆應是任公垂釣得靈鰲入手出滄瀛安住寺道中半村晴日烏鹽角十里春谿雀李花餅餌風來香冉冉教人那得不思家觀萬堂前蕉葦為風雨所敗對之有感綠蕉青葦列旗槍一夜西風作戰塲薏苡低垂菰米老花鵝繡鴨陣横塘家藏畵鵲二軸其一棠梨結子青黄葉亦蟲蝕尚帶晚花有鵲眠枝上枝若垂垂不勝者其一作欹竹一莖有鵲把竹磔螳螂而食之葉若振振而動摇者筆意精妙非黄筌不能也棠子青黄帶晚姸忘機好鵲壓枝偏從來報喜無憎惡借汝庭柯取次眠粉節娟娟碧玉枝螳螂得意更誰疑旁人只與危黄雀不道中林有鵲知為昆石蒲苗刪去焦葉戱成細雨幽窗曉露垂鴈苗昆石兩相宜老翁㧞白知無用且為昌蒲鑷退髭柳市晚風手栽楊柳恰成堤招引清風障日西熱客豈能知此味請君來此聽鶯啼賦庭前落桂去嵗花開三日事今秋陸續兩畨開渥丹如雨香猶好乞與幽人䕶綠苔老鶴霜翎沾濘衣難濯宋頂多年色退鮮曾向青雲黄鵠舉如今羸損啄烏田過南渡見石礫之塲有感幾度維舟此倚欄傷心刼火總摧殘拒霜半落無人管時有流紅駐下灘初七日山間煙雨閉門髙心事難平著酒消今日蕭蕭風物好官窑瓶裏揷紅蕉秋晚過北渡凄涼客路趁長川荷葉無衣柳不綿日暮正愁無宿處亂鴉飛下有人煙銅雀瓦硯摩挲嵗久馬肝死洗滌塵開鸜眼鮮銅雀何人收廢瓦銘文猶記建安年逺浦歸潮逺眺滄洲十里强早潮舉網夜鳴榔倦遊不作呉松客白髪歸來樂故鄉楓樹屈原廟外千株碧髙帝祠前萬葉紅楚尾呉頭風景在片帆不復更西東十三日夜山齋翫月月傍細細水波雲繡撚金描孔翠紋夜半冰輪懸浄碧太空不動掃魔羣十四日夜月色頗佳山寒不出門窗間擁絮坐翫殊勝昨夜之微茫也山居寒重户先扃自向踈窗愛月明欲唤花光來貎取入簷微見一枝横十六日夜月色可愛病體怯風欹枕㸔窗影殊佳此夜月眀勝月半可憐衰病自欹眠窗前樹子如人影渺渺羇雌叫渚田樟樹樛枝平地虬龍走髙幹半空風雨寒春來片片流紅葉誰與題詩放下灘遣興三絶小小茅齋傍茂林朝朝暮暮有鳴禽道人心事無憎愛終夜聞梟也好音讀書未盡老駸駸更把殘編徃復尋六籍精微心已耗只將韓杜了光隂老懐忽忽如中酒短髪蕭蕭不受簪四壁應聞長嘆息何人知我此時心晚出數樹逺烟藏棗栗半村踈雨下牛羊詩人過眼助成句吟罷不知歸路長老儒不用憂歌衡石程書括户口頭㑹箕歛生干戈老儒不用憂此事莧羮麥飯醉且歌和用之題剡雪鱸魚未上夜潮囘吹笛蓬窗古岸隈誰遣戴公山上住兩囘牽帥子猷來兩岸青山一水流蓑衣不著雪為裘安道只應深樹裏青山不見便囘舟夢覺見雪青山白髪最宜看㸃綴斕斑著意難巧付小園渾未了東風急處又吹殘晨起嚼雪老齒生冰亦一快事布衾温燠似春晴睡足窗前一鳥鳴起挽梅梢拈雪嚼五行誰帶許多清近峯晴雪小樓周匝玉屏開木落林巒入座來欲唤老關商畧此兩峯髙並致佳哉日暮雪將作掃門待之凍鴉膠樹水雲迷雀語相邀作早棲浄掃門庭延雪集可容圭璧委塵泥夜静秋清月朗天時時霜鶴唳芝田築臺正與仙人約少駐人間五百年老彭像籛鏗自古夀稱延上下堯殷九百年自是周遮加謹畏至今百忌厯猶傳四皓像商山深處養靈根白髪昻藏滿面春一出漢庭安漢嗣頗疑傾得戚夫人大横屏燖鵝急雪洒斑斑疊嶂層巒浩𣺌間拳鷺失巢無倚著却隨蓬背下江灣成石屛詩後枕上再賦十年欲作石屏題覃思㝠濛意轉迷枕上呻吟飜了此短蓬秋雨宿浯溪冬日感懐四十年前不畏老酒豪踏雪買梅花如今七十愁年盡逺客匆匆夢到家
