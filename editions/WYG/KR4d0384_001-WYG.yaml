body:
  text: 閬風集巻一宋舒岳祥撰四言詩雨後月明起坐戱成雨後月明如醉而醒不見其形但見其影我夢初回非曙非暝道人無言起舞弄景水鳥無聲一鶴自警清風南来露墜炯炯我病不飲酌此清冷超然頓悟九萬俄頃伯夷士如圭璋自然廉隅一日無恥不可以居上帝降衷毁敗是虞遷史作傳爰首餓夫管鮑為管則易為鮑則難相馬失瘦相士失寒管貧鮑富坦然相安于利不疚于義斯完魯二儒叔孫事秦以䛕蔽愚至於歸漢薦進狡夫滅我王道甚於焚書是以二儒確乎其居停雲詩并序劉正仲和淵明停雲以貺予此詩予昔嘗和之以貽景韓泳道者也二子不可復作矣撫巻悵然復和之以荅正仲四海衣冠遭時艱虞至於暴骨原草者多矣予與正仲偷生巖谷稍尋筆墨倡酬以見志斯又不幸之幸歟我懷同人如暵望雨天地崩裂干戈間阻陳編孤哦槁梧自撫思而不見援桂延佇千山月白露氣濛濛四顧戃慌素靄成江飛蘿掃屋懸泉挂窻之子不至世孰吾從小園宛宛水木鮮榮子念及此我寧忘情曩嵗中都我歸子征以子出處用觀我生俯仰换世昨夢蟻柯故交零落屈指無多孔時尹任夷清惠和各言爾志夫也如何五言古詩寓言妾家有髙樓髙髙入青天欲作萬丈梯倚空無攀援良人在萬里一去幾經年長路與天接舉足躡星躔妾欲尋夫壻解甲投戈鋋擕手上雲霓真到天河壖牽牛與織女不知妾相憐姮娥惠神藥燕婉成天仙昔有貴公子聞鶴九臯禽其先本胎化棲止必瑤林遣使三徃聘致之千黄金清唳復善舞節奏合瑤琴日給費魚米延之如玳簪銜杯為主夀千嵗無遐心有客為主謀禽荒可傾國此物非潔清其志本貪冒遺矢玉階隂吞腥金塘側當以禽養禽毋令食人食主人頷其言從此成捐斥蕭條風雨晨蹭蹬霜雪夕鶴將辭主去顧視亦悽惻謂客君少留行當蹈吾迹客亦慘不樂相看淚霑臆十蟲吟并序予舊讀盧栁南詩因作黑蜘蛛葫蘆揖二首跋其後觀者絶倒今曹季辯示予詩一編名山中性情其中有詭異似栁南者至于竒不失正則幾于元次山孟東野矣不止栁南也為作十蟲吟以擬之觀者又當絶倒也蟲有促織兒憂人不憂已華身有龍鸞不出工女指瓦礫為堂奥青莎作衣被一身可自了刺刺不能已白露夜庭空凄其行去矣金屋白玉床貴人呼不起蟲有織絹娘軋軋鳴窻紙山翁卧中聞謂是機上婢瓠花日蕭疎豆葉行披靡青燈照夜闌胡為苦如此蟲有絡緯婆如繅復如紡豆籬秋雨餘秉燭不須網置之銀絲籠因而入羅幌偏資兒女玩終夜奏繁響蟲有搗米叔善跳如舂榖偶與屋上塵堕地豈好觸兒童仰置之反弓奮腰腹欲行復遭抑屢作不能伏非汝懶於舂其力有不足蟲有賣油公什伍處隂濕長脚如蠨蛸脛細走不及兒童反接之邀其吐微汁所挾雖不多坐此遭攟拾傾資僅有此微生何以給蟲有避債夫緝蠒枝間綴竊食檉松毛負之以為盖首䑕開兩端見人深拒閉想汝作債初已作逃匿計小兒不汝赦推尋見根柢計窮挺身走終日失其竁蟲有轉丸蜣雙角牛怒張生子牛矢中轉圜技所長兩兩如推車千百滿路旁彈丸有不若纍纍圓且光汙穢不自羞敢比蘇合香惜哉爾之智不善擇其良蟲有蛀地牛曲吻利如鈎趯取尾作首倒行腹為頭燥土作陷沙露喙伺其幽小蟲誤過之一入出無由小兒嫉其然取彼衆中酋縳置它穴口其類亦相仇一引兩得之盡置清溪流蟲有攛梭子頭腹俱鋭長縁衣而絳裏飛躍低踉蹡名我固甚善所愧無筐箱維天有南箕不可以􅉫揚微蟲人强名此豈彼竊攘秋田蚱蜢横暗野如飛蝗索索淺草中不倚兩股强類中最善類霜露死其常蟲有蠧書魚白膩鉛粉如岐尾細而長所嗜惟食書我老書乆廢兒曹復相疎經年不啟櫝冝爾穴以居蝕紙兼齧字古篆成紆餘腹中有經傳顧我何空虛續十蟲吟蟲有搏蠅虎似蟢無網罟羣蠅爭嘬時潜身入其聚蠅初玩其小突然能攫取生擒加面縛不辨頭翅股蠅為人所憎同欲畀兹虎其奈彼實繁日食能幾許蟲有白蟻虎食蟻功有取大厦初落成白蟻郛其礎日繁實有徒嵗乆仆梁梠聞爾能食之徃求數十許縱之穴竅中種育成生聚食蟻既無餘虎自縁庭戸亦復生几按徃徃入筐筥主人反厭憎擁篲務屏去客謂主勿然前勞冝論叙蟲有齧桑羊兩鉗如角怒𤣥甲類蛣蜣亦如龜背負我有十畆桑苦為渠所蠧食必食其心樹死又飛去不知從何來鑽鑿不到處上下開兩牕隠匿巧多路嗟哉啄木鳥剛吐柔不茹蟲有齧菊羊齧腦腦則死人謂食且盡細察理不爾微軀細於蠅𤣥甲而利嘴頂上一粟紅鮮明大如蟣方當四五月苖盛新怒起上下截其莖於中寄生子腦瘁子乃成分枝從此始種菊須摘腦不摘分披靡理有損而益未用分愠喜蟲有土中狗翼短身則長行地如狗子兩臂健擘張縱横成穴道堀堁身蔽藏握之人手中排抉力甚強夜飛能打人有物慿為殃收之入藥録䖟蛭同其良君看醫師術可謂宰相方蟲有水走馬八脚成四蹄映日如薸葉㸃㸃水中開得食時爭嘬忽然各東西天牛非觳觫水馬非駃騠形容貴其似甕舞為醯鷄蟲有天水牛兩臂徒甚修長尾龜其類𤣥背鱉與儔細評無甚似大槩勿深求終身混沮洳亦與蝦蛭㳺或云能羽化為蟬槐樹頭清髙乃如許亦足掩前羞蟲有蝌蚪子初化厠羣魚鱍鱍穿緑藻洋洋泳深蒲俄然生臂股去尾登泥塗回首謂羣魚幸來相就居神鯉為魚長不肯受辱汙荅云我龍種豈與爾為徒蟲有報雨蛙竹樹能攀援青褐隨所處膚如凝脂鮮長頸而方頷頋盻升髙顛久晴初得雨清聲滿林園紅蕉映白日碧葦覆清泉幽居樂清淨飲露如風蟬俯視蝦蟆輩逈然異凡仙能鳴復善晦所貴身名全蟲有搖櫓郎楚楚緑衣裳怒目秖自躁奮臂倚枝長附桑寄螵蛸亦入秘術方折之挿屋壁經時子穰穰竹籬疎復宻牽牛花低昻迎風新意氣顧盻何昻藏如逢大車轍毅然亦敢當不如捕鳴蟬脆美不爾傷十二月二十七日病起行花下聞春禽有感昨日立春節今晨春鳥鳴前峯宿蒼靄風聲和且平南翁病來乆起繞花枝行花枝向人笑婉孌感幽情摩挲朂小男何時看汝成童稚引我前老至不覺驚艱難亦已極須汝見休明望望替官役不顧日月征放言寒暑一大瘧天地一病軀古來幾寒暑元氣朘削餘人物生其中短小一侏儒神農乏藥草黄帝無醫書坐令豺虎横咬嚼為膏腴頑疾乆不治臟腑生蟲蛆願借大雷斧磔此害物徒八荒既清廓萬古無憂虞題王徳淵水西藁子有婉微句藏之平淡間想子無愠色熈熈好容顔吉人罕暴戾詳緩心自閒吾知子用意欲挽陶韋還欲以静息競欲以柔鐫頑坐使聽者心悠然和且安子來索我語我與子無言評茶及品水此事在舌端還有分别否歸鴻沒逺天稻花桑花稻花花中王桑花花中后餘花皆嬪妃以色媚左右稻花吹早香風露千萬畝上以奉玉食粢盛及醴酒下以飽蒼生億兆餔其口桑花雖無華紅葚映纎手皇后首親蠶六宫承傅姆天生衆裸蟲無羽毛飛走匪此皆凍死性命安得有予謂二花者斯民之父母昔予賦麥花適當来牟候未及歌二花三花誰可後請續時夏詩以為風化首春日新浴白髮美青陽新年試新浴小窻潔而明板閣宻以燠簾垂風絶蹊湯煖雲升屋探手酌温涼微微澆背腹上盆頮吾面下盆濯吾足初如馬釋鞿漸覺蟬蛻殻周浹更融怡味如書熟讀澡身當去塵洗心當脱俗湛然清淨源不遣生惡濁振衣聊出門篝煙度修竹七月十七日夜翫月遲月呼不出海氣紅碧嘘何人捧橢璧上處青松疎松間著不得飛徹萬里衢散作千山雪蘆花摇江湖冰輪雖漸側老桂斫不枯清光已非昨来日更可吁徘徊情所結有酒且歌呼借居喜杉棚成夏炎已云極秋暑方自兹借居面西日午後如烹炊主人愛敬客架杉覆青枝赫日辟三舍鮮飈汎淪漪髙蟬亦好吟振響流笙篪夜静明月出疎影復陸離欹枕寢桃竹露坐冠筍皮凡此暑中事施之無不宜念我逃世難過用恐禍隨昔時半山老畏熱架條枚不知公相貴清儉諒可思我本無家客禄盡夀有遺得此已厚忝銜感以成詩贈醫博士范心齋疾病之所生風寒燥濕毒浸淫侵臟腑脉絡起絲粟有藥所不攻鍼砭功始録有如龍潛見巖穴通隠伏又如善用兵洞窟皆驅逐毛皮與腠理一二數可燭刺俞已及髓投穴不中肉春回九地底氷崖芽衆緑范子故書生於此見也獨十年從良師神祕巻篋櫝我疑秦盧扁垣墻能外矚又疑華佗子披臟先剖腹范生何大竒方書可無讀我老目已昏煩君為濯滌更閲十年書細字蠅頭黑與子作佳傳當與太史續幽疥性不耐喧䀨况遭疥癢牽此物有朋黨一搔千竅連幽陰及肘股爛漫羅脅肩城狐及社鼠不如汝穴堅蟣蝨猶外患爾獨腠理穿百藥既不醒取説聊自完閑邪自檢束斂容如見賢彼亦畏天理亦有負其頑既不廢談笑亦不妨食眠萬事貴隠忍此方老子傳將别棠谿遺仲素季厚昆仲新交勝舊交生别猶死别饑魂散欲飛愁腸鬰以結去住誠兩難主客新握别家山杳何許千丈髙嶻嶭試登黄甘望百里見積雪我甔無儲粟我篋無重褐妻孥幸團欒忘此饑與渴倚君為大厦顧我顔色悦無家未易歸無産難久歇鄉校著我名免在編氓列麥田望有秋桑葉行可掇貫貲延餘年空囊誰負竊不敢久累君去去春二月為我謝王戴徽音無斷絶食蓮有感戱為古興新體青蘋先知秋調遣入窻几荷花如六郎一笑忽墮水美人坐生愁攬衣中夜起繁華難久持零落自兹始所思在逺道千里復萬里何處無芙蕖秋江總相似折取蓮蓬看蜜房綴蜂子青蠒初脱衣瑶軫中含髓食蓮須食心心中苦如此冦攘之餘穀五斗才易一鷄衰老多病資血味以為養求之弗可得畜二母鷄自春抱育至夏百翼不減子美生理喜而有作四月初十日昔有尸鄉翁養鷄盖阡陌累財千餘萬積微利自博子美居瀼西此物尚百翮作詩戒宗文墻東樹籠柵我今山居中生理苦廹窄衰年資食治時有不速客海魚不常儲溪蟹碎難擘頗欲效兩翁字鷄供口食買得雙伏雌領以一赤幘户外聽約束安能汙案席剖坼五十􅆑引哺漸開拆從兹日生生向秋益繁息麥雲行刈黄可得二十石已知餅臛具不假天邊翼竊笑茅季偉割烹惟一隻奉親不及賔資生拙無策古思二首耿耿不可忍相思在東北花月以為姿風露以為食取我虞氏琴一彈三歎息泠然不可尋變為湘江瑟湘江深復深哀哀淚千尺饑餓未必死甘腴能殺人惟悴未必殞逸樂能䘮身所以巖谷槁以儉全其真秉耒自耕野腰斧躬採薪亦復誦書史自負亨經綸兵冦幸無恙委蛇保天民矚物灼灼日及華朝榮夕已墜牽牛泫碧露見晛歘憔悴拒霜舒曉紅惟愁夕陰至蜻蛚庇其根亦復多愁思容色豈不佳浮脆何足貴念此令人嗟百年何流駛所以靖節翁把菊有深意過字韻詩辱諸友聯和方營度枯鄙以酬厚意偶報北兵自甌閩回驅男女牛羊萬計入蛟湖深畯出獨山屯尚義由童公嶺以北三日夜不休聞之驚心遂成閣筆是月十四夜對月感涕遂即前韻以紀時事奉呈諸友麥倒桑折枝山外花門過牛亡主不歸婦去蠶未卧在者哭空村吞聲誰敢大盲暉隠空崖驚塵飛暗堁川逝痛陵遷春深悲國破可惜此良宵月輪升紫磨荆公詩紫磨月輪升塞外十六夜月色佳甚對酒效樂天體招酒伴賞月八月十六夜清涼明月天新酒雖未熟陳酒喜未乾早稻有餘飯輕衫未為寒傍人見我醉胷中故朗然有詩不自作但詠古人篇喚取故山甫醉即對牀眠九月十四日夜枕不寐起視明月清寒著人泠然有欲仙之意筍冠枕清冷胡床坐空闊鮮飈飛早霜活水瀁明月神逰十丈蓮仰卧恣天閲挽取河東流黒我頭上雪泥丸吐神光陟降在金闕湛然大圓鏡一悟萬想滅十一日夜雲月㸃綴山氣如海羈雌暗嘷倐忽東西因誦王摩詰云夜登華子岡輞水淪漣與月上下寒山逺火明滅林外深巷寒犬吠聲如豹村墟夜舂復與疎鐘相間徃徃摩詰詩多描摸此境界余更掇拾遺餘耳孤舂出苫盖逺火翳層磯雲月光涏涏露葉淨輝輝此時正寂黙沙禽鳴且飛琴㫖重露洗叢菊長宇流哀鴻瞽月入九地啞木號太空老翁中夜起清坐尋絲桐兩片乾死木和合藏深衷七絃説妙義十指揚春風自古知音者舜文周孔公四聖洗憂患琴與易道通舜處嚚傲厄文居君臣窮二叔流䜛言陳蔡靡所容物外有變逆聖道當正中感此悟琴㫖瞭然古人胸置琴且勿彈待我讀易終送達善歸玉塘霜降水泉涸風𦂳草木枯柴扃常自閉淡泊守園廬晨有客來訪裹飯如桑輿世事不欲論幽懷詠唐虞蚩尤作五兵軒轅力誅除戰伐從此始禍患引八區兹事傷我心何由返古初我輩惜榆景來徃莫相疎古意客從南方來遺我薰風琴薰風未易致且奏易水吟髙浪忽起立四顧變愁陰征馬立踟躇旁人淚沾襟壯士不畏死怒髪竪森森長揖辭四坐秦關無阻深燕客視秦王已若置中禽一朝事不成易水有悲音請君且勿彈此曲傷人心十二月初六日龜藏夜坐有感厲厲嵗于邁栗栗風向遒老驥倦長坡卧樵如罷牛時時一長吁慚與螻蟻儔高鴻志萬里矰繳非所憂胡為苦哀鳴失類中道休壯士今則已偃仰搔白頭讀書有分限眼暗志未酬轉蓬從風起直上晴空逰流星下至地化石空山幽升沉亦何常念此涕淚流子瞻在惠州以十月初吉作重九和淵明已酉九月九日韻余去年以此日奔避萬山今日則有間矣有野人饋菊兩叢對之歎息因繼韻陶蘇之後去年十月吉四山戎馬交携家走萬壑惟恐草莽凋今日復此日回睇龍舒髙青黄雜逺樹丹碧曖微霄黄華一斗酒慰此兩足勞念兹一釡内觸之成爛焦我窮天所憐杯水解鬰陶㝠心聽回斡聊以永今朝十月三十日晴暖而梅意殊冷也良月今日盡始見小春天明日為子正陽復於此焉墻陰委宿莽已覺青姢娟壞壁出凍蠅亦解飛翾翾向來可憎物今者更堪憐梅梢太瘦生此意正𣺌綿窺園頻挾策粒吐紅豆鮮正須待一雪我豈資暄妍次韻袁伯長寄贈之作維時十月閏收穫已登場朋舊喜我至殷勤置壺觴問我何方來憂墨見清揚答言辱君問欲報不成章憶昔盜起初堅氷由履霜妖民縱愚妄敢凌太陽光賤子久客鄞移家入新昌完璞保貞吉訓猷謀善臧嶔嶇逺荆棘瘏痡辟鋒鋩五男不挾册四婦廢條桑長孫病風攣二孫鶴未昻三孫始周晬瘍垢浴蘭湯曽孫客中産敢擬門户當復有四女孫包裹針線裝步涉青店谿伏莽突長槍性命幸完免翁媪扶筍將回首煙焰漲捜山發窖藏家林付瓦礫書籍罹咎殃賫糧中道絶萬事慨以慷墳塋失灑掃祖禰廢蒸嘗瀼西非吾里浣花無草堂猛獸難與羣我亦思還鄉又聞來屠剡玉石恐俱傷冒暑去雪村故里隔一岡棠溪吾故茇父老不相忘昔行梅未落今憇梅再芳皇皇一年餘兒孫幸成行破屋涉寒暑舊隠𣺌相望越公之賢孫訪我欲具航老我日已短公孫意何長悲歌寄贈什歌罷復徊徨次達善送趙君理韻因寄畬齋陳貴白杉棚已絶筆復得雲錦書况當既望後一鏡懸空虛恍然玉堂上乗鶴來須㬰君健勝我健我臞甚君臞人事有離合尺牘莫相疎老驥不忘騁老耕不忘畬筆硯易亁澀時時要喣濡井汲去泥鮒清冽用有餘自君之徃矣我懷久不舒久聞畬齋君挿架富名都欲徃鵁鶄市讀書借其居我曾見其文鼎臠出帥初何年澂齋老道我問其途客好薄田嵗罕收柴門客多好車轍自成趣蒿萊不須掃鄰家知客到亦復饋梨棗酒盡當復沽言論自顛倒萬事皆可談慎勿談世道巖間宴坐蛩泣草根露鶴鳴松頂風標格既有異音韻那能同我家水石村圓月出中峯樵子時徃還野客多仙蹤杳杳林表磬㝠㝠巖下鐘霧重時作雨衣翠濕重重孔竅明似藕肌骨通玲瓏巖花時嗅馥掩冉紛青紅萬葉互戛擊琴瑟間笙鏞我當大悶時一嘯来清風鳳鳴相應和龍吟諧律筒竅竹去其節清響合商宫累黍以為律旋變為無窮仙人授刀尺度數合纎洪此訣留巖石千古蒼苔封村莊麥飯虀筍有懷達善正仲帥初因寄袁仲素季厚陳用之麥風生曉寒梅潦藴炎溽三日不出門新筍已成竹獨酌固自佳對婦亦不俗黄魚出海門饜飫及僮僕因思去年時煎牟作糜粥饑餓走荒山羣奴深兩目今春幸完生一飽萬事足薄蠶微有收條桑柔更縁百里無鷄豚雖老不食肉本是在家僧殺生豈吾欲頗恨在棠谿芻豢事屠戮歸來賣筍翁燒煑擬果腹無奈軍馬囂十百遭縳束此君何不幸乃值汝輩辱今辰斑衣郎扣門求采録開奩粲纎指解苞剥寒玉釋縛李左車拭面何平叔有此席上珍舉筯誠不惡風味近瑶柱標格薦醽醁似憐老翁饞洗我塵一斛蛻脱成癯仙凌空駕黄鵠吐吭出新詩落紙欹醉墨王劉戴三君秦楚齊敵國樂縣森筍簴箭鋒值正鵠安得長相從大嚼篔簹谷二袁竹主人森森散林麓我來不問主竟造藏書屋主人不我苛終嵗取書讀陳郎後來秀長瘦帶巖壑挟冊從我逰牛腰許成軸雨餘草樹間羽蟲亂鳴山齋晩酌朋輩已散聽之不減孔稚圭兩部鼔吹也既醉而卧卧而覺家人尚明燈事績説向來鼻鼾雷鳴兩山皆撼也戱作示之秋蟲不用喙動羽哀更清夜長不肯黙我眠渠自鳴我則異扵是鼻息為雷聲止作不以力太音自天成鼻吼耳不知此樂尤難名七月二日戲為紈扇新體美人弄紈扇常恨無秋風待得秋風至棄置在篋中棄置不自惜物理有終窮反恐美人寵隨手亦成空十五邯郸女玉指弄絲桐秀慧解歌舞艷彩敵芙蓉一朝登上國飛聲凌後宫此日邢夫人正自難為容紈扇手所題主恵余其終日食十月初吉日四野聞驚呼停杯出門看日食將無餘有如黒漆盤來掩白玉盂自午而及申磨盪未還初父老涕泗語便恐天眼枯前年六月吉晝日如煤塗衆星爭光怪淡月懸天衢已謂畢生世不復覩赤烏須㬰還舊觀田野􅉐昭蘇今胡久淪厄翳昧不可祛前時縉紳謂占度不屬呉分野受其咎天道安可誣以日諉敵國不君良可吁兹辰為誰食無路攄臣愚太陽萬萬古少待收桑榆丙子兵禍自有宇宙寜海所未見也予家二百指甔石將罄避地入剡貸粟而食解衣償之不敢以淵明之主人望扵人也因讀淵明乞食詩和韻書懷呈達善亦見達善燒痕藁中有陶公乞食顔公乞米二帖跋尾也淵明不可及適意惟所之無食不免乞折腰乃竟辭主人必義士知心如子期厚饋既賙急復酌我以巵談諧有真味斯人定能詩栁惠未失正魯男豈可非學陶何必乞書此以自貽次韻酬達善昔有好名者舉國讓子之若或非其人簞食見色辭草木固同臭磁鐵非有期主人解談諧寓言䝉莊巵陶公豈真乞善謔淇澳詩仲尼不假盖將䕶子夏非賢哉此賔主不乞彼自貽促織歎刺刺重刺刺唧唧復唧唧只解促鬢絲豈能催婦織織亦何用催有絲願成匹今夏蠶薄收巧手閑刀尺昨下急急符三日立税籍篋中無餘絲紅女涙雙滴汝更催不休使我不得息汝因貪與嗔形化生股翼不特登我門又入牀下壁號我夜不眠墐户無計塞何時清霜來堀堁同一寂十月五日風十月五日風俗占端可驗常年誰能記兩嵗入程槧去年當此月初三月未艷暮下陳村莊夜投象原店道邊人未眠山曲燈微閃時經兵火餘驚問暗窺覘徃扣𤓰葛門炊糜聊屬厭仲叔為猪肝不辭口腹玷回思萬馬驚心掉舌為舚恐恐如有追昧爽踏霜霰横山過西田惡風吹欲阽蕭蕭三兩家逋流已先占憐我是官人枯薪許分㮇時囏無沽户麄糲得充歉我行僕忙追趙坑石排劒荒蹊陟崇岡奔湍嚙深塹有塢當中心紙鄉家自贍主人褐寛博黄泥補茨苫邀我勸我留鋪床展伸欠少婦亦解事爐中添燄燄我意自多危岌岌急風纜蓐食入雪樓山深路猶䦣氷柱照層厓霜花滑斷磡山家喜客来開門容弛擔翁媪互行酌畦菜許分鹽此日氣頗舒愁新懽得暫文叔因饑寒豆粥懐一㗖勞薪與錬炭至此成鍼砭頗怪少陵妻粉黛未忘豔今辰復此日山菴私酒釅掃林三日風紙簾垂襜襜患難幾人全生存吾已忝十月五日風艱難須在念隂雨㡬月餘三月初一日聞鳩鳴有作春雨濛濛来花時昏昏過山深多悲風閉户祇欲卧此村無杜鵑不知桑葉大灘聲自不惡頼此洗塵堁曉聞晴鳩呼雲隂似將破故園何時歸麥飯出舂磨聞鳩有作喜為晴兆也是日開霽又喜其占之有騐再賦之以貽達善季辨天色難保惟快作詩為應耳雨乆成淫昏新晴如改過漸向東皋耕還思北􅑵卧昏眼喜天晴觀書驚字大流泉無淈泥輕風不揚堁歸途未須忙差穀聊避破小園遲能来早茶看落磨十月初五日重賦菊昔人十月菊已恨光景衰今兹十月菊瘦蘂未覺遲兩年無官厯弦望占盈虧人言閏在子節候固應違此物秉堅正未怕風霜欺寜同此身槁不與清香離香性自流傳更過梅花枝贈馮法師我昔登巾山曽題翠微閣清詩照江月月落詩不落踏露沐長松遼東一隻鶴千載還歸來塔杪棲寥廓過我滄海東復作羽衣客問客何處來乃是巾山郭舊題雷巻去恐我有新作贈之錦繡段歸哦耿林壑初蟬雨餘山氣涼髙林發清樾黄鸝百囀罷初蟬始幽咽獨蠒曵長繰既續還又絶衰年感時節坐久心寸折夢歸伊川上樹深泉亂發倚杖聽多時殘陽滿雙闕送陳用之逺逰流水冩清音青山發令姿左右惟所取囊篋恒相隨君逰且有日欲訪燕趙竒此行猶在眼已作久别思君如生馬駒騰踏不可羈王良施轡勒往獻白玉墀胸中二三策和扁為國醫南士方世用砭鍼貴適宜腰間黄金印季子何必歸丈夫輕四海吾老不可期何以為君贈梅花千里枝何以為我報千首紀行詩失題山雲如練靜水雲如鶴飛細觀聚散間動靜皆天機是物本無心出處不可期我亦嘗出岫不雨竟空歸師今恐雲去宻宻關窻扉收巻成坐卧補綴為衲衣此中有深意宴坐添爐霏效阮嗣宗一首貧莫客千里富莫不出門廹隘多陵辱飄颻困風塵所以丈夫志奮翼凌清氛一舉蹴四海載舉登崑崙玉皇顧我笑衆嫭粲以繁引酒酌北斗銀河為飛翻天姿固如是齷齪何足云鄙哉貧賤者矯首望餘芬鵬鷃各有分榆枋保終年初九日夜月下聞蛙此物得水悦樂故鳴心事與農人相關也平田展明湖宻林含宿霧整冠對明月天眼實汝顧那敢醉謼號袒跣縱箕踞清心聽鳴蛙勝與俗子語青秧挿已齊決決溝底度憂樂在晴雨將非為私故斯言乃知音旁人自不喻余兹適無事泯然離好惡坐久天西傾汝鳴余睡去五月初四日浴閣成罷農亦易足麥黄秧已緑早蟬發髙林晚鶯隔修竹壺觴休倦劬草閣一開浴翛然非吾故佳眠恣清熟題蕭照畫巻逺峯沒空蒼近樹森立壁叢篁鬰長汀茅茨露半脊歸舟何處家中流弄長笛或恐畫師身留此黯淡跡徃時予有湖湘之㳺同年黄東發提舉以清江楮衾贈别藏之四年矣山房夜寒覆之甚佳亂後不知東發避地何處作此擬寄我昔向湘潭故人貽我别珍於錦鯨贈未數綈袍脱温如陽春曦白似臘天雪香收禪榻雲光映書齋月政爾獨眠佳毋使惡卧裂隂寒不内侵和氣無外泄自從離亂來袍褞罄攘奪惟此寄僧房與書俱不滅我本生蠧魚自愛紙中穴宛如蠶作繭蛾吐眉眼出夜来初肅霜子美衾如鐵忽憶此青氊覆我儉且潔中有布衾銘此銘無冷熱謝達善見惠碧桃古體碧桃有佳實方春開白花花悦悦花者實惠能詩家詠花不詠實未解寫嘆嗟水蒼充朝佩天碧㵼露華空青珍莫采帝珠淨無瑕水波逺涵竹霄影浮副𤓰春山淨梳掠秋烟澹籠遮卵色未有别膽形圖更加清酸笑金橘寒脆壓銀茄瑶池潄靈液萼緑䝉翠紗一食潤燥吻再食思無邪三食換仙骨四食凌飛霞回首謝玉塘吾詩不妄誇周梅所還譚山柴門萬物靜秋色栖四山風篁自灑掃雲鳥相徃還而有𤣥寂士泠然嗚轡環此客不喜飲舉瓢酌潺湲来既無所期去亦不可攀抱月入緑蘿枕石秋菲間石臺紀遊案此詩原本未載今據宋詩紀事補入蒼山面長溪勢若飲奔馬層臺跨其脊萬古絶蕭灑登臨惟兹時朋從未云寡迢迢厯榛莽靡靡眺原野白雲與翠霞夐在履舄下窮秋向摇落霜菊摘盈把賞心孰與同幽抱欣已冩邈矣千載期名山俟来者
