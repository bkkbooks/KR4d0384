body:
  text: 閬風集卷十一宋舒嶽祥撰記月中桂記余記童丱時先祖拙齊翁夜課余讀書㑹中秋月色浩然聞瓦上聲如撒雹甚怪之也先祖曰此月中桂子也我少時嘗得之天台山中呼童子就西廂天井燭之得二升許其大如豫章子無皮色如白玉有紋如雀卵其中有仁嚼之作脂麻氣味余囊之雜菊花作枕其收拾不盡散落磚罅甓縫者旬日後輒出樹子葉柔長如荔支其底粉青色經冬猶在便可尺餘兒戲不甚愛惜徙植盆斛往往失其所在矣是後未之見也每遇中秋月明輒憶此時事今年五十九對月悵然此至清之精英也今若有此定汲井花咽下也愛間堂說余每愛陶靖莭之言曰少學琴書偶愛間靜開卷有得便欣然忘食見樹木交隂時鳥變聲亦復欣然有喜每五六月中卧北窗下涼風暫至自謂羲皇上人余亦自謂頗知淵明真趣然未嘗以語人魏君天與新作堂于所居曰愛間求文於余余問其義云何則曰此取吕文靖愛間能得幾人來之句也余謂之曰是愛他處之間非愛其居之間也當為子易之既而忘前語蓋衰老之常態也踰月而君來索名豫無以復之則曰名不必易也當易其說耳遂舉陶公語以告之君亦怡然領悟請揭諸屏余亦自笑曰題猶故而意則異耳蓋亦舉子之故習也覽者得毋有馮婦攘臂下車之誚耶雖然君昔以舉子業而薦鄉書矣必不余誚也遂書以授之為愛間堂說嵗庚辰十月朔日新建委羽洞天大有宫記余每愛蘇子瞻空明流光語為清絶及觀道家言委羽山為空明洞天則知子瞻語本此又愛杜子美仇池小有天之詩為幽絶及觀道家言委羽為大有真人治所則知彼為小有此為大有也昔姬周之季劉奉林居嵩山三合大丹為邪所敗至茲山則得道成仙騎鶴上升得非異禀靈氣有以相感發歟世言鶴之往墮一大翮遂以名其山噫其信然耶雖然訪羽人於丹丘則吾台誠羽人之區也子晉主治桐柏初游戲赤城葛翁道場猶在子微經幢故存皆得道之人也此何疑哉此山舊有觀不知始何代誰氏至紹興間黃巖令李端民命道士董大方主之剗除荒蕪稍復振起上蔡謝君伋為之記一時名人多有題詠其事未久而廢至淳祐癸丑今足庵王君自玉京往禮焉仙跡雖存菅茅不翦四顧皆屬之豪右徘徊悽愴不知西峯之既夕投宿逆旅夢一羽衣手握羽扇上有題云念于空處須堅守事到明時好力行舉以相授曰三五為期當復㑹此意若有所屬景定壬戌有㫖召至闕庭充西太乙養素齊髙士咸淳丁卯乞假歸省其師一夕復夢前羽衣來訪謂君曰尚記前約否耶君寤曰此必委羽仙人屬我以興復也屈指數之自前夢至此十五年矣蓋三五期也明日櫛盥謁其師白以所夢師曰此吾志也汝盍成之其師沖靖髙君惟幾也未幾上命趣還以前夢奏聞上嘉異之亟命頒降度牒以資營建就令主領其事歷甲子戊辰宗陽告成遷為宗陽常淨髙士辛未再領西太乙又五載遷至宗陽身在帝闕心遊羽宫乃經乃營棟宇粗備丙子冬之變一炬燎原成功廢矣舊觀在羽洞之前地多鄰塜風氣泄露非養真之所至元戊寅改卜天長山之坡去仙洞才百二十舉武始建三境儲祥之殿掖以兩序東立方丈而厨庫湢浴列焉西則偃息有所展鉢有堂棲雲有寮肅賓有位拱以廊廡總以山門亭以寅賓外有清泉以便盥濯門以櫺星旁開便闥以容出入余暇日試為君詳其夢授以羽扇者委羽也如梓人其規圗先定畫宫于堵而繩墨丈尺從之也其題空處明時者空明洞天也其曰堅守力行者知厄㑹之將至度大數之復新而屬望於君者深矣前之艱難以試君也今改卜而有成則堅守力行之說驗矣天下事豈惟一宫為然哉君受遇於理度兩朝事君如事帝動靜不離道陟降有常度故雖社稷變置而膺受殊渥靡間南北玉像金冠象簡霞服寶篸星佩纍封疊號光動河洛人榮此行矣而君之言曰身留金馬閲五寒暑萬里外此生如寄惟羽宫大緣未遂若不遑處余聞而悲之知其志之懇切惻怛也君之趨召營繕未畢及還乃建法堂上為寶閣以奉玉像榮上賜也置田以贍衆買山以給薪開圃以畦蔬其為慮也周其為惠也久昔之難成者今易矣君名中立足庵其自號今以宣授仁靖純素真人為開山祖云養志堂記賞勝者領其要攄幽者當其機是故神山秀嶽假髙逸以揚輝當其機也朗士俊人托遐邈而含耀領其要也白樂天謂㑹稽為首剡為面沃洲天姥為眉目誠領其賞勝之要也謝康樂詩曰暝投剡中宿明登天姥岑此則泝江而上投宿剡中明發而登天姥自此入天台也唐朱放詩曰月在沃洲山上人歸剡縣江邉余嘗自㑹稽上古剡夜望沃洲諸山月正在其上則知詩人之句誠當其攄幽之機也今自新嵊泝源而上至于雪溪往往以雪得名由戴安道始也故其地有上下雪之分居人皆豢龍氏之裔鴈墻翬宇花木參錯一溪貫其中兩山如匣夾行而西騖半巖為飛瀑下為靈湫諸董族實居上游以筆硯肄業者十九世以隱德著于鄉其亦賞勝之要攄幽之機歟余因避丙子己丑之亂兩至其地夫思其人者懷其棠愛其主者及其烏而况兩至其地乎此余既去而不能忘情也董生景愈作新堂於舊墟扁曰養志來請記噫斯地有德于余者也生又學於余者也可不與之記乎余問生之志云何生曰僕不敢僣昔者孔門三子各言所志咸當其才惟㸃也獨言浴沂風雩之趣翛然在事物之外而夫子與之僕不敢僣也然竊有志焉青山以為屏案流水以為金石奉親讀書於是觴賓俎友亦干是彈琴詠詩亦于是庶幾㸃之萬一有以承先生之教而不愧倘可進乎余曰是足以記矣鳴呼若生者可謂得賞勝之要攄幽之機者歟生字紹孟今所居屬新昌至元二十八年四月十七日閬風舒某撰廣孝庵記奉化棠奧袁氏昔以富潤屋今以儒美身子弟彬彬向文學矣余以己丑夏避婺寇至其地袁仲素季厚闢堂下榻若久故焉余家三百指其至如歸時余杖䇿度黃甘貰貸以給朝夕餔二袁向人不作難色余以是賢之欲載其事附見于余集中使有傳焉然未得其目暇日行其考潘奧之墓道有石志峙焉乃戴帥初作也載袁君鎮行事歷叙丙子避亂初至棠奧袁君延至其家聚其尊稚而處焉然後知二袁于我禮敬之意有自來矣㑹于明年春歸鳯棲茇舍二袁移書問勞相續明年冬季厚之子本奉二父命來以潘奧廣孝庵請記余駭其名之大謂之曰古不墓祭故庵廬之制未之聞也後世以廬墓為孝於隧外作饗亭為嵗時拜掃一席地其後有力者又為庵於饗亭之左邉使僧徒守之以供焚修灑掃之役又其後仕宦至將相勳閥在宗社者得請賜寺院為燈香之奉其事侈矣孔子葬母于防先返而虞使門人視窆焉雨至墓崩門人後至以墓崩告夫子泫然流涕曰古不修墓蓋責其非禮也然則既葬而往墓不必有守廬也今之為庵者過矣子之曾大父之墓有汪村之庵在焉子之大父之墓有潘奧之庵在焉相去一里所夫以一里之間而有二庵謂是為足以廣其孝與余知子二父之意必不然也余聞之夫子生事之以以禮死葬之以禮祭之以禮何謂也生孰非養也必禮也而後謂之養死孰非葬也必禮也而後謂之葬葬孰非祭也必禮也而後謂之祭子二父于其親也生養死葬之禮畢矣逺矣不可追矣惟祭也追逺之道也先儒原古酌今為家祭禮使大夫士皆得依倣而用之豐約惟禮不替不昵余聞子之二父守是庵也有道焉雲溪之村白石之里有祭田焉足以供資用粢盛酒醴牲牢脯醢於是乎出獻侑必躬必親以嘏以燕遍德錫類使觀者感動曰孝哉有子如此夫然後副是大名矣子歸而復言于二父其以余言然乎否也本曰唯唯謹奉教至元二十九年二月既望寧海縣學記皇帝既一南北郡百蠻乃尊孔氏隆儒術闡文治也京師立太學郡置學教授縣設學教諭凡有籍于學者皆得免徭役士無科舉之纍而務問學之實郡嵗貢一士庶幾鄉舉里選之意天下之士幸矣台郡士尤幸也比年諸路縣長佐多值好文敦學之彥加意作成又幸上置肅政亷訪一司分命馬公訓監臨于台首以學校為重既新郡學又欲新五邑學此非台之士尤幸者歟人謂台學固幸矣寧海學尤幸也初寧海學之在宋東都日與孔子廟各奠一所髙述之頌李慶孫之記可考己今學與廟合在縣治之南嵗久摧壓縣丞周侯汝弼嘗修治之有緒矣己丑延燎於婺寇之變縣丞孫侯天錫實提學事盜平民定決意興建是嵗七月作講堂直舍朔望行禮於其中講說亦不廢畫宫于堵次第修舉矣明年十月判官張侯謙以督海租至明年七月治中王侯英以慮囚至皆憫丞之勞相與勸助於是孔子殿成塑聖哲坐像位列有序拱以儀門櫺星翼以兩廡八齊游息有亭后土有祠下至庖溷莫不新整明年十月廉車行部至邑入學奠謁禮成顧瞻齊序周視門廡一物不備公以為慊諭諸籍儒亟完治之此豈非寧海縣學尤幸者歟嗟夫大矣哉皇帝一念之仁恕流行變化故海隅逺邑能建立如此于是前教諭沈桂見教諭朱安宅孫均後教諭李洧孫緝續勸率而成之職事諸生謀樹碑紀績而請嶽祥為之記嶽祥不敢辭乃諗于衆曰自古一統天下之主未有不尊孔氏隆儒術者也漢髙提三尺劒誅秦滅項干戈甫定過魯祠孔子秦灰既冷之後孔壁未發之前有此偉特可為萬世法東都建武有唐貞觀亦一統之時也皆用此道立太學幸國子監命名儒折衷衆說集成疏義使學者有所趨嚮豈不韙歟是故自古一統天下之主必尊孔氏而隆儒術也夫一統之主必若是者何也六經者理義之統也理義者人心之統也人心者天下之統也崇經術所以眀義理理義眀所以正人心人心正則天下之統定矣統者何惟精惟一允執厥中堯舜禹湯文武心相授受之統也孔子心得堯舜之統者也格物致知誠意正心修身此孔子家傳之統也㑹其有極歸其有極極者一統之所也是以歷代帝王必得此心之統而後一天下之統也孔子之徒儒家者流博學審問以求其說慎思明辨以究其歸終於篤行以踐其道不雜於異端不惑於小知有天下國家者用其說則治且安不用則危且亡古之聖賢無六經外之人物善乎儒者之用心也其為學一出于孔子其用心亦若孔子而已居無一畝之宫而區區欲為有天下國家者治其天下國家抑何迂也然而安四海之民而不以為泰建萬載之業而不以為功此帝王所以尊其師而隆其術也皇帝蓋深得統天下之要矣此則天下之士之幸也豈惟一郡一縣之士幸哉鳴呼一雨之雲四海皆均也一葉之春八荒皆仁也以一郡一縣之學之幸可以知天下之學之幸也僉曰唯唯是為記至元二十九年十一月望日前集英殿進士舒嶽祥撰重建台州東掖山白蓮寺記余童冠以應鄉舉過臨海寧川兩界之嶺曰桐巖日晏而息宿于白蓮莊至此過嶺可半矣地勢稍盤礴有民廬田舍設館掃庭以延納舉子其倚山臨路乃白蓮寺之莊宇也炊黍未熟舉子亦得而逰息焉其主莊僧頗好事設為書肆凡舉業之所資用學者之所宜有者皆籖揭而庋列之或就取而觀之無拒色亦不為二價澗窮壑絶見此小佳余嘗記之在心目也問之居人延袤三十里大半白蓮之所有余故友方沂每與余約遊東掖惜泳道先約而長逝余苦無僕馬之資不能一往至今為恨事庚寅秋余目暗耳瞶方欲棄筆硯習禪觀有蓋倉真逸道士葉龍起持白蓮住持景荃書致殷勤于余其徒衆又狀其寺之本末請記其偉觀夫東掖江南之名山其山有白蓮能仁二寺白蓮又其著者也昔智者師唱法于天台佛隴經論行于天下慶厯初有神照法師本如誅茅結草椎輪而建庵綿蕝而行道講譽風馳座下雲集有衆五百遂大兹剎聲聞天朝錫號白蓮嵗久材腐殆不能芘風雨淳熙間有法英師誓新舊觀道足以化人信足以服衆仰者如山從者若水白蓮之譽復盛於東南學者比之國之上庠自經口講指畫之餘者出遊諸方自有一種風範人咸識之曰此必自白蓮來也丙子兵火及之殆劫㑹之有終與嵗庚辰荃師來蒞茲山天以法師惠兹山其意深矣師道行平實講演著明精義入神四衆推服顧瞻礫場若疚在已一念奮發天人悲涕隂相陽贊不十年一寺表裏規制如舊而髙廣有加上方廉節耆宿叶和衣鉢之傾倒不吝帑廩之出入無私以溥容衆以裕後人蓋願力所至故成此不難也或曰白蓮不火也或曰法英不死也或曰英法師生長于台受業于禪林住白蓮十二年去而主天竺之席荃師生長亦于台受業亦于禪林來主白蓮又將十二年矣其建兹寺又同也其殆前後身乎寺成而謀記筆於葉君葉君曰我蓋倉之觀新得記于閬風先生吾觀可以不毁矣上剎東南之望也記毋輕屬吾試為公請之于先生先生樂道人之善冝必得方盛暑余亦火後寓鳳栖茇舍道士之請如為己請也道士又余故考胄子補闈時所取信公子弟也不知諾之吐于余口昔韓退之以不得至南昌滕王閣為恨而以得載名記石為榮余于白蓮也亦若是矣遂托其事實而書之且歷叙願見而不得至之曲折嗟夫余之所欲訪而不得償其志者如天台之石橋寒巖亦吾州之竒觀也皆有所未暇豈兹事分量亦有所限哉嗟夫釋老二氏之並行於世也久矣今荃師不疑葉君之異己而託之以請記葉君亦不以荃師為不同道而為之請余又不以二氏之非吾道而慨然為之記皆世俗所不能解也知此則可與言道矣
