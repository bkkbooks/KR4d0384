body:
  text: 閬風集卷五宋舒嶽祥撰五言律詩燈下飲别歲晚客思去天寒子肯來稽留須酒熟歡喜見梅開蠟屐匆匆駐箯輿故故回嘉平猶未盡且欲舉殘杯贈别山甫勞君出南峽從我上東山辟惡香萸紫延年細菊斑看雲獨無語覆斗且徐還說到忘機處沙鷗也自閒贈别君英相去十五里不來幾半年知君有農事踈我話詩篇置石桐陰澗開門海口天老人愁此别把酒菊叢邊山甫遊嵊拜戴安道墓而歸新年過我鳳棲作此贈别尚謁死安道寧忘生閬風千巖幾尊酒百歲一枝笻且可耽甜黑何須醉軟紅謝公高卧處明月在巖松正仲過鳳棲臨行贈别甲子春晴好鳳棲理去鞍江湖一葉小風雨對床寒鼻鼾聲何壯燈花夜未闌紛紛多盜日吾黨敢求安贈正仲别一年三過我此去定經年雪壓登魚渚雲生落鴈田壯遊今已矣老别自澘然心事有難說斯文屬子傳再贈不惜此時别毋忘别後音相隨溪上影共息樹邊陰水落行田蟹霜晴出谷禽何須拘改歲有興即相尋四月六日絶糧用銀盞易榖作詩别之從此與君别臨行更一傾縱令愁作海誰送酒如澠已悟興亡理空留物我情不知陶靖節何物了平生十六夜月蝕既蝦蟇新食月金餅曲如鈎天道終還舊書生自隱憂星辰秋後爛河漢夜深流我欲騎鵬背乘風閲九州八月二十五日聞布新條民命無魂鹿烹庖幾日休紛紛渾未悟炯炯為深憂並和鄰舂相分漁步網收近海民以小網行捕淺港謂之步罾聊為目前計瓷碗汲新篘過劉允叔故居先生宅前有老檜甚巨薌巖乃里中名山藏書其上流水孤村裏先生此故居風流今已矣天道竟何如古屋前朝檜薌巖萬卷書蒼苔封瓦礫野燐出丘墟安住寺松聲晴日千竿籟春風萬鼓鼙清和兼怨適細大雜高低釋子聆眠石行人聽過溪曾於天竺寺為爾駐遊藜聞鄞兵入仙居二首獨嶺斜陽笠深溪夜雨燈多憂未歸客萬事不言僧兵甲今如此台明昔未曾欲言徵斂數天逺有誰能細雨殘陽外孤村亂水中饑年才半菽白髮聽踈舂世事何曾了吾生㑹有窮深衣斂形日嗟我一枝笻悲來竹簡千年夢楸枰萬古爭推敲渾細事著述亦虛名春艷無長好秋吟恨短生乃知天壤內各以一時鳴僕有書五千卷藏明恩山房亂後幸存胡山甫寄一榻為吟所聞已遷入作唐律寄題歲久殘僧屋吾書故不塵持經入深竹分韻與間人花氣聞慈像松涼施四鄰細思貧最好懷璧每戕身雪後喜晴和正仲近詩今朝天氣好寒減暖初增微醉無灰酒間居有髮僧芳情花下月艷眼雪中燈久廢賡酬事新詩忽啓縢雲開青鏡曉病起白頭人陽洞林光動晴簷鳥語真黃花修故事新酒接比鄰火急輸官米寒舂連夜頻十一月初三日夜有興尋梅樹下春來往忩間月死生尋梅何處好隨意自溪行酒債應無數燈花各有情明朝江上路風雪一詩成送潘少白遊桐柏宫桐柏舊題句方瀛新記文因君重拂拭為我致殷勤仙過峰停鶴龍藏井閟雲金丹如可錬此去訪方聞曝書庭中即事有作因思正仲在鴈蒼山南為我作小楷雜以和篇當大有可觀因以寄之稍覺干戈定聊寬旦夕憂黍黃雞應喌草逺犢呼年匣畫乘陽展庭書值雨收漳濱想公幹小楷作銀鈎賤生之日邀正伸子堂小酌開歲恰七十吾衰病已頻從今數正旦一月有三晨甲子添新志乾坤寄老身晚年方學易此意為誰陳次正仲訪山中留别韻及此真知老吾初不謂然相期無别事不朽要千年過我論新句留君訂舊篇胡為趨歸騎忙似趁潮船挽董知鎮曽行栲源路相訪竹溪頻事帝清心旦於人笑面春升堂驚挂影下榻憶延賓風雪深尊夜梅花滿座茵花鳥色與聲俱妙鳥啼花亂開此時無事惱有酒待誰來漂泊迷歸路昏花恣覆杯已聞雷迸筍不怕雹驚梅四月二十四日雨中分酒餉山友欲言林下趣思共澗邊行細雨枇杷熟空江杜若生離居非逺道向夕自含情偶此開松酒分將一榼傾楝花蒸入黃梅雨寒收苦楝風團團羽葆蓋疊疊繡熏籠文錦財堪用金鈴實有功小畦留一樹斤斧幸相容山齊夜坐新歲才三日春風便不同花前雙鬢白雪後一燈紅老去心無術愁來佛亦空吾儒真實在千古獲麟翁用正仲茅字韻月白溪頭石霜清屋上茅歲行天自運人老志還勞冬菊忘年友寒梅耐久交向來金碗醉今日對陶匏次張幼學見寄韻何必羡商顔幽奇出嶮艱歸舟天際樹宿鳥屋頭山畏虎長危坐尋僧更不間酬詩無好句奚錦得空還九月朔晨起憶故園晚易晚易書齊名也晚易圖書燼篆畦花木新承平三世積喪亂一朝貧清曉憑欄意空山袖手人平生欲學杜漂泊始成真賦山庵梅花水石生來瘦乾坤孕此情寒溪千尺照殘雪數枝橫光射霜髯逼酥浮玉面爭何人夜吹笛故作斷腸聲簡胡山甫山甫新有病起百花開之句門外月誰敲花開醉逺郊自尋幽寺宿不耐俗人交裘替疏泉洗詩添續紙抄一身舟不繫萬事柱難膠臘月朔第二孫繩祖彌月喜其與翁同十一月而又皆乙亥時也因賦以祝之繩祖初彌月清晨抱見翁頗憐頭額大兼愛月時同句法何時就家聲待汝洪吾年八十二方見汝成童送潘少白赴連山館其先有古桐者受菊田詩學桐木深坑嶺菊田髙弟家聞渠能館致去我使人嗟箬長潛沙笋蘭開傍石花古琴留掛壁此意淡無邪還龍舒舊隱今朝歸小隱鄰里喜還悲亡國誰修史遺民自採詩鼠營新穴壤鶴理舊巢枝見說寅年泰冥心待運移民謡有虎嘯太平年之句懷昔淮海新封國東南望止戈紗衣秋意早石枕雨聲多白露皺紅棗西風擺老荷昔年遊萬里今日興如何暮春山居呈山甫正仲徑盤如繆篆石淨可橫琴好鳥連朝在蒼苔一寸深撥泥尋筍脈掃地引蕉陰三客誰家有風流壓晉林十七日夜村市今歲梅誰待因遲却未殘新泉生暗谷逺燒照前灘圓景終難久殘燈未肻闌沉吟思往事猶自倚闌干喜見早梅花朔雪吹吟屋春風駐酒家野塘氷上鴈官柳月中鴉玉饌寒沙筍金虀夜雨芽開窗有新事喜見早梅花戲作莫笑山居僻山居號令明芭蕉工報雨鴝鵒解知更樵長專封拜詩壇擁甲兵開忩一壺酒新句賞新晴秋夕寄周錬師蟲聲叠哀思樹影弄清輝休恨催年老私慚昧昨非倦童眠自語驚鶴定還飛逺念周髙志華顛坐翠微易庵道人歸鴈蒼兩月矣作詩趣之一入鴈蒼山山蒼鴈落灣石螿鳴杼下沙鳥宿窗間吾子動多悔老夫今稍間密雲踈雨裏心事極相關甲申正月二十日遊盤谷道院贈石澗錬師滄海連雲族青山逺驛塵回旋成小隱想像著幽人桃樹偏臨水梅花諱說春扶輿穿犖確空翠濕衣巾過明智寺每過明智寺小寺在山前老衲分雲坐山猿抱子眠巖花紅雜雨野水緑平田火後傷心處青山響杜鵑春晚寄二林榖雨秧芽動楝風花信來蟹奔沙上火筍長地中雷燕子巢重定主人門早開二林詩敵手先著一篇催辛卯正月二日蝶軒蚤作鴉背閃晴天輕明紫翠烟年將人老大形與影周旋鳥語催晨枕梅花照夜編池塘春草句此意有誰傳吾道聞惡休三唾懷賢賦七哀衰年催白髮細雨足紅梅江海歸詩卷乾坤换劫灰老儒何所用吾道自須回八月二十八日與潘少白劉君英草酌耕養堂時劉正仲以求免役入城豫亦為羣小見厄者也二子論秋夜秋蛩是四鄰葉黃狐下隴燈暗鼠欺人借譽門多客臨危俗少親平生劉正仲於此見情真約諸友九日遊東山語石雙蛩碎鳴軒一葉鏘黃花無舊客白髮又重陽日月雙飛翼乾坤幾戰場人生一百歲不飲自堪傷山甫病中歸峽作此問之山甫病歸峽僧言藥有廖自憐三歲長多白幾分頭水鳥工吟夜陰蛩苦話秋詩人多病瘧彊飯更何憂送帥初遊浙西吳下吾遊地因君思又飄水花香外雨沙鳥夢邊潮載酒浮官舫吟詩上驛橋三高祠下過為賦楚辭招松花偃蹇不入俗隨春也作花高攀許樵子輕掃落僧家功用雖非藥風標正似茶秋風收子食辟榖勝胡麻消憂鳯棲塘上路春草思悠悠緑樹雙黃鳥青山一白頭詩書自有厄盜賊本非仇天道知難問吾貧不肻憂宿龜石寺朅來誰主我野寺得間行借屋安書庋就巖搘飯鐺山晴分鴈轉水暖見魚生無事人情好相逢總笑迎遊龜石寺舊說龜為石今知石化龜溪分剡溪秀亭近鎮亭遺沙鳥穿青樾巖花覆碧漪逢僧如雅素㩦看古廊碑重遊龜石寺一龜先過水更有一龜尋鳥出石潭底筍穿沙樹心平橋連斷岸古佛坐喬林竹裏何人住時聞嘯咏音曉涼秋風萬里清客子最含情山路殘星在柴門野水鳴平田聞鴈起落月有人行破篋無書冊何須眼復明題汪日賓西樓附山甫達之不忘西來意開窗西復西柳懸魚怒頰蒲縛蟹團臍縣近更傳信寺圍鐘到齊山翁出山處放杖得新題山窗即事思正仲有寄相憐不相見不見自情親野水僧無影斜陽樹半身懶蜂偷柏蜜饑雀啄窗塵吟就懷人杳書成訪驛頻獨坐遣興昏眼迷煙雨修眉隱樹林杜鵑知夜半蟋蟀俟秋吟靜悟平生事閒思萬古心蹉跎七十五既往莫追尋十月初七日山中感興日暮空歸里時艱未到家稼收遷野鼠柿熟亂慈鴉冬暖生蘆笋人閒對菊花亡書何處補無用自咨嗟二月初二日山中感興山合風多急江寒潮易殘艱虞渾未息漂泊若為安脫葉投沙井吹花㸃石䦨故園歸夢切雪潦幾時乾贈星翁星翁言我夀更夀復何求老病花生眼愁吟雪滿頭髀消經萬險面皺積千憂十載不看鏡今朝見自羞春日與正仲坐山齊余隱几就睡既覺而正仲端坐誦書未已此意似更勝淵明卿且去之語也坐睡吾知味觀書客更嘉柴門桑舊曲石徑筍新斜花飽蜂歸國巢成燕著家此中真有意高柳兩三鴉晝睡生平慕睡鄉逃暑最為良渴愛煎茶響饑聞煮粥香百年依白社一枕熟黃梁童懶呼難動貪眠到夕陽别銀瓶年凶人賣子吾亦賣銀瓶送老無留物因貧總割情捐軀資我飽覆斗餞君行正是花香日憑誰細細傾臨水送將歸落葉秋江外孤鐙逺樹中片帆天上下明月水西東岐渚潮來白晴霞暝更紅一尊臨水驛莫忘寄詩筒送俞宜民歸馬耳峯晴雪集林薄朝陽熙隴苗青天堪數雁白路自通樵愁我未歸客别君還過橋何時燒短燭軟語更終宵十月初三日追記丙子歲以此日風雪中度平坑嶺入馬耳峯歲窮常鮮裕人老更多悲白日無閒客青山有了時乾坤馬跡滿風雨鶴巢危去歲來坑嶺移家度嶮巇古漁父詞二首烟雨一葉小江湖大厦寬全家足風月高枕恣波瀾白雪披蓑立青山揭笠看莫將文叔事溷我釣魚竿是店皆賒酒無家只有船燒魚岩下火吹笛水中天楓葉霜鋪地蘆花月滿川風波何處靜收釣即安眠衰至和王達善衰來知已漸老去不容遲居長常先導徐行且逺期相看飄鶴髮久坐綻烏皮百歲休嫌短修名千載垂詠頳桐花此花徽廟賜名珊瑚林朱草文明瑞兹花上品朱巧瑳紅象珥闊製紫雲襦麗奪炎精盛名霑御賜殊且貪顔色好鶴頂似他無因黃甘人便問訊帥初茇舍干戈後班荆薦莽餘何人騎有鶴顧我食無魚孤憤向誰說倦游休上書時時問甘嶺戴子近何如七月初四日賦紫薇花俗名怕癢樹皮薄枝弱人以手搔之無風自動又名稻熟花開時早稻熟也僧寺多喜種之亦名寶相蹙羅紅線緊鎔䗶粉鬚黃野寺花開日平疇稻熟香曽陪紅藥省相對紫薇郎尚憶絲綸閣新秋雨露涼謝劉文伯惠好翁箋春膏誇瑩淨雲母鬬輕明吾子誠不俗老夫安用名雖非時態尚猶見故人情雅興因君動新吟憑几成秋日書事貽潘少白樹色已非昨蟲聲不忍聞亂鴉投急景老樹淰長雲百頃青黃半一村晴雨分憑闌新得句書贈特山君貽正仲月生鯨海上人在鴈蒼中一巘環村轉雙溪到海同百年能幾見七十有三翁為此當心惻詩成走遞筒貽山甫多病空餘老勞生為苦思偶然新得句長是不眠時鼠攪歉無肉傭逃怨食糜此懷誰可訴只恐則山知梅所將别夜坐敘懷相見豈無期前年亦此時青山吾有約白髮子能醫石室誰看鼎巖泉似散絲老人偏重别去路渺相思去春帥初嘗約為榆林遊欲烹羊釀酒為小孟嘗既而僕歸鳯棲後帥初亦往西浙遂不果今帥初已歸當踐前言但同游之客達善已下世矣因黃甘便作詩以敘其懷戴子遊西浙藕花香滿船因思今日日又是去年年楊果珍閩荔榆林下剡川烹羊曽有約已失碧桃仙記夢春夢是耶非終慙戀祿微整冠騎馬出欹枕聽雞回食蘗風霜入還丹志願違未能忘習氣安得寸心灰又梅花清入夢詩骨定非常半樹原遮蘚無風也自香籃輿衝暮雪茅舍帶晨霜傍竹依松處無心肻向陽八月初三日五更夢覺追記林下青衫卸尊前白髮欹少年行樂事暮景感傷時鍊藥嫌長懶觀書悔已遲惜花心性在時復一吟詩夢行故都天街上往訪一舊識路甚迢遙至其館則所識不在有二女子從樓上亟道致其主偶出之意請余少俟因出酒肴酌余歌詞有惜花心性之語夢覺不能全記故追賦之夢回月上芙蓉浦船依杜若洲歲行人冉冉川永夢悠悠天地回青眼江山養白頭老生如朽木安識有悲秋題存思庵壁香飯炊魚白新醅擘蟹黃秋風元不惡鄉思自難忘田水間無用山雲薄有光篆畦消息好一路木樨香巾山題客舍壁曉行風露清夾徑草蟲鳴虎近常行市雞啼早出城路長終是到世險自難平學得王陽術黃金可立成四月初四日正仲子堂可大及梅所周鍊師會耕養堂白月一家好青山四坐迎短笻看虎跡髙枕聽蛙聲草具枇杷足瓜廬熠耀行相逢總佳士更喜著彌明含笑花半面羞藏袂回頭懶向人清涼生夜氣冷淡見天真此物慳開口他花怯效顰莫嫌容易落笑罷總成塵花頭皆向下才放口即落五言長律詠竹拂子謝潘可大天封竹拂子贈我意何勤白馬惟餘鬛蒼蠅合避人柄雙疑共産身粉止留筋可鄙棕毛賤堪同塵尾珍書齊添道氣入室許嘉賓壬辰正月胡子持孫平叔劉正仲諸友於鴈蒼建赤城先生祠賦唐律一十韻以紀其事句讀從朱老先生始從朱叟峰學經書本釋翁後與僧惟賢遊假其書得五經始通大義於藍青所出他石玉堪攻文啓吾鄉秀心知百代崇先生從東坡學有詩上之推尊非苟合議論自難同先生因議開五丈河坡公異意名節道鄉峻詞章淮海雄諸公交贊譽此老定磨礲舊祀儒宫側新祠佛寺東開山猶别子傳鉢許宗風俎豆干戈後詩書煨燼中千年期勿壞印印此心通評花我欣牟莟重君喜菜花黃露浥虀菹味風搖餅餌香均為資食品乍可少羮湯若論充冬蓄何如續夏糧書生有定祿百罋亦須嘗
