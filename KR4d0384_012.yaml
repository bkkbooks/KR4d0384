body:
  text: 閬風集巻十二宋舒岳祥撰䟦䟦王達善梅畧附辯後詩毛氏於摽有梅之梅無釋於終南之有條有梅釋曰梅柟達善謂若梅有柟名者毛氏當注于摽梅之下不當於終南發之誤後學者毛氏也余謂毛氏初不誤摽有梅之梅直梅杏之梅别無柟名其實七兮其實三兮是其實大故可以枚數則其為梅杏之梅無疑此毛鄭所以無釋終南之有梅大山之所有當是大木可以為梅柟之梅也梅乃柟之别名其子繁多不可以數記非召南之梅明矣故毛曰梅柟鄭曰名山髙大冝有茂材其説得之是則柟有梅之别名而梅無柟之别名也若白石錢氏詩話謂柟有而占反者乃梅之别名陸璣草木疏謂似杏實而酢者也酢倉故反柟有那含反者即楠字陸璣謂似豫章而木理細緻者也按字書此二音並釋梅柟盖那含反者是柟之正音而占反者柟之别音同是一木非有二物且其木旁從冉以冉字平聲反之即而占反也故别有此音非梅杏之梅也竊意柟之所以名梅乃字形之相類轉柟為梅耳柟字之所以作楠者亦以字形之相類轉柟為楠耳柟正文也楠俗言也故柟木之柟可以為梅而梅實之梅不可為柟也錢氏謂終南何有有條有梅梅當作枚字聲之誤枝小曰條幹小曰枚與汝墳之伐其條枚旱麓之施于條枚音義正同予謂此説似新而實疎以文勢觀之謂終南之木有條有枚則可謂終南所有有條有枚則不可條枚之細何地無之必以此為終南之盛耶今浙江有苦條木其木條長而葉􅪣可以磨洗魚枕安知秦地無此木耶不可謂木無以條名者而改梅作枚以從其説也毛氏曰條槄也案字書槄榎也榎楸也楸文梓也如其説是亦木之美大者也䟦僧日損詩曩有向予舉人漁父詞二絶者甚愛其手中一片欄江綱只待風平浪静時蓑衣亦有安危慮水面無波是太平兩聫特不知誰氏作耳今春避地雁蒼有損師者歸自白巖袖編詩相訪二絶在也嗟乎人患無可知者耳㑹須有見時也視其編首予友匊田方元善序文也匊田負一世詩名横絶湖海往時峻峙特甚不輕以一字許人邇來此道響沈元善危唐人之脉遂爾不續殷勤收拾以為己任序人之詩者接踵數家予皆能知其人而見其作矣所未識者日損耳日損盖能當其序者也歐陽子序秘演惟儼之作乃為石曼卿發也予是以於損也不能已於言焉師氣貌傑然談論激昂疑有用才也顧隠泯汩没於浮屠氏之學是編乃露其晶熒芒末者耶嗚呼﨑嶇亂離相與悲慨欷歔如此相逢豈易事哉使見損續編之成則幸矣丙子閏三月初二日書䟦王榘孫詩自京國傾覆筆墨道絶舉子無所用其巧往往于極海之涯窮山之巔用其素所對偶聲韻者變為詩歌聊以寫悲辛叙危苦耳非其志也予乆逃空谷嵗且再易歸檢故畦花殘藥墮己為樵牧之場猿狙之徑矣王叔範館於其旁課童子不廢暇則穿䝉宻入窈窕又自課以詩出小編示予此所謂用其素所對偶聲韻變為詩歌者耶噫方科舉盛行之時士之資質秀敏者皆自力於時文幸取一第則為身榮為時用自負逺甚惟窘於筆下無以争萬人之長者乃自附於詩人之列舉子盖鄙之也今科舉既廢而前日所自負者反求工於其所鄙斯又可歎也已叔範於舉業甚工今當棄其所已工得不痛惜之乎丁丑十一月十六日䟦陳茝自畫梅作詩見梅山此軸忽憶承平盛時行孤山之麓㳂馬塍之隅朝觸雪而往暮踏月而還所見梅往徃聫跗疊袂拗枝摺幹嫣然入宫苑標律非三家市上籬落間物也又移百梅於平臯之上橋斷岸絶蹇驢䇿風戟㦸吹面翛然獨往香低影壓自有一種瘦硬風格邇來避地薌巖石磴數梅出於瀟風晦雨摧剥之餘泯黙相唁意趣慘淡非前時比矣今與君共坐於綠隂之下披畫閲詩其清妍如舊都所見其老勁如平臯所植其凄絶如薌巖所對也平生神交盡在是矣畫然詩亦然君盖進於技悵然有感於予心者因書其卷後戊寅五月十九日䟦王達善燒痕藁予作尉奉州日王達善出所作相示目曰不切小編是後奔走東西不知是編何在丙子亂後還山偶整舊篋是編在焉欣然如見其面然未知達善寓吾里之馬坡也適然相遇於坡中數相别之日盖十八年矣計其續編當倍蓰於前也問之則愀然曰皆燬于五月之兵火矣出其殘藁數紙題曰燒痕者示予自以追憶不全為恨予解之曰張武之詩才數十篇人膾炙不絶口是在多乎哉君出語散朗綿麗簡短而舂容是不亦珍乎毋庸與俗子較多寡也君不見都市列肆者乎其門巷落落終日垂簾啄其扃漠然不以為意主人徐出盥手發函鏁藉而陳之其直動百千萬計盖所有乃珠玉瑰異也其東家陳其所有拄廬充棟摽於衢號於市又左右顧而罔諸塗然視其内則妻子不免飢色盖其所售者康瓠窶藪之具芻靈茅馬之類而已其直之相去固不待較然則火後僅存尤可珍也君博學浸灌精思沈郁所作未艾時雨至矣燒㾗復青非所病也䟦劉正仲作潘君石林記丙子春夏間予嘗行所謂石林之境矣自閬風西行二十里渉深甽縁蛟湖由支徑上峭壁下臨峻壑戴履皆石與肩相摩犖确百折過者無憇息之所目眩膽掉不暇以為觀又南五里東入為雁蒼山石路豁然夾以長松宛轉如螺盤盤囷囷躋為幽谷有僧院據石上寺前後皆石無窮其戴土者輙産茶竹下有良田百畆其居人皆寺之𨽻也山頂有石屋唅呀容數十人昔有一僧膜拜趺坐其間今其旁惟茨闔一二家焉斧條枚剪椔翳而後能入箕踞夷猶衆峯岫仰闖其下由寺門之前遡溪而東行二里得髙巖穹然常有宿雲其上皆與紫洞龍湫通一脉水行其趾又以石為底其凸水面者盤礴餘五十歩童子以石扣擊有大聲起如鼔是謂石鼓山予嘗與之銘矣出鴈蒼口又南五里東入譚山以昔有隠者譚姓居之故以名焉山上流泉至半山劈大巖以出其勢不得縱絲絲如馬尾值天雨新霽如雪崩練曵而聨鶴積鷺下于千仞也水煙濺撲飛雨襲人羣魚瀺灂駕湍欲上為巖所遏口喁喁迎受飛沫有嗛然意潭旁有巖穴如蝸牛廬雖淺而明可三四人環坐去穴十餘歩有亭三間宜小憇以觀瀑也出譚山望前峰窈窕處漫為坡麓林薄鬱蒼人煙出没霞鶩斷續亦台剡間一通道也有指以示予曰此其下潘君所居也時予避地鴈蒼孤絶無鄰雖未識君意甚羨之今觀正仲為君記石林正予昔所經行之地也故因潘君而識之且以補地志之闕文也庚辰五月二十二日銘鴈蒼山石鼓銘閬風之西華頂之東山曰鴈蒼與蕩埒崇綫蹊初入盤谷有容花流澗户雲涌梵宫兩僧欵予更躋其峯循蘿援蔓稚子肯從翠斗旋轉㵼溜濺淙引物扣之如鼓逢逢非雷非霆可警羣聾孰知其然水滿石中此腹空洞寂感則通顧無坡僊窮辯石鐘我來避地坐䕃長松以不説説萬籟號空墓誌銘故豸峯應君墓誌銘寜海以浮溪為屏几梅林為茵席自提樹趨而至于清泉山是為邑之右臂自法昌冒尖趨而至于嶽祠白嶠是為邑之左臂梅林居其中寛平沃衍可容萬家為通驛大道旁引兩臂支分港别逹于大海有舟航網罟之利其隅隩深窈環以文溪峙以茶山有椅桐檜栢梗楠竹箭筍茗之産錢氏有國以來善事上都無甲兵之擾時有議増賦者邑之陳長官力爭之以去官自誓得不加斂故民以阜安梅林應氏為著姓歴宋東都二百餘年涵養生植族聚滋茂靖康之變金人之師至明而退禍不及寜邑梅林倚郛負郭貲用不傷乾淳以後禮樂文物被焉彬彬焉多士矣先是吾邑自羅公適以科第起家為時名臣梅林二李繼之而應族隣焉其秀者相與磨礪浸灌質剖而文蔚矣應之宗姓其先有著籍于昌國者至葺芷公乃致身參預故梅林之應以胄牒中舉者數人君其一也鳴呼以三百餘年之族聚而又風之以累葉之詩書宜世其家也君少敏鋭志氣軒昂處事如成人而長老反取咨焉丙子歸附之初路府倚之以定宼從權處變擣其巢穴獲彼渠魁路府欲奏官之君力辭以免己丑玉山之宼洊及寜海軍帥咨之招集流散分剔淑慝而全活者甚衆路府欲以其功再聞于上君以勞致疾歸臥湖橋荏苒不起矣嗚呼道固多方權非一法天實為之可為浩歎數有必窮雖天亦不能亨其施也君諱瑞孫字季玘自號豸峯曾祖筌祖自得考𢎞初蚤世君娶楊氏故文林郎相如之女有子四鍓之為伯父後莊早卒安之宓之女三長適故國學生陳材應次適故承議郎平江府長洲縣舒斗祥之子子普次適俞可翁孫男十山立山京髙延建壵淼鑫㞳嵱建為莊後君生於紹定辛夘二月甲戌卒于至元己丑十月乙未以某年某月某日𦵏于湖橋之原君所自卜也君事祖母以孝周鄉黨以義與交友以信凡人道之常不書余獨書其處坎陷而不失其正者所以紀世變悲天道也銘曰麟之彬彬兮以不觸為仁兮衆正有隣兮豸之毅毅兮以觸邪為義兮羣纎投畀兮憤世疾時形于色兮有志無位空太息兮至元三十一年正月望日故孺人王氏墓誌銘孺人王氏王氏台寜海之王耆奥儒家子也其里隣西洲之鄭東蒼之葉鄭由發運公霖尚書公發葉由丞相太傅公夢鼎以讀書科第起家為台盛大之族王耆諸王有渭翁與孺人之父處士昺與鄭葉諸公以讀書應舉相往來有聞於鄉不幸以病廢而書聲不絶吟經治相授受也自此羣從子弟彬彬然以貢于鄉入于學者由公漸摩始也然其温恭醇慎之徳月旦評所推重三聚族多科目之士往往捷鈐交馳人皆曰王耆奥今當名黄旗奥也孺人年二十二而後歸於我蚤䘮母父病末疾孺人一意順奉扶翊臥起湯藥饘粥必親必躬初不忍嫁誓老于親旁既而考疾稍能自支不欲遂其不字之志乃遲之以歸我予亦蚤有棄去塲屋之興是時鄉長上殿撰王公定勉予就舉其書在几格孺人取讀之謂予曰此君分内事宜聴公言己酉予始勉出應進士舉偶濫鄉賦首薦既而就省闈鷁退而反予自悔此出林壑改操矣孺人曰君但張弮再進四十不成名為梁鴻之偕隠未晚也既而再中乙夘舉遂忝丙辰科進士鳴呼孺人之言不為無補于我矣孺人事舅姑恭順先君中年多病晩亦患風弱一日五飯坐起非人不支中夜或索飯啜孺人烹炊調胹無倦色先妣安人深嘉之撫之曰願汝多男長夀也孺人性多容少妬姬侍生子撫育如已出寒暑燥濕一皆共之家雖貧薄處之裕如勤儉自飭一衣十年澣濯紉緝至老不廢女工中年從予宦湖浙稍有登覽之勝自謂得林下風致逸樂不在多取也晩歸東浙歴諸名山殆有神遊之意矣世變稍烈予與孺人同歸故山徐入鄞剡山深林寂處雖不能無登陟艱阻然目不見兵馬盜賊之畏無病而卒于先考妣墓廬輿歸家庭以畢棺斂葬於縣西境新寧璽山婺㓂作台剡鄰境民生茶毒三尺之墳無不椎埋暴露獨孺人遺命子婦勿用簮珥金珠為飾一用女冠衣帔為斂具鄰里人皆疑其太薄既瘞不為馬鬛佳城之觀至今拳然塊土蒼苔叢篠蔽其上過者莫能指其處此皆孺人先識明見善縁樂趣相與合吉有以致此與始予欲與孺人合𦵏于此㑹丁酉夏六月穴之左右遭融風煽焰燎為焦土嗚呼能免于强兵大盜之毒手而不免於芻童牧䜿之遺燼使人痛傷也初予卜是穴也自坎其旁期他日翁媪合𦵏于此今罹此變欲開隧而觀之故役人有尚存者啟予曰穿壙之時其深三仞四面皆石脂氣如蒸炊見底而止燎及浮土何傷其内若啟而觀之既驚于火又重傷之也予允其言而已之孺人長予五嵗生於宋嘉定壬申二月二十八日卒於至元甲申七月二十七日有子五人庭堅仲容仲堪叔獻季臨有女一人適故直敷文閣方宗卿猷之孫應孫男六人延祖早夭繩叟長叟揚叟𢎞叟頥叟曾孫光孫孫女八人鳴呼先太夫人之言其亦有稽于此矣前之𦵏也予已濡淚為誌藏于家祠己丑兵火失之今續為之誌其詞曰山之蜿蜒兮自獅巖騰躍偃仰直下而東馳㑹而融結於傳嶺而委蛇卓三峯其如筆兮峙萬松之崔嵬有拳斯土兮若蛹而繭之溪谷囬環而并􅊶兮儼堂隍而屏帷合三道而東注兮滙于滄江之湄凝青㸃碧隠約乎几案之外兮若騎吏賓賛旁聨而拱扈駪駪而有儀龜筮恊吉兮君冝其歸既𦵏而安兮孫息蕃滋其中無藏兮大盜莫窺胡燎延于岡兮松薄煙飛尚喬木之無戕兮毋震毋危北鄞西剡人過其下兮嘆息嗟咨兹閬風先生之室之藏兮千秋萬古神物其䕶持祭文祭董正翁文嗚呼正翁學有源委行有法程施之政事又有器能時論所許月旦共評兹不復叙直寫交情癸夘之秋僕逰霞城荆溪座中識君弟兄論雖罕同心自此傾丁未進士華翁先登吾季與焉為同年生君於丙辰賜第集英僕厠榜下又為齊盟他人有一好及雲仍而况伯仲世契疊并僕過苕霅君督公田道舊契濶對榻分氊我理歸楫君張祖筵小飲碧瀾大飲趙園魴鯉出罟橘柚夾舷時有同集請即命翰君曰毋然陵騁難妍深造此道故知其難自此一别時徂嵗遷材有利鈍勢有泝㳂僕日沉痼君日翥鶱京城重㑹襟期朗宣扣鑰啟箧珍玩且千河豚怒頬亟命烹鮮察君眉宇視我甚憐僕自方拙匪君可鐫君漕湖湘僕滯鄞川公車上辟剡薦亟聫心之懐矣欲往莫前世事已矣哽咽何言君歸故鄉轉側間關得書及詩悲喜汍瀾台城禍鉅性命孰全廬焚書燬獨君幸完結茅江浦料理殘編柴桑非樂浣花豈安道路罕通書尺莫傳尚期握手話此辛酸胡疾之革去離塵寰僕亦何樂與世周旋君先僕後誰滿百年有酒盈樽澆淚抽肝相以苦詞其哀可弦尚饗祭舅氏文北山之下有善人兮心平氣和言恂恂兮有璞無琢玉斯完兮彼藻藉者匪其天兮有蔡藏穴何必灼兮保其元身不以赫兮既夀而康順以歸兮世變﨑嶇公則夷兮我為時戚匪公悲兮公則逝矣世愈唏兮我為公甥年既耆兮𦵏不視窆筋力衰兮是以為媿胡以文兮遡風緘臆覆罍尊兮祭妻父王公文嗚呼晴月暖風寫公徳容滙澤春浸壯公心胷不亨其施而善厥躬亦既亨止令聞孰䝉維時不獲有嗇其逢早纒末疾几杖一室翛然瘦鶴風骨崒嵂我來拜公載色載笑酌以玉彛祝我逺到我醻公飫祝以難老嵗時候問謂復見之十年不見往已莫追嗚呼我年十七為公之婿年三十二哭公之逝今既六十公始即竁身居子列義當分過白頭幸存滴淚冩些
